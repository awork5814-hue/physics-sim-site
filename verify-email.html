<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Physics Experiments Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-1: #0f1724;
      --bg-2: #1a2536;
      --text: #ffffff;
      --muted: #8b949e;
      --accent: #6ad7ff;
      --border: rgba(255,255,255,0.1);
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg-1); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .verify-container { background: var(--bg-2); border: 1px solid var(--border); border-radius: 24px; padding: 48px; max-width: 480px; width: 100%; text-align: center; }
    .verify-icon { width: 80px; height: 80px; margin: 0 auto 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .verify-icon.loading { background: rgba(106, 215, 255, 0.15); }
    .verify-icon.success { background: rgba(68, 255, 100, 0.15); }
    .verify-icon.error { background: rgba(255, 68, 68, 0.15); }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-block; padding: 14px 32px; background: var(--accent); color: #0a0a0f; border-radius: 12px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(106, 215, 255, 0.3); }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(106, 215, 255, 0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="verify-container">
    <div class="verify-icon loading" id="icon">
      <div class="spinner"></div>
    </div>
    <h1 id="title">Verifying...</h1>
    <p id="message">Please wait while we verify your email address.</p>
    <a href="index.html" class="btn" id="btn" style="display: none;">Go to Homepage</a>
  </div>

  <script>
    async function verifyEmail() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      if (!token) {
        showResult('error', 'Invalid Link', 'This verification link is invalid or has expired. Please request a new verification email from your account settings.');
        return;
      }

      try {
        const response = await fetch(`/api/auth/verify-email?token=${encodeURIComponent(token)}`);
        const data = await response.json();

        if (response.ok && data.success) {
          showResult('success', 'Email Verified!', 'Your email has been successfully verified. You can now enjoy all features of Physics Experiments Lab.');
        } else {
          showResult('error', 'Verification Failed', data.error || 'This verification link is invalid or has expired. Please request a new verification email from your account settings.');
        }
      } catch (error) {
        showResult('error', 'Verification Failed', 'An error occurred while verifying your email. Please try again later.');
      }
    }

    function showResult(type, title, message) {
      const icon = document.getElementById('icon');
      const titleEl = document.getElementById('title');
      const messageEl = document.getElementById('message');
      const btn = document.getElementById('btn');

      icon.className = `verify-icon ${type}`;
      icon.innerHTML = type === 'success' ? '✓' : '✕';
      titleEl.textContent = title;
      messageEl.textContent = message;
      btn.style.display = 'inline-block';
    }

    verifyEmail();
  </script>
</body>
</html>
