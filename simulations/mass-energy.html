<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mass-Energy Equivalence</title>
  <link rel="stylesheet" href="/styles.css"/><link rel="stylesheet" href="/simulation-theme.css"/>
  <style>
    :root{--accent:#6ad7ff;--accent-2:#f6c76b;--panel:rgba(15,22,35,0.92);--sim-border:rgba(120,150,190,0.18);--sim-text:#e9f2ff;--sim-muted:#9fb0c5;}
    body{margin:0;background:#0a111c;color:var(--sim-text);font-family:"Space Grotesk",sans-serif;}
    .page{min-height:100vh;display:flex;flex-direction:column}
    .topbar{display:flex;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--sim-border);background:rgba(8,12,20,0.7)}
    .topbar a{color:var(--sim-text);text-decoration:none;font-weight:600}
    header{text-align:center;padding:30px 20px}
    header h1{font-size:clamp(1.6rem,2.4vw,2.5rem);margin:0 0 10px;letter-spacing:0.08em;text-transform:uppercase}
    header p{color:var(--sim-muted);margin:0}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:12px 28px 18px}
    .panel{background:var(--panel);border:1px solid var(--sim-border);border-radius:18px;padding:18px}
    canvas{width:100%;height:350px;background:rgba(6,10,18,0.7);border-radius:16px;border:1px solid var(--sim-border)}
    .controls{display:grid;gap:16px}
    label{font-size:0.9rem;color:var(--sim-muted);display:flex;justify-content:space-between}
    input[type="range"],select{width:100%}
    .data-panel{font-size:0.9rem;color:var(--sim-muted)}
    .data-panel strong{color:var(--accent);font-weight:600}
    .results-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .convert-display{text-align:center;padding:20px;font-size:1.2rem;}
    @media(max-width:980px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><a href="/index.html">← Back to Library</a></div>
    <header><h1>Mass-Energy Equivalence</h1><p>E = mc²</p></header>
    <div class="layout">
      <div><canvas id="einsteinCanvas"></canvas>
        <div class="panel convert-display"><strong id="eqDisplay">E = mc²</strong></div>
        <div class="panel" style="margin-top:16px">
          <div class="results-grid">
            <div class="data-panel"><div>Energy: <strong id="energyText">0 J</strong></div></div>
            <div class="data-panel"><div>In: <strong id="unitText">Joules</strong></div></div>
          </div>
        </div>
      </div>
      <div class="controls">
        <div class="panel"><div class="control-group"><label>Mass (kg) <span id="massVal">1</span> kg</label><input type="range" id="mass" min="0.001" max="10" value="1" step="0.001"/></div></div>
        <div class="panel"><div class="control-group"><label>Energy (J) <span id="eVal">0</span> J</label><input type="range" id="energy" min="0" max="9e16" value="0"/></div></div>
        <div class="panel"><div class="control-group"><label>Display Unit</label><select id="unit"><option value="j">Joules</option><option value="kwh">kWh</option><option value="tnt">TNT (tons)</option><option value="ev">eV</option></select></div></div>
        <div class="panel"><div class="data-panel"><strong>Einstein's Equation:</strong></div><div style="margin-top:8px">E = mc²</div><div>c = 299,792,458 m/s</div><div style="margin-top:8px">1 kg = 9×10¹⁶ J</div><div>≈ 21 megatons TNT</div></div>
      </div>
    </div>
  </div>
  <script>
    const canvas=document.getElementById('einsteinCanvas'),ctx=canvas.getContext('2d');
    let mass=1,energy=0,unit='j';
    const c=299792458;
    function resize(){const r=canvas.getBoundingClientRect();canvas.width=r.width*devicePixelRatio;canvas.height=r.height*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);}
    function draw(){
      const w=canvas.width/devicePixelRatio,h=canvas.height=devicePixelRatio,h2=canvas.height/devicePixelRatio;
      ctx.fillStyle='rgba(6,10,18,0.95)';ctx.fillRect(0,0,w,h2);
      const cx=w/2,cy=h2/2;
      const E=mass*c*c;
      const energyDisplay=E*getFactor();
      document.getElementById('energyText').textContent=energyDisplay.toExponential(2)+' '+getUnit();
      document.getElementById('eqDisplay').textContent='E = '+mass.toFixed(3)+' × c² = '+energyDisplay.toExponential(2)+' '+getUnit();
      const size=Math.min(200,50+Math.log10(E+1)*30);
      const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,size);
      grad.addColorStop(0,'#fff');
      grad.addColorStop(0.3,'#f6c76b');
      grad.addColorStop(0.6,'#ff6b6b');
      grad.addColorStop(1,'transparent');
      ctx.fillStyle=grad;ctx.beginPath();ctx.arc(cx,cy,size,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#e9f2ff';ctx.font='bold 24px sans-serif';ctx.textAlign='center';ctx.fillText('E = mc²',cx,cy+5);
    }
    function getFactor(){if(unit==='j')return 1;if(unit==='kwh')return 1/3.6e6;if(unit==='tnt')return 1/4.184e9;if(unit==='ev')return 1/1.602e-19;return 1;}
    function getUnit(){if(unit==='j')return 'J';if(unit==='kwh')return 'kWh';if(unit==='tnt')return 'tons TNT';if(unit==='ev')return 'eV';return 'J';}
    document.getElementById('mass').oninput=e=>{mass=parseFloat(e.target.value);document.getElementById('massVal').textContent=mass;};
    document.getElementById('unit').onchange=e=>{unit=e.target.value;document.getElementById('unitText').textContent=unit.toUpperCase();};
    function loop(){draw();requestAnimationFrame(loop);}
    window.onresize=resize;resize();loop();
  </script>
</body>
</html>
