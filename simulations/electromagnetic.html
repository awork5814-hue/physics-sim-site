<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coming Soon</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/simulation-theme.css" />
  <style>
    :root { --accent: #6ad7ff; --accent-2: #f6c76b; --sim-bg: rgba(10, 16, 26, 0.95); --sim-text: #e9f2ff; --sim-muted: #9fb0c5; --sim-border: rgba(120, 150, 190, 0.18); --panel: rgba(15, 22, 35, 0.92); }
    body { margin: 0; background: radial-gradient(1100px 700px at 10% 0%, rgba(106, 215, 255, 0.12), transparent), radial-gradient(900px 700px at 90% 15%, rgba(246, 199, 107, 0.12), transparent), #0a111c; color: var(--sim-text); font-family: "Space Grotesk", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .coming { text-align: center; }
    .coming h1 { font-size: 3rem; color: var(--accent); margin-bottom: 10px; }
    .coming p { color: var(--sim-muted); font-size: 1.2rem; }
    .soon { display: inline-block; margin-top: 20px; padding: 10px 30px; border: 2px solid var(--accent-2); border-radius: 30px; color: var(--accent-2); font-weight: bold; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="coming">
    <h1>Coming Soon</h1>
    <p>This simulation is under development</p>
    <span class="soon">IN DEVELOPMENT</span>
    <p style="margin-top: 30px;"><a href="/">← Back to Physics Lab</a></p>
  </div>
</body>
</html>
