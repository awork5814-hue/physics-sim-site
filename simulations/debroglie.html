<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>de Broglie Wavelength</title>
  <link rel="stylesheet" href="/styles.css"/><link rel="stylesheet" href="/simulation-theme.css"/>
  <style>
    :root{--accent:#6ad7ff;--accent-2:#f6c76b;--panel:rgba(15,22,35,0.92);--sim-border:rgba(120,150,190,0.18);--sim-text:#e9f2ff;--sim-muted:#9fb0c5;}
    body{margin:0;background:#0a111c;color:var(--sim-text);font-family:"Space Grotesk",sans-serif;}
    .page{min-height:100vh;display:flex;flex-direction:column}
    .topbar{display:flex;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--sim-border);background:rgba(8,12,20,0.7)}
    .topbar a{color:var(--sim-text);text-decoration:none;font-weight:600}
    header{text-align:center;padding:30px 20px}
    header h1{font-size:clamp(1.6rem,2.4vw,2.5rem);margin:0 0 10px;letter-spacing:0.08em;text-transform:uppercase}
    header p{color:var(--sim-muted);margin:0}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:12px 28px 18px}
    .panel{background:var(--panel);border:1px solid var(--sim-border);border-radius:18px;padding:18px}
    canvas{width:100%;height:350px;background:rgba(6,10,18,0.7);border-radius:16px;border:1px solid var(--sim-border)}
    .controls{display:grid;gap:16px}
    label{font-size:0.9rem;color:var(--sim-muted);display:flex;justify-content:space-between}
    input[type="range"],select{width:100%}
    .data-panel{font-size:0.9rem;color:var(--sim-muted)}
    .data-panel strong{color:var(--accent);font-weight:600}
    .results-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:980px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><a href="/index.html">← Back to Library</a></div>
    <header><h1>de Broglie Wavelength</h1><p>Wave-particle duality of matter</p></header>
    <div class="layout">
      <div><canvas id="deBroglieCanvas"></canvas>
        <div class="panel" style="margin-top:16px">
          <div class="results-grid">
            <div class="data-panel"><div>Wavelength: <strong id="waveText">0 nm</strong></div><div>Momentum: <strong id="momText">0</strong></div></div>
            <div class="data-panel"><div>Particle: <strong id="partText">Electron</strong></div><div>Velocity: <strong id="velText">0 m/s</strong></div></div>
          </div>
        </div>
      </div>
      <div class="controls">
        <div class="panel"><div class="control-group"><label>Particle Type</label><select id="particle"><option value="electron">Electron</option><option value="proton">Proton</option><option value="neutron">Neutron</option><option value="atom">Carbon Atom</option><option value="baseball">Baseball</option></select></div></div>
        <div class="panel"><div class="control-group"><label>Velocity <span id="velVal">1e6</span> m/s</label><input type="range" id="velocity" min="1" max="10" value="1" step="0.1"/></div></div>
        <div class="panel"><div class="data-panel"><strong>de Broglie Equation:</strong></div><div style="margin-top:8px">λ = h / p = h / (mv)</div><div style="margin-top:8px">h = 6.626 × 10⁻³⁴ J·s</div></div>
        <div class="panel"><div class="data-panel"><strong>Key Insight:</strong></div><div style="margin-top:8px">Matter has wave-like properties!</div><div>λ decreases as mass/velocity increases</div></div>
      </div>
    </div>
  </div>
  <script>
    const canvas=document.getElementById('deBroglieCanvas'),ctx=canvas.getContext('2d');
    const particles={electron:{m:9.11e-31,name:'Electron'},proton:{m:1.67e-27,name:'Proton'},neutron:{m:1.67e-27,name:'Neutron'},atom:{m:2e-26,name:'Carbon Atom'},baseball:{m:0.145,name:'Baseball'}};
    let particle='electron',velocity=1e6;
    function resize(){const r=canvas.getBoundingClientRect();canvas.width=r.width*devicePixelRatio;canvas.height=r.height*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);}
    function draw(){
      const w=canvas.width/devicePixelRatio,h=canvas.height/devicePixelRatio;
      ctx.fillStyle='rgba(6,10,18,0.95)';ctx.fillRect(0,0,w,h);
      const p=particles[particle];const v=velocity;const lambda=6.626e-34/(p.m*v);
      const wavelengthNM=lambda*1e9;
      document.getElementById('waveText').textContent=wavelengthNM.toExponential(2)+' nm';
      document.getElementById('momText').textContent=(p.m*v).toExponential(2)+' kg·m/s';
      document.getElementById('partText').textContent=p.name;
      document.getElementById('velText').textContent=v.toExponential(1)+' m/s';
      const waveHeight=Math.min(h*0.8,wavelengthNM/10);
      const centerY=h/2;
      ctx.strokeStyle='#6ad7ff';ctx.lineWidth=2;
      for(let x=50;x<w-50;x+=2){
        const y=centerY+Math.sin(x*0.1)*waveHeight/2;
        if(x===50)ctx.beginPath();ctx.lineTo(x,y);ctx.stroke();
      }
      const particleSize=particle==='baseball'?15:(particle==='atom'?8:5);
      ctx.fillStyle='#f6c76b';ctx.shadowColor='#f6c76b';ctx.shadowBlur=15;
      ctx.beginPath();ctx.arc(w-80,centerY,particleSize,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='#666';ctx.font='12px sans-serif';ctx.textAlign='center';
      ctx.fillText(p.name,w-80,centerY+30);
    }
    document.getElementById('particle').onchange=e=>{particle=e.target.value;};
    document.getElementById('velocity').oninput=e=>{velocity=Math.pow(10,parseFloat(e.target.value));document.getElementById('velVal').textContent=velocity.toExponential(1);};
    function loop(){draw();requestAnimationFrame(loop);}
    window.onresize=resize;resize();loop();
  </script>
</body>
</html>
