<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Free Fall</title>
  <link rel="stylesheet" href="/styles.css"/><link rel="stylesheet" href="/simulation-theme.css"/>
  <style>
    :root{--accent:#6ad7ff;--accent-2:#f6c76b;--panel:rgba(15,22,35,0.92);--sim-border:rgba(120,150,190,0.18);--sim-text:#e9f2ff;--sim-muted:#9fb0c5;}
    body{margin:0;background:#0a111c;color:var(--sim-text);font-family:"Space Grotesk",sans-serif;}
    .page{min-height:100vh;display:flex;flex-direction:column}
    .topbar{display:flex;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--sim-border);background:rgba(8,12,20,0.7)}
    .topbar a{color:var(--sim-text);text-decoration:none;font-weight:600}
    header{text-align:center;padding:30px 20px}
    header h1{font-size:clamp(1.6rem,2.4vw,2.5rem);margin:0 0 10px;letter-spacing:0.08em;text-transform:uppercase}
    header p{color:var(--sim-muted);margin:0}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:12px 28px 18px}
    .panel{background:var(--panel);border:1px solid var(--sim-border);border-radius:18px;padding:18px}
    canvas{width:100%;height:350px;background:rgba(6,10,18,0.7);border-radius:16px;border:1px solid var(--sim-border)}
    .controls{display:grid;gap:16px}
    label{font-size:0.9rem;color:var(--sim-muted);display:flex;justify-content:space-between}
    input[type="range"],select{width:100%}
    button{background:rgba(12,18,28,0.8);color:var(--sim-text);border:1px solid var(--sim-border);padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
    button:hover{border-color:var(--accent)}
    .data-panel{font-size:0.9rem;color:var(--sim-muted)}
    .data-panel strong{color:var(--accent);font-weight:600}
    .results-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:980px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><a href="/index.html">← Back to Library</a></div>
    <header><h1>Free Fall</h1><p>Objects falling under gravity</p></header>
    <div class="layout">
      <div><canvas id="fallCanvas"></canvas>
        <div class="panel" style="margin-top:16px">
          <div class="results-grid">
            <div class="data-panel"><div>Height: <strong id="heightText">100 m</strong></div><div>Velocity: <strong id="velText">0 m/s</strong></div></div>
            <div class="data-panel"><div>Time: <strong id="timeText">0 s</strong></div><div>Acceleration: <strong id="accText">9.8 m/s²</strong></div></div>
          </div>
        </div>
      </div>
      <div class="controls">
        <div class="panel"><div class="control-group"><label>Initial Height <span id="hVal">100</span> m</label><input type="range" id="height" min="10" max="500" value="100"/></div></div>
        <div class="panel"><div class="control-group"><label>Gravity <span id="gVal">9.8</span> m/s²</label><input type="range" id="gravity" min="1" max="25" value="9.8" step="0.1"/></div></div>
        <div class="panel"><button id="btnDrop">Drop</button><button id="btnReset" style="margin-left:8px">Reset</button></div>
        <div class="panel"><div class="data-panel"><strong>Equations:</strong></div><div style="margin-top:8px">v = gt<br/>y = ½gt²<br/>v² = 2gy</div></div>
      </div>
    </div>
  </div>
  <script>
    const canvas=document.getElementById('fallCanvas'),ctx=canvas.getContext('2d');
    let y=0,vy=0,time=0,g=9.8,startHeight=100,falling=false;
    function resize(){const r=canvas.getBoundingClientRect();canvas.width=r.width*devicePixelRatio;canvas.height=r.height*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);}
    function draw(){
      const w=canvas.width/devicePixelRatio,h=canvas.height/devicePixelRatio;
      ctx.fillStyle='rgba(6,10,18,0.95)';ctx.fillRect(0,0,w,h);
      const groundY=h-30;
      const scale=Math.min(h-60,startHeight*2)/startHeight;
      const ballY=groundY-y*scale;
      ctx.fillStyle='#444';ctx.fillRect(0,groundY,w,30);
      ctx.fillStyle='#6ad7ff';ctx.beginPath();ctx.arc(w/2,ballY,15,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#666';ctx.font='14px sans-serif';ctx.textAlign='center';
      ctx.fillText('Ground',w/2,h-10);
      if(falling&&y<startHeight){vy+=g*0.02;y+=vy*0.02;}
      document.getElementById('heightText').textContent=(startHeight-y).toFixed(1)+' m';
      document.getElementById('velText').textContent=vy.toFixed(1)+' m/s';
      document.getElementById('timeText').textContent=time.toFixed(2)+' s';
      if(falling)time+=0.02;
    }
    document.getElementById('height').oninput=e=>{startHeight=parseInt(e.target.value);document.getElementById('hVal').textContent=startHeight;if(!falling)y=0;};
    document.getElementById('gravity').oninput=e=>{g=parseFloat(e.target.value);document.getElementById('gVal').textContent=g;document.getElementById('accText').textContent=g+' m/s²';};
    document.getElementById('btnDrop').onclick=()=>{falling=true;};
    document.getElementById('btnReset').onclick=()=>{falling=false;y=0;vy=0;time=0;};
    function loop(){draw();requestAnimationFrame(loop);}
    window.onresize=resize;resize();loop();
  </script>
</body>
</html>
