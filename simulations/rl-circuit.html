<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RL Circuit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0f16;
      --bg-2: #0f1723;
      --panel: rgba(16, 24, 36, 0.86);
      --panel-strong: rgba(12, 20, 32, 0.95);
      --ink: #f5f8fd;
      --muted: #a9b6c6;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --line: rgba(255,255,255,0.08);
      --glow: rgba(106, 215, 255, 0.22);
      --shadow: rgba(3, 6, 10, 0.6);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% -10%, #1f3146 0%, #0f1622 40%, #0a0f16 100%),
        linear-gradient(180deg, #0a0f16 0%, #0d1520 60%, #0a0f16 100%);
      color: var(--ink);
      font-family: "IBM Plex Sans", sans-serif;
      min-height: 100vh;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px clamp(16px, 4vw, 36px) 36px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .title-block h1 {
      margin: 0 0 6px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(26px, 3vw, 34px);
      letter-spacing: 0.5px;
    }
    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(106, 215, 255, 0.3);
      background: rgba(106, 215, 255, 0.12);
      color: var(--accent);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 20px 50px var(--shadow);
    }
    .stat-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: "Space Grotesk", sans-serif;
      font-size: 18px;
    }

    .wrap { display: grid; grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr); gap: 18px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 24px 60px var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 10% 10%, rgba(106, 215, 255, 0.08), transparent 45%);
      pointer-events: none;
    }

    canvas { width: 100%; height: 460px; background: #0b0f14; border-radius: 14px; border: 1px solid var(--line); }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .control {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .control label { display: block; margin-bottom: 6px; color: var(--ink); font-weight: 600; }
    .control input[type="range"] { width: 100%; }
    .control .row { display: flex; justify-content: space-between; }
    .value-chip {
      background: rgba(106, 215, 255, 0.12);
      border: 1px solid rgba(106, 215, 255, 0.25);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 12px;
    }

    .buttons { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      padding: 9px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(12, 20, 32, 0.9);
      color: var(--ink);
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(106, 215, 255, 0.35); }
    .btn.primary {
      background: linear-gradient(135deg, #6ad7ff, #00d4aa);
      color: #0a0f16;
      border: none;
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(106, 215, 255, 0.35);
    }
    .btn.ghost {
      background: rgba(106, 215, 255, 0.1);
      color: var(--accent);
      border-color: rgba(106, 215, 255, 0.25);
    }

    .legend {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .legend i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--glow);
    }
    .legend i.orange { background: var(--accent-2); box-shadow: 0 0 8px rgba(246, 199, 107, 0.4); }

    .readout {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .read-card {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
    }
    .read-card span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }
    .read-card strong {
      font-size: 16px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
    }

    .presets { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
    .presets .btn { font-size: 11px; padding: 8px 10px; }

    footer { margin-top: 18px; color: var(--muted); font-size: 12px; }

    @media (max-width: 980px) {
      header { flex-direction: column; align-items: flex-start; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .wrap { grid-template-columns: 1fr; }
      canvas { height: 420px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="title-block">
        <div class="badge">Precision Lab</div>
        <h1>RL Circuit</h1>
        <div class="subtitle">Inductor resists changes in current</div>
      </div>
      <div class="buttons">
        <button class="btn primary" id="run">Run</button>
        <button class="btn" id="reset">Reset</button>
        <button class="btn ghost" id="toggle">Build-up</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Time Constant</div>
        <div class="stat-value" id="tauStat">0.00 s</div>
      </div>
      <div class="stat">
        <div class="stat-label">Current</div>
        <div class="stat-value" id="iStat">0.00 A</div>
      </div>
      <div class="stat">
        <div class="stat-label">V<sub>L</sub></div>
        <div class="stat-value" id="vlStat">0.00 V</div>
      </div>
      <div class="stat">
        <div class="stat-label">Energy</div>
        <div class="stat-value" id="eStat">0.00 μJ</div>
      </div>
    </div>

    <div class="wrap">
      <div class="card">
        <canvas id="scene"></canvas>
        <div class="legend">
          <span><i></i> Current I(t)</span>
          <span><i class="orange"></i> Inductor Voltage V<sub>L</sub>(t)</span>
        </div>
      </div>

      <div class="card">
        <div class="controls">
          <div class="control">
            <label>Resistance R (Ω) <span class="value-chip" id="resVal">100</span></label>
            <input id="res" type="range" min="10" max="1000" step="5" value="100" />
            <div class="row"><span>10</span><span>1000</span></div>
          </div>
          <div class="control">
            <label>Inductance L (H) <span class="value-chip" id="indVal">0.10</span></label>
            <input id="ind" type="range" min="0.01" max="1" step="0.01" value="0.1" />
            <div class="row"><span>0.01</span><span>1.0</span></div>
          </div>
          <div class="control">
            <label>Source Voltage V₀ (V) <span class="value-chip" id="voltVal">5.0</span></label>
            <input id="volt" type="range" min="1" max="12" step="0.5" value="5" />
            <div class="row"><span>1</span><span>12</span></div>
          </div>
          <div class="control">
            <label>Animation Speed <span class="value-chip" id="speedVal">1.0x</span></label>
            <input id="speed" type="range" min="0.1" max="5" step="0.1" value="1" />
            <div class="row"><span>0.1x</span><span>5x</span></div>
          </div>
        </div>

        <div class="readout">
          <div class="read-card"><span>τ (L/R)</span><strong id="tauRead">0.00 s</strong></div>
          <div class="read-card"><span>Mode</span><strong id="modeRead">Build-up</strong></div>
          <div class="read-card"><span>V<sub>R</sub></span><strong id="vrRead">0.00 V</strong></div>
          <div class="read-card"><span>V<sub>L</sub></span><strong id="vlRead">0.00 V</strong></div>
        </div>

        <div class="presets">
          <button class="btn" data-preset="fast">Fast Response</button>
          <button class="btn" data-preset="balanced">Balanced</button>
          <button class="btn" data-preset="slow">Slow Response</button>
        </div>
      </div>
    </div>

    <footer>
      τ = L/R. Build-up: I = (V/R)(1-e^{-t/τ}). Decay: I = I0 e^{-t/τ}.
    </footer>
  </div>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const state = {
      R: 100,
      L: 0.1,
      V0: 5,
      t: 0,
      running: false,
      building: true,
      speed: 1,
      iHist: []
    };

    function resizeCanvas() {
      const ratio = window.devicePixelRatio || 1;
      const { width, height } = canvas.getBoundingClientRect();
      canvas.width = Math.round(width * ratio);
      canvas.height = Math.round(height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function tau() { return state.L / state.R; }

    function current(t) {
      const tauVal = tau();
      const Imax = state.V0 / state.R;
      if (state.building) return Imax * (1 - Math.exp(-t / tauVal));
      return Imax * Math.exp(-t / tauVal);
    }

    function update() {
      if (!state.running) return;
      state.t += 0.016 * state.speed;
      const I = current(state.t);
      state.iHist.push(I);
      if (state.iHist.length > 200) state.iHist.shift();
    }

    function drawCircuit(I) {
      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = canvas.height / (window.devicePixelRatio || 1);
      const left = 60;
      const top = 70;
      const circuitW = 380;
      const circuitH = 240;
      const midY = top + circuitH / 2;
      const right = left + circuitW;

      ctx.save();
      ctx.strokeStyle = '#6ad7ff';
      ctx.lineWidth = 2;
      ctx.shadowColor = 'rgba(106,215,255,0.35)';
      ctx.shadowBlur = 6;

      ctx.beginPath();
      ctx.moveTo(left, midY);
      ctx.lineTo(left + 60, midY);
      ctx.stroke();

      const zigX = left + 60;
      const zigY = midY;
      const step = 16;
      ctx.beginPath();
      ctx.moveTo(zigX, zigY);
      for (let i = 0; i < 6; i += 1) {
        const dx = zigX + step * (i + 1);
        const dy = zigY + (i % 2 === 0 ? -12 : 12);
        ctx.lineTo(dx, dy);
      }
      ctx.lineTo(zigX + step * 7, zigY);
      ctx.stroke();

      const coilX = right - 120;
      ctx.beginPath();
      ctx.moveTo(zigX + step * 7, zigY);
      ctx.lineTo(coilX - 20, zigY);
      ctx.stroke();

      for (let i = 0; i < 6; i += 1) {
        ctx.beginPath();
        ctx.arc(coilX + i * 14, zigY, 10, Math.PI, 0);
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.moveTo(coilX + 70, zigY);
      ctx.lineTo(right, zigY);
      ctx.lineTo(right, top + circuitH);
      ctx.lineTo(left, top + circuitH);
      ctx.lineTo(left, midY);
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.fillStyle = '#f6c76b';
      ctx.font = '13px \"Space Grotesk\", sans-serif';
      ctx.fillText('R', zigX + 42, midY - 26);
      ctx.fillText('L', coilX + 18, midY - 26);

      const mag = Math.min(1, I / (state.V0 / state.R));
      ctx.strokeStyle = `rgba(106,215,255,${0.3 + 0.5*mag})`;
      ctx.beginPath();
      ctx.arc(coilX + 34, midY - 30, 36, 0, Math.PI * 2);
      ctx.stroke();

      const particles = Math.min(14, Math.max(4, Math.abs(I) * 120));
      ctx.fillStyle = 'rgba(106,215,255,0.7)';
      for (let i = 0; i < particles; i += 1) {
        const phase = (state.t * 0.6 + i / particles) % 1;
        const px = left + phase * (circuitW - 40);
        ctx.beginPath();
        ctx.arc(px, midY, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawGraph() {
      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = canvas.height / (window.devicePixelRatio || 1);
      const x = w * 0.52;
      const y = 70;
      const gw = w * 0.44;
      const gh = 220;

      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      for (let i = 0; i <= 4; i += 1) {
        const gy = y + (i / 4) * gh;
        ctx.beginPath();
        ctx.moveTo(x, gy);
        ctx.lineTo(x + gw, gy);
        ctx.stroke();
      }
      for (let i = 0; i <= 4; i += 1) {
        const gx = x + (i / 4) * gw;
        ctx.beginPath();
        ctx.moveTo(gx, y);
        ctx.lineTo(gx, y + gh);
        ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.strokeRect(x, y, gw, gh);
      ctx.fillStyle = '#dfe8f4';
      ctx.font = '12px \"Space Grotesk\", sans-serif';
      ctx.fillText('Response Curves', x + 10, y - 10);

      ctx.strokeStyle = '#6ad7ff';
      ctx.shadowColor = 'rgba(106,215,255,0.4)';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      state.iHist.forEach((p, i) => {
        const px = x + (i / 200) * gw;
        const py = y + gh - (p / (state.V0 / state.R)) * gh;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#f6c76b';
      ctx.beginPath();
      state.iHist.forEach((p, i) => {
        const Vl = state.V0 * Math.exp(-((i / 200) * (state.t || 1)) / tau());
        const px = x + (i / 200) * gw;
        const py = y + gh - (Vl / state.V0) * gh;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.stroke();
      ctx.restore();
    }

    function draw() {
      const w = canvas.width / (window.devicePixelRatio || 1);
      const h = canvas.height / (window.devicePixelRatio || 1);
      ctx.fillStyle = '#0b0f14';
      ctx.fillRect(0, 0, w, h);
      const I = current(state.t);
      drawCircuit(I);
      drawGraph();
    }

    function updateReadout() {
      const I = current(state.t);
      const V_L = state.V0 * Math.exp(-state.t / tau());
      const V_R = state.V0 - V_L;
      const E = 0.5 * state.L * I * I;
      document.getElementById('tauStat').textContent = `${tau().toFixed(4)} s`;
      document.getElementById('iStat').textContent = `${I.toFixed(3)} A`;
      document.getElementById('vlStat').textContent = `${V_L.toFixed(2)} V`;
      document.getElementById('eStat').textContent = `${(E * 1e6).toFixed(2)} μJ`;
      document.getElementById('tauRead').textContent = `${tau().toFixed(4)} s`;
      document.getElementById('modeRead').textContent = state.building ? 'Build-up' : 'Decay';
      document.getElementById('vrRead').textContent = `${V_R.toFixed(2)} V`;
      document.getElementById('vlRead').textContent = `${V_L.toFixed(2)} V`;
    }

    function tick() {
      update();
      draw();
      updateReadout();
      requestAnimationFrame(tick);
    }

    document.getElementById('run').addEventListener('click', (e) => {
      state.running = !state.running;
      e.currentTarget.textContent = state.running ? 'Pause' : 'Run';
    });
    document.getElementById('reset').addEventListener('click', () => {
      state.t = 0; state.iHist = []; state.running = false;
      document.getElementById('run').textContent = 'Run';
    });
    document.getElementById('toggle').addEventListener('click', (e) => {
      state.building = !state.building; state.t = 0; state.iHist = [];
      e.currentTarget.textContent = state.building ? 'Build-up' : 'Decay';
    });

    document.getElementById('res').addEventListener('input', e => { state.R = parseFloat(e.target.value); document.getElementById('resVal').textContent = state.R.toFixed(0); });
    document.getElementById('ind').addEventListener('input', e => { state.L = parseFloat(e.target.value); document.getElementById('indVal').textContent = state.L.toFixed(2); });
    document.getElementById('volt').addEventListener('input', e => { state.V0 = parseFloat(e.target.value); document.getElementById('voltVal').textContent = state.V0.toFixed(1); });
    document.getElementById('speed').addEventListener('input', e => { state.speed = parseFloat(e.target.value); document.getElementById('speedVal').textContent = `${state.speed.toFixed(1)}x`; });

    document.querySelectorAll('[data-preset]').forEach(btn => {
      btn.addEventListener('click', () => {
        const preset = btn.dataset.preset;
        if (preset === 'fast') { state.R = 300; state.L = 0.05; state.V0 = 6; }
        if (preset === 'balanced') { state.R = 100; state.L = 0.1; state.V0 = 5; }
        if (preset === 'slow') { state.R = 30; state.L = 0.5; state.V0 = 8; }

        document.getElementById('res').value = state.R.toString();
        document.getElementById('ind').value = state.L.toFixed(2);
        document.getElementById('volt').value = state.V0.toFixed(1);
        document.getElementById('resVal').textContent = state.R.toFixed(0);
        document.getElementById('indVal').textContent = state.L.toFixed(2);
        document.getElementById('voltVal').textContent = state.V0.toFixed(1);
        state.t = 0; state.iHist = [];
      });
    });

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    tick();
  </script>
</body>
</html>
