<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heat Capacity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(12, 18, 30, 0.82);
      --ink: #f8fafc;
      --muted: #94a3b8;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --accent-3: #22c55e;
      --line: rgba(255,255,255,0.08);
      --mono: "JetBrains Mono", monospace;
    }
    body.light {
      --bg: #f5f7fa;
      --ink: #0f172a;
      --muted: #475569;
      --line: rgba(15, 23, 42, 0.12);
      --panel: rgba(255,255,255,0.9);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", sans-serif;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px); background: rgba(8, 12, 20, 0.7);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar a { color: var(--ink); text-decoration: none; font-weight: 600; }
    .toggle {
      display: inline-flex; gap: 8px; align-items: center; padding: 8px 14px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(14, 20, 32, 0.8);
      cursor: pointer; color: var(--ink);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .toggle:hover { transform: translateY(-1px); border-color: rgba(106,215,255,0.5); box-shadow: 0 0 12px rgba(106,215,255,0.25); }

    header { padding: 24px 20px 8px; display: flex; gap: 12px; align-items: center; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
    header .subtitle { color: var(--muted); font-size: 13px; }

    .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; padding: 16px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
    }
    .canvas-wrap { position: relative; }
    canvas { width: 100%; height: clamp(360px, 56vh, 560px); background: #0b0f14; border-radius: 14px; border: 1px solid var(--line); }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .control {
      background: #0f151c;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .control label { display: block; margin-bottom: 6px; color: var(--ink); }
    .control input[type="range"] { width: 100%; }
    .control select { width: 100%; background: #0c1116; border: 1px solid var(--line); color: var(--ink); padding: 6px; border-radius: 6px; }
    .control .row { display: flex; justify-content: space-between; }
    .control .value { font-weight: 600; color: var(--ink); }

    .button-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line); background: rgba(14, 20, 32, 0.9); color: var(--ink);
      padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(246,199,107,0.7); box-shadow: 0 0 12px rgba(246,199,107,0.2); }

    .data-panel { padding: 0; background: transparent; border: none; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 8px; }
    .data-card { background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
    .data-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .data-label::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .data-value { font-size: 1rem; font-weight: 700; font-family: var(--mono); }
    .data-value.blue { color: var(--accent); }
    .data-value.orange { color: var(--accent-2); }
    .data-value.green { color: var(--accent-3); }

    .formula {
      background: linear-gradient(135deg, rgba(106,215,255,0.18), rgba(106,215,255,0.05));
      border: 1px solid rgba(106,215,255,0.5);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--ink);
      line-height: 1.5;
    }

    footer { padding: 0 16px 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/index.html">← Back to Library</a>
    <button class="toggle" id="themeToggle">Light/Dark</button>
  </div>
  <header>
    <h1>Heat Capacity</h1>
    <div class="subtitle">Q = mcΔT — energy required to change temperature</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="canvas-wrap">
        <canvas id="scene" width="960" height="460"></canvas>
      </div>
      <div class="data-panel" id="readout"></div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="control">
          <label>Simulation</label>
          <div class="button-row">
            <button class="btn" id="playPause">Pause</button>
            <button class="btn" id="reset">Reset</button>
          </div>
        </div>
        <div class="control">
          <label>Animation Speed</label>
          <input id="speed" type="range" min="0.2" max="2" step="0.05" value="1" />
          <div class="row"><span>0.2x</span><span id="speedVal" class="value">1.00x</span><span>2.0x</span></div>
        </div>
        <div class="control">
          <label>Mass (g)</label>
          <input id="mass" type="range" min="10" max="1000" step="10" value="100" />
          <div class="row"><span>10</span><span id="massVal" class="value">100 g</span><span>1000</span></div>
        </div>
        <div class="control">
          <label>Material</label>
          <select id="material">
            <option value="water">Water (4.18 J/g·K)</option>
            <option value="iron">Iron (0.45 J/g·K)</option>
            <option value="aluminum">Aluminum (0.90 J/g·K)</option>
            <option value="copper">Copper (0.39 J/g·K)</option>
            <option value="gold">Gold (0.13 J/g·K)</option>
          </select>
        </div>
        <div class="control">
          <label>Initial Temperature (°C)</label>
          <input id="initTemp" type="range" min="0" max="100" step="1" value="20" />
          <div class="row"><span>0</span><span id="initVal" class="value">20 °C</span><span>100</span></div>
        </div>
        <div class="control">
          <label>Heat Added (J)</label>
          <input id="heat" type="range" min="0" max="50000" step="500" value="10000" />
          <div class="row"><span>0</span><span id="heatVal" class="value">10000 J</span><span>50000</span></div>
        </div>
        <div class="control">
          <label>Display Options</label>
          <div class="checks">
            <label><input id="showGrid" type="checkbox" checked /> Grid</label>
            <label><input id="showFlame" type="checkbox" checked /> Burner</label>
            <label><input id="showThermo" type="checkbox" checked /> Thermometer</label>
            <label><input id="showLabels" type="checkbox" checked /> Labels</label>
            <label><input id="showFlux" type="checkbox" /> Heat flux arrows</label>
            <label><input id="showChart" type="checkbox" checked /> Temp-time chart</label>
          </div>
        </div>
        <div class="control">
          <div class="formula">
            <div><strong>Heat:</strong> <span style="font-family: var(--mono);">Q = mcΔT</span></div>
            <div><strong>ΔT:</strong> <span style="font-family: var(--mono);">ΔT = Q/(mc)</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    Tip: Larger mass or higher specific heat requires more energy to raise the temperature.
  </footer>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const materials = {
      water: { c: 4.18, color: '#3498db' },
      iron: { c: 0.45, color: '#9ca3af' },
      aluminum: { c: 0.90, color: '#cbd5f5' },
      copper: { c: 0.39, color: '#f59e0b' },
      gold: { c: 0.13, color: '#facc15' }
    };

    const state = {
      mass: 100,
      material: 'water',
      initT: 20,
      Q: 10000,
      tempDisplay: 20,
      speed: 1,
      running: true,
      showGrid: true,
      showFlame: true,
      showThermo: true,
      showLabels: true,
      showFlux: false,
      showChart: true,
      t: 0
    };
    const tempHistory = [];

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function computeTemps() {
      const c = materials[state.material].c;
      const dT = state.Q / (state.mass * c);
      const Tf = state.initT + dT;
      return { c, dT, Tf };
    }

    function drawBackground() {
      const isLight = document.body.classList.contains('light');
      const grad = ctx.createLinearGradient(0, 0, canvas.clientWidth, canvas.clientHeight);
      if (isLight) {
        grad.addColorStop(0, '#f8fafc');
        grad.addColorStop(0.55, '#e2e8f0');
        grad.addColorStop(1, '#f1f5f9');
      } else {
        grad.addColorStop(0, '#05070e');
        grad.addColorStop(0.6, '#0a0f1f');
        grad.addColorStop(1, '#0b1224');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);

      if (!state.showGrid) return;
      ctx.strokeStyle = isLight ? 'rgba(15,23,42,0.08)' : 'rgba(148,163,184,0.08)';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.clientWidth; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.clientHeight); ctx.stroke();
      }
      for (let y = 0; y < canvas.clientHeight; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.clientWidth, y); ctx.stroke();
      }
    }

    function drawBeaker(cx, cy, w, h) {
      ctx.strokeStyle = 'rgba(226,232,240,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - w / 2, cy - h / 2 + 10);
      ctx.lineTo(cx - w / 2, cy + h / 2);
      ctx.lineTo(cx + w / 2, cy + h / 2);
      ctx.lineTo(cx + w / 2, cy - h / 2 + 10);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(148,163,184,0.5)';
      ctx.beginPath();
      ctx.moveTo(cx - w / 2 - 6, cy - h / 2 + 10);
      ctx.lineTo(cx + w / 2 + 6, cy - h / 2 + 10);
      ctx.stroke();
    }

    function drawLiquid(cx, cy, w, h, fill, Tf) {
      const tempColor = Tf < 50 ? '#6ad7ff' : Tf < 80 ? '#f6c76b' : '#ff6b6b';
      const base = materials[state.material].color;
      const grad = ctx.createLinearGradient(0, cy - h / 2 + h * (1 - fill), 0, cy + h / 2);
      grad.addColorStop(0, base);
      grad.addColorStop(1, tempColor);
      ctx.fillStyle = grad;
      ctx.fillRect(cx - w / 2 + 2, cy + h / 2 - h * fill, w - 4, h * fill - 2);
    }

    function drawFlame(cx, cy, w, h) {
      if (!state.showFlame) return;
      const flameH = Math.min(90, state.Q / 800);
      if (flameH < 6) return;
      const grad = ctx.createRadialGradient(cx, cy + h / 2 + 12, 0, cx, cy + h / 2 + 12, flameH);
      grad.addColorStop(0, 'rgba(255, 170, 0, 0.8)');
      grad.addColorStop(0.5, 'rgba(255, 80, 0, 0.45)');
      grad.addColorStop(1, 'rgba(255, 80, 0, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(cx - 30, cy + h / 2 + 10);
      ctx.lineTo(cx, cy + h / 2 + 10 - flameH);
      ctx.lineTo(cx + 30, cy + h / 2 + 10);
      ctx.closePath();
      ctx.fill();
    }

    function drawThermometer(cx, cy, h, Tf) {
      if (!state.showThermo) return;
      const x = cx + 150;
      const y = cy - h / 2;
      ctx.strokeStyle = 'rgba(148,163,184,0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x, y + h);
      ctx.stroke();
      const tempNorm = Math.min(1, Tf / 120);
      ctx.strokeStyle = '#f87171';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x, y + h);
      ctx.lineTo(x, y + h - tempNorm * h);
      ctx.stroke();
      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc(x, y + h + 10, 6, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawLabels(cx, cy, w, h, Tf, dT) {
      if (!state.showLabels) return;
      ctx.fillStyle = 'rgba(248,250,252,0.85)';
      ctx.font = '12px Inter, sans-serif';
      ctx.fillText(`T = ${Tf.toFixed(1)}°C`, cx - 36, cy - h / 2 - 12);
      ctx.fillText(`ΔT = ${dT.toFixed(1)} K`, cx - 40, cy + h / 2 + 24);
    }

    function drawFlux(cx, cy, w, h) {
      if (!state.showFlux) return;
      ctx.save();
      ctx.strokeStyle = 'rgba(106,215,255,0.7)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        const x = cx - w / 2 - 20 + i * 12;
        const y = cy + h / 2 + 8;
        ctx.beginPath();
        ctx.moveTo(x, y + 18);
        ctx.lineTo(x, y - 10);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y - 10);
        ctx.lineTo(x - 4, y - 2);
        ctx.lineTo(x + 4, y - 2);
        ctx.closePath();
        ctx.fillStyle = 'rgba(106,215,255,0.7)';
        ctx.fill();
      }
      ctx.restore();
    }

    function drawMiniChart(x, y, w, h) {
      const maxPoints = 160;
      if (tempHistory.length > maxPoints) tempHistory.splice(0, tempHistory.length - maxPoints);
      const minT = Math.min(...tempHistory, state.initT);
      const maxT = Math.max(...tempHistory, state.initT + 10);
      const pad = 6;
      ctx.save();
      ctx.fillStyle = 'rgba(8,12,20,0.7)';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = 'rgba(148,163,184,0.3)';
      ctx.strokeRect(x, y, w, h);
      ctx.strokeStyle = 'rgba(106,215,255,0.7)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      tempHistory.forEach((T, i) => {
        const px = x + pad + (i / (maxPoints - 1)) * (w - 2 * pad);
        const py = y + h - pad - ((T - minT) / (maxT - minT || 1)) * (h - 2 * pad);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.stroke();

      if (state.material === 'water') {
        const yPhase = y + h - pad - ((100 - minT) / (maxT - minT || 1)) * (h - 2 * pad);
        ctx.strokeStyle = 'rgba(248,113,113,0.7)';
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.moveTo(x + pad, yPhase);
        ctx.lineTo(x + w - pad, yPhase);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(248,113,113,0.8)';
        ctx.font = '10px Inter, sans-serif';
        ctx.fillText('100°C phase change', x + 8, Math.max(y + 10, yPhase - 4));
      }

      ctx.fillStyle = 'rgba(248,250,252,0.75)';
      ctx.font = '10px Inter, sans-serif';
      ctx.fillText('Temp vs Time', x + 8, y + 12);
      ctx.restore();
    }

    function draw() {
      drawBackground();
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const cx = w / 2 - 40;
      const cy = h / 2 + 10;
      const beakerW = 180;
      const beakerH = 240;
      const fill = Math.min(0.95, state.mass / 1000);
      const { dT, Tf } = computeTemps();
      const displayT = state.tempDisplay;

      drawBeaker(cx, cy, beakerW, beakerH);
      drawLiquid(cx, cy, beakerW, beakerH, fill, displayT);
      drawFlame(cx, cy, beakerW, beakerH);
      drawThermometer(cx, cy, beakerH, displayT);
      drawLabels(cx, cy, beakerW, beakerH, displayT, dT);
      drawFlux(cx, cy, beakerW, beakerH);
      if (state.showChart) drawMiniChart(cx + 120, cy - beakerH / 2 - 10, 220, 90);
    }

    function updateReadout() {
      const { c, dT } = computeTemps();
      const Tf = state.tempDisplay;
      document.getElementById('readout').innerHTML = `
        <div class="data-grid">
          <div class="data-card"><span class="data-label">Final Temp</span><span class="data-value orange">${Tf.toFixed(1)} °C</span></div>
          <div class="data-card"><span class="data-label">ΔT</span><span class="data-value blue">${dT.toFixed(1)} K</span></div>
          <div class="data-card"><span class="data-label">Specific Heat</span><span class="data-value green">${c.toFixed(2)} J/g·K</span></div>
          <div class="data-card"><span class="data-label">Mass</span><span class="data-value blue">${state.mass.toFixed(0)} g</span></div>
          <div class="data-card"><span class="data-label">Heat Input</span><span class="data-value orange">${state.Q.toFixed(0)} J</span></div>
        </div>
      `;
    }

    function tick() {
      if (state.running) {
        state.t += 0.02 * state.speed;
        const { Tf } = computeTemps();
        const alpha = 1 - Math.exp(-0.02 * state.speed * 1.2);
        state.tempDisplay += (Tf - state.tempDisplay) * alpha;
        tempHistory.push(state.tempDisplay);
      }
      draw();
      updateReadout();
      requestAnimationFrame(tick);
    }

    document.getElementById('mass').addEventListener('input', e => {
      state.mass = parseFloat(e.target.value);
      document.getElementById('massVal').textContent = `${state.mass.toFixed(0)} g`;
    });
    document.getElementById('material').addEventListener('change', e => {
      state.material = e.target.value;
      tempHistory.length = 0;
    });
    document.getElementById('initTemp').addEventListener('input', e => {
      state.initT = parseFloat(e.target.value);
      document.getElementById('initVal').textContent = `${state.initT.toFixed(0)} °C`;
      if (!state.running) state.tempDisplay = state.initT;
    });
    document.getElementById('heat').addEventListener('input', e => {
      state.Q = parseFloat(e.target.value);
      document.getElementById('heatVal').textContent = `${state.Q.toFixed(0)} J`;
    });

    document.getElementById('showGrid').addEventListener('change', e => state.showGrid = e.target.checked);
    document.getElementById('showFlame').addEventListener('change', e => state.showFlame = e.target.checked);
    document.getElementById('showThermo').addEventListener('change', e => state.showThermo = e.target.checked);
    document.getElementById('showLabels').addEventListener('change', e => state.showLabels = e.target.checked);
    document.getElementById('showFlux').addEventListener('change', e => state.showFlux = e.target.checked);
    document.getElementById('showChart').addEventListener('change', e => state.showChart = e.target.checked);

    document.getElementById('speed').addEventListener('input', e => {
      state.speed = parseFloat(e.target.value);
      document.getElementById('speedVal').textContent = `${state.speed.toFixed(2)}x`;
    });

    document.getElementById('playPause').addEventListener('click', e => {
      state.running = !state.running;
      e.target.textContent = state.running ? 'Pause' : 'Play';
    });

    document.getElementById('reset').addEventListener('click', () => {
      state.mass = 100;
      state.material = 'water';
      state.initT = 20;
      state.Q = 10000;
      state.tempDisplay = 20;
      state.speed = 1;
      state.running = true;
      state.showGrid = true;
      state.showFlame = true;
      state.showThermo = true;
      state.showLabels = true;
      state.showFlux = false;
      state.showChart = true;
      tempHistory.length = 0;
      document.getElementById('mass').value = 100;
      document.getElementById('material').value = 'water';
      document.getElementById('initTemp').value = 20;
      document.getElementById('heat').value = 10000;
      document.getElementById('speed').value = 1;
      document.getElementById('massVal').textContent = '100 g';
      document.getElementById('initVal').textContent = '20 °C';
      document.getElementById('heatVal').textContent = '10000 J';
      document.getElementById('speedVal').textContent = '1.00x';
      document.getElementById('showGrid').checked = true;
      document.getElementById('showFlame').checked = true;
      document.getElementById('showThermo').checked = true;
      document.getElementById('showLabels').checked = true;
      document.getElementById('showFlux').checked = false;
      document.getElementById('showChart').checked = true;
      document.getElementById('playPause').textContent = 'Pause';
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('light');
    });

    window.addEventListener('resize', resize);
    resize();
    tick();
  </script>
</body>
</html>
