<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Electrostatics</title>
  <style>
    :root {
      --bg1: #0c131d;
      --bg2: #142131;
      --panel: #111c2b;
      --panel-2: #0f1a27;
      --text: #f5f8fd;
      --muted: #a9b6c6;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --red: #ff6b6b;
      --blue: #6ad7ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(1100px 600px at 20% 10%, #1b2c42 0%, var(--bg1) 45%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
    }
    .app { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 8px 4px 18px; border-bottom: 1px solid #20324a;
    }
    header h1 { margin: 0; font-size: 28px; letter-spacing: 0.4px; }
    header p { margin: 4px 0 0; color: var(--muted); }
    .pill {
      display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-radius: 999px; background: #0b1420; border: 1px solid #223753;
      color: var(--muted); font-size: 12px;
    }
    .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; margin-top: 18px; }
    .panel {
      background: linear-gradient(160deg, var(--panel), var(--panel-2));
      border: 1px solid #20324a; border-radius: 14px; padding: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }
    .panel h2 { margin: 0 0 12px; font-size: 18px; color: var(--accent-2); }
    canvas {
      width: 100%; height: 360px; background: #0b1420;
      border: 1px solid #20324a; border-radius: 10px; cursor: crosshair;
    }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
    .control {
      background: #0f1a27; border: 1px solid #20324a; border-radius: 10px; padding: 10px;
    }
    .control label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    input[type="range"], button { width: 100%; }
    button {
      padding: 8px; border-radius: 8px; border: 1px solid #2a3f59; background: #0b1420;
      color: var(--text); font-family: inherit; cursor: pointer;
    }
    .toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-top: 6px; }
    .readouts { display: grid; gap: 10px; margin-top: 12px; }
    .readout {
      background: #0f1a27; border: 1px solid #20324a; border-radius: 10px;
      padding: 10px 12px; display: grid; gap: 6px; font-size: 13px;
    }
    .readout .title { color: var(--accent-2); font-weight: 700; font-size: 12px; letter-spacing: 0.4px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 4px 0; }
    .value { color: var(--accent); font-weight: 600; }
    .formula {
      font-family: "Consolas", "Courier New", monospace; color: #c3d1e5; font-size: 12px; line-height: 1.6;
    }
    .footer { margin-top: 16px; color: var(--muted); font-size: 12px; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } .controls { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Electrostatics</h1>
        <p>Electric fields and equipotentials from point charges</p>
      </div>
      <div class="pill">Field vectors · Equipotentials · Superposition</div>
    </header>

    <div class="grid">
      <div class="panel">
        <h2>Charge Field</h2>
        <canvas id="eCanvas" width="600" height="360" aria-label="Electrostatics"></canvas>
      </div>

      <div class="panel">
        <h2>Controls & Readouts</h2>
        <div class="controls">
          <div class="control">
            <label>Add Charges</label>
            <button id="addPos">Add +Q</button>
            <button id="addNeg" style="margin-top:8px;">Add -Q</button>
          </div>
          <div class="control">
            <label>Charge Magnitude (µC)</label>
            <input type="range" id="qMag" min="1" max="10" step="0.5" value="5" />
            <div class="row"><span class="muted">Q</span><span class="value" id="qValue">5 µC</span></div>
          </div>
          <div class="control">
            <label>Display Options</label>
            <label class="toggle"><input type="checkbox" id="showVectors" checked> Show field vectors</label>
            <label class="toggle"><input type="checkbox" id="showEquip" checked> Show equipotentials</label>
          </div>
          <div class="control">
            <label>Presets</label>
            <button id="presetDipole">Preset: Dipole</button>
            <button id="presetCap" style="margin-top:8px;">Preset: Capacitor</button>
          </div>
          <div class="control">
            <label>Clear</label>
            <button id="clearAll">Clear All</button>
          </div>
        </div>

        <div class="readouts">
          <div class="readout">
            <div class="title">Field Meter</div>
            <div class="row"><span>E</span><span class="value" id="eValue">0 N/C</span></div>
            <div class="row"><span>V</span><span class="value" id="vValue">0 V</span></div>
          </div>
          <div class="readout">
            <div class="title">Formulas</div>
            <div class="formula">
              E = kQ/r²
              <br>V = kQ/r
              <br>Superposition: ΣE
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">Click on the canvas to place charges (after selecting +Q or -Q).</div>
  </div>

  <script>
    const k = 8.99e9;
    const state = {
      charges: [],
      qMag: 5e-6,
      placing: 1,
      showVectors: true,
      showEquip: true,
      cursor: { x: 300, y: 180 }
    };

    const dom = {
      addPos: document.getElementById('addPos'),
      addNeg: document.getElementById('addNeg'),
      qMag: document.getElementById('qMag'),
      qValue: document.getElementById('qValue'),
      showVectors: document.getElementById('showVectors'),
      showEquip: document.getElementById('showEquip'),
      presetDipole: document.getElementById('presetDipole'),
      presetCap: document.getElementById('presetCap'),
      clearAll: document.getElementById('clearAll'),
      eValue: document.getElementById('eValue'),
      vValue: document.getElementById('vValue')
    };

    const canvas = document.getElementById('eCanvas');
    const ctx = canvas.getContext('2d');

    function fieldAt(x, y) {
      let Ex = 0, Ey = 0, V = 0;
      for (const c of state.charges) {
        const dx = x - c.x;
        const dy = y - c.y;
        const r2 = dx*dx + dy*dy + 20;
        const r = Math.sqrt(r2);
        const E = k * c.q / r2;
        Ex += E * dx / r;
        Ey += E * dy / r;
        V += k * c.q / r;
      }
      return { Ex, Ey, V };
    }

    function drawVectors() {
      if (!state.showVectors) return;
      ctx.strokeStyle = '#6ad7ff';
      ctx.lineWidth = 1;
      for (let x = 40; x < canvas.width; x += 60) {
        for (let y = 40; y < canvas.height; y += 60) {
          const { Ex, Ey } = fieldAt(x, y);
          const len = Math.min(20, Math.hypot(Ex, Ey) * 1e-9);
          const angle = Math.atan2(Ey, Ex);
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + len * Math.cos(angle), y + len * Math.sin(angle));
          ctx.stroke();
        }
      }
    }

    function drawEquipotentials() {
      if (!state.showEquip) return;
      ctx.strokeStyle = 'rgba(246,199,107,0.5)';
      ctx.lineWidth = 1;
      for (let r = 60; r < 180; r += 30) {
        ctx.beginPath();
        ctx.arc(canvas.width/2, canvas.height/2, r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawCharges() {
      for (const c of state.charges) {
        ctx.fillStyle = c.q > 0 ? '#ff6b6b' : '#6ad7ff';
        ctx.beginPath();
        ctx.arc(c.x, c.y, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0b1420';
        ctx.fillText(c.q > 0 ? '+' : '-', c.x - 4, c.y + 4);
      }
    }

    function updateReadouts() {
      const { Ex, Ey, V } = fieldAt(state.cursor.x, state.cursor.y);
      const E = Math.hypot(Ex, Ey);
      dom.eValue.textContent = `${E.toExponential(2)} N/C`;
      dom.vValue.textContent = `${V.toExponential(2)} V`;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0b1420';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawEquipotentials();
      drawVectors();
      drawCharges();
      updateReadouts();
    }

    function addCharge(x, y, sign) {
      state.charges.push({ x, y, q: sign * state.qMag });
      draw();
    }

    function bind() {
      dom.addPos.addEventListener('click', () => state.placing = 1);
      dom.addNeg.addEventListener('click', () => state.placing = -1);
      dom.qMag.addEventListener('input', () => {
        state.qMag = Number(dom.qMag.value) * 1e-6;
        dom.qValue.textContent = `${dom.qMag.value} µC`;
      });
      dom.showVectors.addEventListener('change', () => {
        state.showVectors = dom.showVectors.checked;
        draw();
      });
      dom.showEquip.addEventListener('change', () => {
        state.showEquip = dom.showEquip.checked;
        draw();
      });
      dom.clearAll.addEventListener('click', () => {
        state.charges = [];
        draw();
      });
      dom.presetDipole.addEventListener('click', () => {
        state.charges = [
          { x: canvas.width/2 - 60, y: canvas.height/2, q: 5e-6 },
          { x: canvas.width/2 + 60, y: canvas.height/2, q: -5e-6 }
        ];
        draw();
      });
      dom.presetCap.addEventListener('click', () => {
        state.charges = [];
        for (let y = 80; y < canvas.height - 80; y += 40) {
          state.charges.push({ x: canvas.width/2 - 120, y, q: 5e-6 });
          state.charges.push({ x: canvas.width/2 + 120, y, q: -5e-6 });
        }
        draw();
      });

      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        state.cursor.x = e.clientX - rect.left;
        state.cursor.y = e.clientY - rect.top;
        updateReadouts();
      });
      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        addCharge(x, y, state.placing);
      });
    }

    bind();
    draw();
  </script>
</body>
</html>
