<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Friction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f1a;
      --panel: rgba(12, 18, 30, 0.86);
      --ink: #f8fafc;
      --muted: #94a3b8;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --accent-3: #22c55e;
      --line: rgba(255,255,255,0.08);
      --mono: "JetBrains Mono", monospace;
    }
    body.light {
      --bg: #f5f7fa;
      --panel: rgba(255,255,255,0.92);
      --ink: #0f172a;
      --muted: #475569;
      --line: rgba(15, 23, 42, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(900px 600px at 10% -10%, #1a2433 0%, var(--bg) 60%);
      color: var(--ink);
      font-family: "Inter", sans-serif;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px); background: rgba(8, 12, 20, 0.7);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar a { color: var(--ink); text-decoration: none; font-weight: 600; }
    .toggle {
      display: inline-flex; gap: 8px; align-items: center; padding: 8px 14px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(14, 20, 32, 0.8);
      cursor: pointer; color: var(--ink);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .toggle:hover { transform: translateY(-1px); border-color: rgba(106,215,255,0.5); box-shadow: 0 0 12px rgba(106,215,255,0.25); }

    header { padding: 22px 20px 8px; display: flex; gap: 12px; align-items: baseline; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
    header .subtitle { color: var(--muted); font-size: 13px; }

    .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; padding: 16px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
    }
    .canvas-wrap { position: relative; }
    canvas { width: 100%; height: clamp(360px, 56vh, 560px); background: #0b0f14; border-radius: 14px; border: 1px solid var(--line); }

    .button-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .btn {
      border: 1px solid var(--line); background: rgba(14, 20, 32, 0.9); color: var(--ink);
      padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(246,199,107,0.7); box-shadow: 0 0 12px rgba(246,199,107,0.2); }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .control {
      background: #0f151c;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .control label { display: block; margin-bottom: 6px; color: var(--ink); }
    .control input[type="range"] { width: 100%; }
    .control select { width: 100%; background: #0c1116; border: 1px solid var(--line); color: var(--ink); padding: 6px; border-radius: 6px; }
    .control .row { display: flex; justify-content: space-between; }

    .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }

    .data-panel { padding: 0; background: transparent; border: none; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 8px; }
    .data-card { background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
    .data-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .data-label::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .data-value { font-size: 1rem; font-weight: 700; font-family: var(--mono); }
    .data-value.blue { color: var(--accent); }
    .data-value.orange { color: var(--accent-2); }
    .data-value.green { color: var(--accent-3); }

    .formula {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(14, 20, 32, 0.9), rgba(12, 18, 30, 0.7));
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .formula strong { color: var(--ink); }

    footer { padding: 0 16px 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/index.html">← Back to Library</a>
    <button class="toggle" id="themeToggle">Light/Dark</button>
  </div>
  <header>
    <h1>Friction</h1>
    <div class="subtitle">Static vs kinetic friction on an inclined plane</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="canvas-wrap">
        <canvas id="scene" width="960" height="460"></canvas>
      </div>
      <div class="button-row">
        <button class="btn" id="toggleRun">Pause</button>
        <button class="btn" id="reset">Reset</button>
      </div>
      <div class="data-panel" id="readout" style="margin-top: 10px;"></div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="control">
          <label>Applied Force F (N)</label>
          <input id="force" type="range" min="0" max="200" step="1" value="30" />
          <div class="row"><span>0</span><span id="forceVal">30</span><span>200</span></div>
        </div>
        <div class="control">
          <label>Normal Force N (N)</label>
          <input id="normal" type="range" min="10" max="300" step="1" value="98" />
          <div class="row"><span>10</span><span id="normalVal">98</span><span>300</span></div>
        </div>
        <div class="control">
          <label>Static μs</label>
          <input id="muS" type="range" min="0.05" max="1.5" step="0.05" value="0.4" />
          <div class="row"><span>0.05</span><span id="muSVal">0.40</span><span>1.5</span></div>
        </div>
        <div class="control">
          <label>Kinetic μk</label>
          <input id="muK" type="range" min="0.05" max="1.5" step="0.05" value="0.3" />
          <div class="row"><span>0.05</span><span id="muKVal">0.30</span><span>1.5</span></div>
        </div>
        <div class="control">
          <label>Plane Angle θ (°)</label>
          <input id="angle" type="range" min="0" max="60" step="1" value="15" />
          <div class="row"><span>0</span><span id="angleVal">15°</span><span>60</span></div>
        </div>
        <div class="control">
          <label>Surface Type</label>
          <select id="surface">
            <option value="wood">Wood</option>
            <option value="ice">Ice</option>
            <option value="rubber">Rubber</option>
            <option value="metal">Metal</option>
            <option value="sand">Sand</option>
          </select>
        </div>
        <div class="control">
          <label>Display Options</label>
          <div class="checks">
            <label><input id="showFbd" type="checkbox" checked /> Force arrows</label>
            <label><input id="showValues" type="checkbox" checked /> Values overlay</label>
          </div>
        </div>
      </div>

      <div class="formula">
        <strong>Friction Laws</strong><br>
        Static: Fs ≤ μs N · Kinetic: Fk = μk N · Net along plane: Fnet = Fapp − Fk − mg sinθ
      </div>
    </div>
  </div>

  <footer>
    Increase θ or lower μ to transition from static to kinetic friction.
  </footer>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const surfaces = {
      wood: { mu_s: 0.4, mu_k: 0.3, color: '#8B5A2B' },
      ice: { mu_s: 0.02, mu_k: 0.01, color: '#93c5fd' },
      rubber: { mu_s: 0.9, mu_k: 0.7, color: '#1f2937' },
      metal: { mu_s: 0.6, mu_k: 0.4, color: '#64748b' },
      sand: { mu_s: 0.8, mu_k: 0.6, color: '#d6b37a' }
    };

    const state = {
      appliedForce: 30,
      normalForce: 98,
      staticMu: 0.4,
      kineticMu: 0.3,
      angle: 15,
      surfaceType: 'wood',
      position: 0,
      velocity: 0,
      isMoving: false,
      showFbd: true,
      showValues: true,
      running: true,
      lastTime: performance.now()
    };

    let surfacePattern = null;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      updateSurfacePattern();
    }

    function updateSurfacePattern() {
      const tile = document.createElement('canvas');
      tile.width = 80; tile.height = 24;
      const tctx = tile.getContext('2d');
      tctx.fillStyle = surfaces[state.surfaceType].color;
      tctx.fillRect(0, 0, tile.width, tile.height);
      tctx.strokeStyle = 'rgba(255,255,255,0.08)';
      for (let i = 0; i < 6; i++) {
        const y = 4 + i * 3;
        tctx.beginPath();
        tctx.moveTo(0, y);
        tctx.lineTo(tile.width, y + (i % 2 === 0 ? 2 : -2));
        tctx.stroke();
      }
      surfacePattern = ctx.createPattern(tile, 'repeat');
    }

    function computeForces() {
      const g = 9.81;
      const theta = state.angle * Math.PI / 180;
      const safeCos = Math.max(0.05, Math.cos(theta));
      const mass = state.normalForce / (g * safeCos);
      const gravityParallel = mass * g * Math.sin(theta);
      const drive = state.appliedForce - gravityParallel;
      const maxStatic = state.staticMu * state.normalForce;
      const kinetic = state.kineticMu * state.normalForce;
      let friction = 0;
      let status = 'STATIONARY';

      if (!state.isMoving) {
        if (Math.abs(drive) <= maxStatic) {
          friction = -drive;
          status = 'STATIONARY';
        } else {
          friction = -Math.sign(drive) * kinetic;
          state.isMoving = true;
          status = 'MOVING (kinetic)';
        }
      } else {
        const dir = Math.sign(state.velocity || drive || 1);
        friction = -dir * kinetic;
        status = 'MOVING (kinetic)';
        if (Math.abs(state.velocity) < 0.02 && Math.abs(drive) < maxStatic * 0.85) {
          state.isMoving = false;
          status = 'STOPPING';
        }
      }

      const net = drive + friction;
      const accel = net / mass;
      return { mass, gravityParallel, drive, maxStatic, kinetic, friction, net, accel, status };
    }

    function drawBackground() {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const grad = ctx.createLinearGradient(0, 0, w, h);
      grad.addColorStop(0, 'rgba(10,16,26,0.95)');
      grad.addColorStop(1, 'rgba(6,9,15,0.95)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      for (let x = 0; x < w; x += 80) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
      }
    }

    function drawScene(forces) {
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const baseX = w * 0.18;
      const baseY = h * 0.72;
      const planeLen = w * 0.62;
      const planeThickness = 26;
      const theta = state.angle * Math.PI / 180;
      const blockW = 72;
      const blockH = 48;

      const minPos = 20;
      const maxPos = planeLen - blockW - 20;
      state.position = Math.max(minPos, Math.min(maxPos, state.position));

      ctx.save();
      ctx.translate(baseX, baseY);
      ctx.rotate(-theta);

      ctx.fillStyle = surfacePattern || surfaces[state.surfaceType].color;
      ctx.fillRect(0, 0, planeLen, planeThickness);
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.fillRect(0, 0, planeLen, 4);

      const blockX = 80 + state.position;
      const blockY = -blockH;
      const blockGrad = ctx.createLinearGradient(blockX, blockY, blockX + blockW, blockY + blockH);
      blockGrad.addColorStop(0, '#f8fafc');
      blockGrad.addColorStop(1, '#cbd5f5');
      ctx.fillStyle = blockGrad;
      ctx.fillRect(blockX, blockY, blockW, blockH);
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.strokeRect(blockX, blockY, blockW, blockH);

      if (state.showFbd) {
        const centerX = blockX + blockW / 2;
        const centerY = blockY + blockH / 2;
        const appliedLen = Math.min(90, Math.abs(forces.drive) * 0.8);
        const frictionLen = Math.min(90, Math.abs(forces.friction) * 0.8);
        drawArrow(centerX, centerY, centerX + Math.sign(forces.drive || 1) * appliedLen, centerY, '#6ad7ff');
        drawArrow(centerX, centerY + 10, centerX - Math.sign(forces.friction || 1) * frictionLen, centerY + 10, '#f6c76b');
        drawArrow(centerX, centerY, centerX, centerY - 50, '#22c55e');
      }
      ctx.restore();

      if (state.showValues) {
        ctx.fillStyle = 'rgba(148,163,184,0.9)';
        ctx.font = '12px Inter, sans-serif';
        ctx.fillText(`θ = ${state.angle.toFixed(0)}°`, baseX - 30, baseY - 10);
      }

      if (state.showFbd) {
        drawFbdInset(forces);
      }
    }

    function drawFbdInset(forces) {
      const x = canvas.clientWidth - 120;
      const y = 110;
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.strokeRect(x - 50, y - 50, 100, 100);
      drawArrow(x, y, x, y - 34, '#22c55e');
      drawArrow(x, y, x, y + 34, '#ff6b6b');
      drawArrow(x, y, x + 38, y, '#6ad7ff');
      drawArrow(x, y, x - 30, y, '#f6c76b');
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '10px Inter, sans-serif';
      ctx.fillText('FBD', x - 12, y + 62);
    }

    function drawArrow(x1, y1, x2, y2, color) {
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      const angle = Math.atan2(y2 - y1, x2 - x1);
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - 8 * Math.cos(angle - Math.PI / 6), y2 - 8 * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(x2 - 8 * Math.cos(angle + Math.PI / 6), y2 - 8 * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function update(dt) {
      const forces = computeForces();
      if (state.running) {
        state.velocity += forces.accel * dt;
        state.position += state.velocity * dt * 30;
        if (Math.abs(state.velocity) < 0.0001) state.velocity = 0;
      }
      return forces;
    }

    function updateReadout(forces) {
      document.getElementById('readout').innerHTML = `
        <div class="data-grid">
          <div class="data-card"><span class="data-label">Status</span><span class="data-value blue">${forces.status}</span></div>
          <div class="data-card"><span class="data-label">Applied</span><span class="data-value orange">${state.appliedForce.toFixed(1)} N</span></div>
          <div class="data-card"><span class="data-label">Friction</span><span class="data-value orange">${forces.friction.toFixed(1)} N</span></div>
          <div class="data-card"><span class="data-label">Max Static</span><span class="data-value green">${forces.maxStatic.toFixed(1)} N</span></div>
          <div class="data-card"><span class="data-label">Kinetic</span><span class="data-value green">${forces.kinetic.toFixed(1)} N</span></div>
          <div class="data-card"><span class="data-label">Normal</span><span class="data-value blue">${state.normalForce.toFixed(1)} N</span></div>
          <div class="data-card"><span class="data-label">Velocity</span><span class="data-value blue">${state.velocity.toFixed(2)} m/s</span></div>
          <div class="data-card"><span class="data-label">Net Force</span><span class="data-value orange">${forces.net.toFixed(1)} N</span></div>
        </div>
      `;
    }

    function tick(now) {
      const dt = Math.min(0.03, (now - state.lastTime) / 1000);
      state.lastTime = now;
      const forces = update(dt);
      drawBackground();
      drawScene(forces);
      updateReadout(forces);
      requestAnimationFrame(tick);
    }

    document.getElementById('force').addEventListener('input', e => {
      state.appliedForce = parseFloat(e.target.value);
      document.getElementById('forceVal').textContent = state.appliedForce.toFixed(0);
    });
    document.getElementById('normal').addEventListener('input', e => {
      state.normalForce = parseFloat(e.target.value);
      document.getElementById('normalVal').textContent = state.normalForce.toFixed(0);
    });
    document.getElementById('muS').addEventListener('input', e => {
      state.staticMu = parseFloat(e.target.value);
      document.getElementById('muSVal').textContent = state.staticMu.toFixed(2);
    });
    document.getElementById('muK').addEventListener('input', e => {
      state.kineticMu = parseFloat(e.target.value);
      document.getElementById('muKVal').textContent = state.kineticMu.toFixed(2);
    });
    document.getElementById('angle').addEventListener('input', e => {
      state.angle = parseFloat(e.target.value);
      document.getElementById('angleVal').textContent = `${state.angle.toFixed(0)}°`;
    });
    document.getElementById('surface').addEventListener('change', e => {
      state.surfaceType = e.target.value;
      state.staticMu = surfaces[state.surfaceType].mu_s;
      state.kineticMu = surfaces[state.surfaceType].mu_k;
      document.getElementById('muS').value = state.staticMu;
      document.getElementById('muK').value = state.kineticMu;
      document.getElementById('muSVal').textContent = state.staticMu.toFixed(2);
      document.getElementById('muKVal').textContent = state.kineticMu.toFixed(2);
      updateSurfacePattern();
    });

    document.getElementById('showFbd').addEventListener('change', e => state.showFbd = e.target.checked);
    document.getElementById('showValues').addEventListener('change', e => state.showValues = e.target.checked);
    document.getElementById('toggleRun').addEventListener('click', () => {
      state.running = !state.running;
      document.getElementById('toggleRun').textContent = state.running ? 'Pause' : 'Play';
    });
    document.getElementById('reset').addEventListener('click', () => {
      state.position = 0;
      state.velocity = 0;
      state.isMoving = false;
    });
    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('light');
    });

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
