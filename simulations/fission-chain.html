<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chain Reaction</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/simulation-theme.css" />
  <style>
    :root { --accent: #6ad7ff; --accent-2: #f6c76b; --sim-bg: rgba(10, 16, 26, 0.95); --sim-text: #e9f2ff; --sim-muted: #9fb0c5; --sim-border: rgba(120, 150, 190, 0.18); --panel: rgba(15, 22, 35, 0.92); --shadow: 0 24px 45px rgba(5, 10, 18, 0.35); }
    body { margin: 0; background: radial-gradient(1100px 700px at 10% 0%, rgba(106, 215, 255, 0.12), transparent), radial-gradient(900px 700px at 90% 15%, rgba(246, 199, 107, 0.12), transparent), #0a111c; color: var(--sim-text); font-family: "Space Grotesk", sans-serif; }
    .page { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; border-bottom: 1px solid var(--sim-border); backdrop-filter: blur(10px); background: rgba(8, 12, 20, 0.7); position: sticky; top: 0; z-index: 10; }
    .topbar a { color: var(--sim-text); text-decoration: none; font-weight: 600; }
    header.hero { text-align: center; padding: 34px 20px 18px; }
    header.hero h1 { letter-spacing: 0.08em; text-transform: uppercase; font-size: clamp(1.6rem, 2.4vw, 2.5rem); margin: 0 0 10px; }
    header.hero p { color: var(--sim-muted); margin: 0; }
    .layout { display: grid; grid-template-columns: minmax(0, 1.3fr) minmax(0, 0.8fr); gap: 24px; padding: 12px 28px 18px; }
    .panel { background: var(--panel); border: 1px solid var(--sim-border); border-radius: 18px; box-shadow: var(--shadow); padding: 18px; }
    canvas { width: 100%; height: 420px; background: rgba(6, 10, 18, 0.7); border-radius: 16px; border: 1px solid var(--sim-border); }
    .controls { display: grid; gap: 16px; }
    .control-group { display: grid; gap: 8px; }
    label { font-size: 0.9rem; color: var(--sim-muted); display: flex; justify-content: space-between; gap: 10px; }
    input[type="range"] { width: 100%; }
    .data-panel { display: grid; gap: 6px; font-size: 0.9rem; color: var(--sim-muted); }
    .data-panel strong { color: var(--accent); font-weight: 600; }
    button { background: rgba(12, 18, 28, 0.8); color: var(--sim-text); border: 1px solid var(--sim-border); padding: 10px 14px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    button:hover { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><a href="/">← Physics Simulations</a><span class="toggle">Nuclear Physics</span></div>
    <header class="hero"><h1>Chain Reaction</h1><p>Nuclear fission chain reaction visualization</p></header>
    <div class="layout">
      <div class="panel canvas-wrap"><canvas id="simCanvas"></canvas></div>
      <div class="panel controls">
        <div class="control-group">
          <label>Neutron Energy</label>
          <input type="range" id="energySlider" min="1" max="100" value="50">
        </div>
        <div class="control-group">
          <label>Critical Mass</label>
          <input type="range" id="massSlider" min="10" max="100" value="50">
        </div>
        <button id="fireBtn">Fire Neutron</button>
        <button id="resetBtn">Reset</button>
        <div class="data-panel">
          <div>Fissions: <strong id="fissionVal">0</strong></div>
          <div>Neutrons: <strong id="neutronVal">0</strong></div>
          <div>Status: <strong id="statusVal">Subcritical</strong></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;
    ctx.scale(2, 2);
    const energySlider = document.getElementById('energySlider');
    const massSlider = document.getElementById('massSlider');
    const fireBtn = document.getElementById('fireBtn');
    const resetBtn = document.getElementById('resetBtn');
    let atoms = [];
    let neutrons = [];
    let fissions = 0;
    function init() {
      atoms = [];
      neutrons = [];
      fissions = 0;
      const n = Math.floor(parseFloat(massSlider.value) / 2);
      for (let i = 0; i < n; i++) {
        atoms.push({ x: 100 + Math.random() * (canvas.offsetWidth - 200), y: 50 + Math.random() * (canvas.offsetHeight - 100), fissioned: false });
      }
      updateData();
    }
    function updateData() {
      document.getElementById('fissionVal').textContent = fissions;
      document.getElementById('neutronVal').textContent = neutrons.length;
      const ratio = fissions / Math.max(1, atoms.length);
      document.getElementById('statusVal').textContent = ratio < 0.3 ? 'Subcritical' : ratio < 0.7 ? 'Critical' : 'Supercritical';
    }
    function draw() {
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = 'rgba(106, 215, 255, 0.1)';
      for (let i = 0; i < w; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
      for (let i = 0; i < h; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
      atoms.forEach(a => {
        ctx.fillStyle = a.fissioned ? '#ff6b6b' : '#4a5568';
        ctx.beginPath(); ctx.arc(a.x, a.y, 8, 0, Math.PI * 2); ctx.fill();
      });
      neutrons.forEach((n, i) => {
        n.x += n.vx; n.y += n.vy;
        if (n.x < 0 || n.x > w || n.y < 0 || n.y > h) neutrons.splice(i, 1);
        ctx.fillStyle = '#6ad7ff';
        ctx.beginPath(); ctx.arc(n.x, n.y, 3, 0, Math.PI * 2); ctx.fill();
        atoms.forEach(a => {
          if (!a.fissioned) {
            const d = Math.sqrt((n.x - a.x) ** 2 + (n.y - a.y) ** 2);
            if (d < 15) { a.fissioned = true; fissions++; updateData();
              for (let j = 0; j < 3; j++) { neutrons.push({ x: a.x, y: a.y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8 }); }
            }
          }
        });
      });
      updateData();
      requestAnimationFrame(draw);
    }
    fireBtn.addEventListener('click', () => { neutrons.push({ x: 20, y: canvas.offsetHeight / 2, vx: 5, vy: 0 }); });
    resetBtn.addEventListener('click', init);
    massSlider.addEventListener('input', init);
    init(); draw();
  </script>
</body>
</html>
