<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radiation Shielding</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/simulation-theme.css" />
  <style>
    :root { --accent: #6ad7ff; --accent-2: #f6c76b; --sim-bg: rgba(10, 16, 26, 0.95); --sim-text: #e9f2ff; --sim-muted: #9fb0c5; --sim-border: rgba(120, 150, 190, 0.18); --panel: rgba(15, 22, 35, 0.92); --shadow: 0 24px 45px rgba(5, 10, 18, 0.35); }
    body { margin: 0; background: radial-gradient(1100px 700px at 10% 0%, rgba(106, 215, 255, 0.12), transparent), radial-gradient(900px 700px at 90% 15%, rgba(246, 199, 107, 0.12), transparent), #0a111c; color: var(--sim-text); font-family: "Space Grotesk", sans-serif; }
    .page { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px; border-bottom: 1px solid var(--sim-border); backdrop-filter: blur(10px); background: rgba(8, 12, 20, 0.7); position: sticky; top: 0; z-index: 10; }
    .topbar a { color: var(--sim-text); text-decoration: none; font-weight: 600; }
    header.hero { text-align: center; padding: 34px 20px 18px; }
    header.hero h1 { letter-spacing: 0.08em; text-transform: uppercase; font-size: clamp(1.6rem, 2.4vw, 2.5rem); margin: 0 0 10px; }
    header.hero p { color: var(--sim-muted); margin: 0; }
    .layout { display: grid; grid-template-columns: minmax(0, 1.3fr) minmax(0, 0.8fr); gap: 24px; padding: 12px 28px 18px; }
    .panel { background: var(--panel); border: 1px solid var(--sim-border); border-radius: 18px; box-shadow: var(--shadow); padding: 18px; }
    canvas { width: 100%; height: 420px; background: rgba(6, 10, 18, 0.7); border-radius: 16px; border: 1px solid var(--sim-border); }
    .controls { display: grid; gap: 16px; }
    .control-group { display: grid; gap: 8px; }
    label { font-size: 0.9rem; color: var(--sim-muted); display: flex; justify-content: space-between; gap: 10px; }
    input[type="range"] { width: 100%; }
    .formula { background: rgba(106, 215, 255, 0.1); border: 1px solid var(--accent); border-radius: 12px; padding: 14px; text-align: center; margin: 10px 0; }
    .data-panel { display: grid; gap: 6px; font-size: 0.9rem; color: var(--sim-muted); }
    .data-panel strong { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><a href="/">← Physics Simulations</a><span class="toggle">Nuclear Physics</span></div>
    <header class="hero"><h1>Radiation Shielding</h1><p>I = I₀e<sup>-μx</sup> — Attenuation of radiation</p></header>
    <div class="layout">
      <div class="panel canvas-wrap"><canvas id="simCanvas"></canvas></div>
      <div class="panel controls">
        <div class="formula">I = I₀e<sup>-μx</sup></div>
        <div class="control-group">
          <label>Radiation Type</label>
          <select id="radType" style="width:100%;padding:8px;background:rgba(12,18,28,0.8);color:#e9f2ff;border:1px solid var(--sim-border);border-radius:8px;">
            <option value="alpha">Alpha (α)</option>
            <option value="beta">Beta (β)</option>
            <option value="gamma">Gamma (γ)</option>
          </select>
        </div>
        <div class="control-group">
          <label>Shield Thickness (cm)</label>
          <input type="range" id="thickSlider" min="0" max="50" value="10">
        </div>
        <div class="control-group">
          <label>Material</label>
          <select id="material" style="width:100%;padding:8px;background:rgba(12,18,28,0.8);color:#e9f2ff;border:1px solid var(--sim-border);border-radius:8px;">
            <option value="lead">Lead</option>
            <option value="concrete">Concrete</option>
            <option value="aluminum">Aluminum</option>
          </select>
        </div>
        <div class="data-panel">
          <div>Initial Intensity: <strong>100%</strong></div>
          <div>Final Intensity: <strong id="iVal">0%</strong></div>
          <div>Attenuation: <strong id="attVal">0%</strong></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;
    ctx.scale(2, 2);
    const radType = document.getElementById('radType');
    const thickSlider = document.getElementById('thickSlider');
    const material = document.getElementById('material');
    let particles = [];
    function update() {
      const type = radType.value;
      const x = parseFloat(thickSlider.value);
      const mat = material.value;
      const mu = type === 'alpha' ? (mat === 'lead' ? 50 : mat === 'concrete' ? 30 : 10) : type === 'beta' ? (mat === 'lead' ? 15 : mat === 'concrete' ? 8 : 3) : (mat === 'lead' ? 0.7 : mat === 'concrete' ? 0.15 : 0.3);
      const I = 100 * Math.exp(-mu * x / 10);
      document.getElementById('iVal').textContent = I.toFixed(1) + '%';
      document.getElementById('attVal').textContent = (100 - I).toFixed(1) + '%';
    }
    function draw() {
      const w = canvas.offsetWidth, h = canvas.offsetHeight;
      ctx.clearRect(0, 0, w, h);
      const cx = w / 2, cy = h / 2;
      ctx.strokeStyle = 'rgba(106, 215, 255, 0.1)';
      for (let i = 0; i < w; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
      for (let i = 0; i < h; i += 40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
      const thick = parseFloat(thickSlider.value) * 4;
      const mat = material.value;
      ctx.fillStyle = mat === 'lead' ? '#4a5568' : mat === 'concrete' ? '#718096' : '#bdc3c7';
      ctx.fillRect(cx - 50, cy - 80, thick, 160);
      if (Math.random() < 0.1) {
        particles.push({ x: 50, y: cy + (Math.random() - 0.5) * 100, type: radType.value });
      }
      particles.forEach((p, i) => {
        p.x += 5;
        const passedShield = p.x > cx - 50 + thick;
        const stopped = !passedShield && Math.random() < 0.3;
        if (p.x > w || stopped) particles.splice(i, 1);
        ctx.fillStyle = p.type === 'alpha' ? '#ff6b6b' : p.type === 'beta' ? '#f6c76b' : '#6ad7ff';
        const size = p.type === 'alpha' ? 5 : p.type === 'beta' ? 3 : 2;
        ctx.globalAlpha = stopped ? 0.3 : 1;
        ctx.beginPath(); ctx.arc(p.x, p.y, size, 0, Math.PI * 2); ctx.fill();
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    radType.addEventListener('change', update);
    thickSlider.addEventListener('input', update);
    material.addEventListener('change', update);
    update(); draw();
  </script>
</body>
</html>
