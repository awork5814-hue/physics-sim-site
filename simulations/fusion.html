<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Nuclear Fusion</title>
  <link rel="stylesheet" href="/styles.css"/><link rel="stylesheet" href="/simulation-theme.css"/>
  <style>
    :root{--accent:#6ad7ff;--accent-2:#f6c76b;--panel:rgba(15,22,35,0.92);--sim-border:rgba(120,150,190,0.18);--sim-text:#e9f2ff;--sim-muted:#9fb0c5;}
    body{margin:0;background:#0a111c;color:var(--sim-text);font-family:"Space Grotesk",sans-serif;}
    .page{min-height:100vh;display:flex;flex-direction:column}
    .topbar{display:flex;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--sim-border);background:rgba(8,12,20,0.7)}
    .topbar a{color:var(--sim-text);text-decoration:none;font-weight:600}
    header{text-align:center;padding:30px 20px}
    header h1{font-size:clamp(1.6rem,2.4vw,2.5rem);margin:0 0 10px;letter-spacing:0.08em;text-transform:uppercase}
    header p{color:var(--sim-muted);margin:0}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:12px 28px 18px}
    .panel{background:var(--panel);border:1px solid var(--sim-border);border-radius:18px;padding:18px}
    canvas{width:100%;height:350px;background:rgba(6,10,18,0.7);border-radius:16px;border:1px solid var(--sim-border)}
    .controls{display:grid;gap:16px}
    label{font-size:0.9rem;color:var(--sim-muted);display:flex;justify-content:space-between}
    input[type="range"],select{width:100%}
    button{background:rgba(12,18,28,0.8);color:var(--sim-text);border:1px solid var(--sim-border);padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
    button:hover{border-color:var(--accent)}
    .data-panel{font-size:0.9rem;color:var(--sim-muted)}
    .data-panel strong{color:var(--accent);font-weight:600}
    .results-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:980px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><a href="/index.html">← Back to Library</a></div>
    <header><h1>Nuclear Fusion</h1><p>Combining nuclei to release energy</p></header>
    <div class="layout">
      <div><canvas id="fusionCanvas"></canvas>
        <div class="panel" style="margin-top:16px">
          <div class="results-grid">
            <div class="data-panel"><div>Temperature: <strong id="tempText">0 MK</strong></div><div>Particles: <strong id="partText">0</strong></div><div>Status: <strong id="statusText">Cold</strong></div></div>
            <div class="data-panel"><div>Energy Released: <strong id="energyText">0 MeV</strong></div><div>Fusion Rate: <strong id="rateText">0/s</strong></div><div>Plasma: <strong id="plasmaText">No</strong></div></div>
          </div>
        </div>
      </div>
      <div class="controls">
        <div class="panel"><div class="control-group"><label>Temperature <span id="tempVal">1 MK</span></label><input type="range" id="temperature" min="0.1" max="150" value="1" step="0.1"/></div></div>
        <div class="panel"><div class="control-group"><label>Particle Density <span id="densVal">Medium</span></label><input type="range" id="density" min="1" max="10" value="5"/></div></div>
        <div class="panel"><button id="btnAdd">Add Deuterium+Tritium</button><button id="btnHeat" style="margin-left:8px">Heat Pulse</button></div>
        <div class="panel"><div class="data-panel"><div><strong>Fusion Reaction:</strong></div><div>D + T → He + n + 17.6 MeV</div><div style="margin-top:8px"><strong>Conditions needed:</strong></div><div>~100 million °C for ignition</div><div>Plasma confinement</div></div></div>
      </div>
    </div>
  </div>
  <script>
    const canvas=document.getElementById('fusionCanvas'),ctx=canvas.getContext('2d');
    let particles=[],energy=0,fusionCount=0,temp=1;
    function resize(){const r=canvas.getBoundingClientRect();canvas.width=r.width*devicePixelRatio;canvas.height=r.height*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);}
    function draw(){
      const w=canvas.width/devicePixelRatio,h=canvas.height/devicePixelRatio;
      ctx.fillStyle='rgba(6,10,18,0.95)';ctx.fillRect(0,0,w,h);
      const cx=w/2,cy=h/2;
      if(temp>50){
        const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,200);
        grad.addColorStop(0,`rgba(255,100,50,${Math.min(0.5,temp/200)})`);
        grad.addColorStop(1,'transparent');
        ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
      }
      particles.forEach((p,i)=>{
        p.x+=p.vx;p.y+=p.vy;p.t++;
        if(p.x<0||p.x>w||p.y<0||p.y>h||p.t>200){particles.splice(i,1);return;}
        const speed=Math.hypot(p.vx,p.vy);
        const tempFactor=Math.min(1,temp/100);
        ctx.fillStyle=p.type==='dt'?'#ff6b6b':(p.type==='he'?'#6ad7ff':'#f6c76b');
        if(temp>20&&Math.random()<tempFactor*0.1){
          ctx.beginPath();ctx.arc(p.x,p.y,15,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
          energy+=17.6;fusionCount++;
          document.getElementById('energyText').textContent=energy.toFixed(1)+' MeV';
          document.getElementById('rateText').textContent=fusionCount+'/s';
        }
        ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(p.x,p.y,5+tempFactor*3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      });
      document.getElementById('partText').textContent=particles.length;
      document.getElementById('tempText').textContent=temp.toFixed(1)+' MK';
      document.getElementById('plasmaText').textContent=temp>20?'Yes':'No';
      document.getElementById('plasmaText').style.color=temp>20?'#50fa7b':'#9fb0c5';
    }
    document.getElementById('temperature').oninput=e=>{temp=parseFloat(e.target.value);document.getElementById('tempVal').textContent=temp.toFixed(1)+' MK';};
    document.getElementById('btnAdd').onclick=()=>{for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2;const r=Math.random()*100+50;particles.push({x:canvas.width/devicePixelRatio/2+r*Math.cos(a),y:canvas.height/devicePixelRatio/2+r*Math.sin(a),vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,t:0,type:'dt'});}};
    document.getElementById('btnHeat').onclick=()=>{temp=Math.min(150,temp+30);document.getElementById('temperature').value=temp;document.getElementById('tempVal').textContent=temp.toFixed(1)+' MK';};
    function loop(){draw();requestAnimationFrame(loop);}
    window.onresize=resize;resize();loop();
  </script>
</body>
</html>
