<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Satellite Orbits</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="/simulation-theme.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #38bdf8;
      --secondary: #a78bfa;
      --accent: #38bdf8;
      --accent-2: #f59e0b;
      --planet: #1d4ed8;
      --orbit: rgba(56, 189, 248, 0.5);
      --trail: rgba(167, 139, 250, 0.45);
      --sim-bg: #0b1020;
      --sim-text: #f8fafc;
      --sim-muted: #94a3b8;
      --sim-border: rgba(255, 255, 255, 0.08);
      --panel: rgba(15, 23, 42, 0.72);
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      --mono: "JetBrains Mono", monospace;
    }

    body.light {
      --sim-bg: #f5f7fa;
      --sim-text: #0f172a;
      --sim-muted: #475569;
      --sim-border: rgba(15, 23, 42, 0.12);
      --panel: rgba(255, 255, 255, 0.85);
    }

    body {
      margin: 0;
      background: var(--sim-bg);
      color: var(--sim-text);
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      border-bottom: 1px solid var(--sim-border);
      backdrop-filter: blur(10px);
      background: rgba(8, 12, 20, 0.7);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar a {
      color: var(--sim-text);
      text-decoration: none;
      font-weight: 600;
    }

    .toggle {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 14px;
      border: 1px solid var(--sim-border);
      border-radius: 999px;
      background: rgba(14, 20, 32, 0.8);
      cursor: pointer;
      color: var(--sim-text);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .toggle:hover {
      transform: translateY(-1px);
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.25);
    }

    header.hero {
      text-align: center;
      padding: 34px 20px 18px;
    }

    header.hero h1 {
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: clamp(1.6rem, 2.4vw, 2.5rem);
      margin: 0 0 10px;
    }

    header.hero p {
      color: var(--sim-muted);
      margin: 0;
    }

    .tabs {
      display: flex;
      gap: 10px;
      padding: 0 28px 10px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid var(--sim-border);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      background: rgba(12, 18, 28, 0.8);
      color: var(--sim-text);
      font-weight: 600;
    }

    .tab.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 24px;
      padding: 12px 28px 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--sim-border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(12px);
    }

    .canvas-wrap {
      display: grid;
      gap: 10px;
    }

    canvas {
      width: 100%;
      height: clamp(280px, 40vh, 400px);
      background: rgba(6, 10, 18, 0.7);
      border-radius: 16px;
      border: 1px solid var(--sim-border);
    }

    @media (max-width: 768px) {
      canvas {
        height: clamp(220px, 35vh, 320px);
      }
    }

    .controls {
      display: grid;
      gap: 16px;
    }

    .control-group {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 0.9rem;
      color: var(--sim-muted);
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    input[type="range"], select {
      width: 100%;
    }

    input[type="range"] {
      accent-color: var(--primary);
    }

    select {
      background: rgba(10, 16, 26, 0.85);
      color: var(--sim-text);
      border: 1px solid var(--sim-border);
      border-radius: 10px;
      padding: 8px 10px;
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: rgba(12, 18, 28, 0.8);
      color: var(--sim-text);
      border: 1px solid var(--sim-border);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.25);
    }

    .data-panel {
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 6px;
    }

    .data-card {
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
      border: 1px solid var(--sim-border);
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .data-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--sim-muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .data-label::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .data-value {
      font-size: 0.95rem;
      font-weight: 700;
      font-family: var(--mono);
      line-height: 1.2;
    }

    .data-value.blue { color: var(--accent); }
    .data-value.purple { color: var(--secondary); }
    .data-value.orange { color: var(--accent-2); }

    .accordion {
      display: grid;
      gap: 12px;
      margin: 0 28px 40px;
    }

    details {
      border: 1px solid var(--sim-border);
      border-radius: 14px;
      background: rgba(12, 18, 28, 0.8);
      padding: 12px 16px;
    }

    summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--accent);
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    details p, details li {
      color: var(--sim-muted);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
      canvas {
        height: clamp(280px, 42vh, 400px);
      }
    }
  </style>
</head>
<body>
  <div class="page" id="satellite-orbits">
    <div class="topbar">
      <a href="/index.html">← Back to Library</a>
      <button class="toggle" id="themeToggle" aria-label="Toggle light and dark mode">Light/Dark</button>
    </div>

    <header class="hero">
      <h1>Satellite Orbits</h1>
      <p>Orbital mechanics & escape velocity</p>
    </header>

    <div class="tabs">
      <button class="tab active" data-mode="circular">Circular</button>
      <button class="tab" data-mode="elliptical">Elliptical</button>
      <button class="tab" data-mode="escape">Escape</button>
      <button class="tab" data-mode="geo">Geostationary</button>
    </div>

    <section class="layout">
      <div class="panel canvas-wrap">
        <canvas id="orbitCanvas" width="900" height="520" aria-label="Satellite orbits"></canvas>
        <div class="btn-row">
          <button id="playPause">Play</button>
          <button id="reset">Reset</button>
        </div>
        <div class="data-panel" aria-live="polite" id="dataPanel"></div>
      </div>

      <div class="panel controls" aria-label="Controls">
        <div class="control-group">
          <label for="speed">Simulation Speed <strong id="speedLabel">1.00x</strong></label>
          <input type="range" id="speed" min="0.25" max="5" step="0.25" value="1" />
        </div>
        <div class="control-group">
          <label for="radius">Orbital Radius <strong id="radiusLabel">42164 km</strong></label>
          <input type="range" id="radius" min="7000" max="100000" step="1000" value="42164" />
        </div>

        <div class="control-group">
          <label for="velocity">Initial Velocity <strong id="velocityLabel">3.07 km/s</strong></label>
          <input type="range" id="velocity" min="0.5" max="15" step="0.1" value="3.07" />
        </div>

        <div class="control-group">
          <label for="ecc">Eccentricity <strong id="eccLabel">0.00</strong></label>
          <input type="range" id="ecc" min="0" max="0.95" step="0.01" value="0" />
        </div>

        <div class="control-group">
          <label for="planet">Central Body</label>
          <select id="planet">
            <option value="earth" selected>Earth</option>
            <option value="moon">Moon</option>
            <option value="mars">Mars</option>
            <option value="jupiter">Jupiter</option>
          </select>
        </div>

        <div class="control-group">
          <label>Display Options</label>
          <label><input type="checkbox" id="showVel" checked /> Show velocity vector</label>
          <label><input type="checkbox" id="showForce" checked /> Show gravity vector</label>
          <label><input type="checkbox" id="showPath" checked /> Show orbit path</label>
          <label><input type="checkbox" id="showEnergy" checked /> Show energy bars</label>
        </div>
      </div>
    </section>

    <section class="accordion">
      <details open>
        <summary>📚 Theory</summary>
        <p>Orbital velocity depends on radius: v = √(GM/r). Period follows Kepler's 3rd Law.</p>
      </details>

      <details>
        <summary>💡 Key Takeaways</summary>
        <ul>
          <li>v = √(GM/r)</li>
          <li>T ∝ r^(3/2)</li>
          <li>v_escape = √2 × v_orbit</li>
        </ul>
      </details>
    </section>
  </div>

  <script>
    const canvas = document.getElementById('orbitCanvas');
    const ctx = canvas.getContext('2d');

    const tabs = document.querySelectorAll('.tab');
    const radiusInput = document.getElementById('radius');
    const velocityInput = document.getElementById('velocity');
    const eccInput = document.getElementById('ecc');
    const planetSelect = document.getElementById('planet');
    const speedInput = document.getElementById('speed');

    const radiusLabel = document.getElementById('radiusLabel');
    const velocityLabel = document.getElementById('velocityLabel');
    const eccLabel = document.getElementById('eccLabel');

    const showVel = document.getElementById('showVel');
    const showForce = document.getElementById('showForce');
    const showPath = document.getElementById('showPath');
    const showEnergy = document.getElementById('showEnergy');

    const playPauseBtn = document.getElementById('playPause');
    const resetBtn = document.getElementById('reset');
    const speedLabel = document.getElementById('speedLabel');

    const dataPanel = document.getElementById('dataPanel');

    const planets = {
      earth: 3.986e14,
      moon: 4.904e12,
      mars: 4.282e13,
      jupiter: 1.266e17
    };

    const planetStyles = {
      earth: { base: '#2b6cb0', land: '#3aa676', cloud: 'rgba(255,255,255,0.65)' },
      moon: { base: '#a0a0a0', land: '#7b7b7b', cloud: 'rgba(255,255,255,0.0)' },
      mars: { base: '#b4532a', land: '#8a3f1f', cloud: 'rgba(255,255,255,0.08)' },
      jupiter: { base: '#c4a484', land: '#8f6b3e', cloud: 'rgba(255,255,255,0.12)' }
    };

    const planetCache = new Map();

    const state = {
      radius: 42164e3,
      velocity: 3070,
      ecc: 0,
      mu: planets.earth,
      angle: 0,
      playing: false,
      mode: 'circular',
      trail: [],
      stars: [],
      speed: 1
    };

    function updateLabels() {
      radiusLabel.textContent = `${(state.radius / 1000).toFixed(0)} km`;
      velocityLabel.textContent = `${(state.velocity / 1000).toFixed(2)} km/s`;
      eccLabel.textContent = state.ecc.toFixed(2);
      speedLabel.textContent = `${state.speed.toFixed(2)}x`;
    }

    function updatePhysics(dt) {
      const a = state.radius;
      const e = state.ecc;
      const r = (a * (1 - e * e)) / (1 + e * Math.cos(state.angle));
      const omega = state.velocity / r;
      const timeScale = 2000;
      state.angle += omega * dt * timeScale * state.speed;
      if (state.angle > Math.PI * 2) state.angle -= Math.PI * 2;
    }

    function draw() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawStarfield();
      const center = { x: canvas.width / 2, y: canvas.height / 2 };
      const minDim = Math.min(rect.width, rect.height);
      const scale = (minDim * 0.42) / state.radius;
      const a = state.radius * scale;
      const e = state.ecc;
      const r = (a * (1 - e * e)) / (1 + e * Math.cos(state.angle));

      drawPlanet(center.x, center.y, 28, planetSelect.value);

      if (showPath.checked) {
        const b = a * Math.sqrt(1 - e * e);
        ctx.save();
        ctx.strokeStyle = 'rgba(56, 189, 248, 0.7)';
        ctx.setLineDash([8, 6]);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(center.x, center.y, a, b, 0, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.lineWidth = 5;
        ctx.strokeStyle = 'rgba(56, 189, 248, 0.15)';
        ctx.beginPath();
        ctx.ellipse(center.x, center.y, a, b, 0, 0, Math.PI * 2);
        ctx.stroke();
        // period marker
        const markerX = center.x + a;
        const markerY = center.y;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.beginPath();
        ctx.arc(markerX, markerY, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.font = '11px Inter, sans-serif';
        ctx.fillText('T', markerX + 6, markerY - 6);
        ctx.restore();
      }

      const x = center.x + r * Math.cos(state.angle);
      const y = center.y + r * Math.sin(state.angle);
      drawSatellite(x, y, state.angle + Math.PI / 2);

      if (showVel.checked) {
        drawArrow(x, y, x - Math.sin(state.angle) * 40, y + Math.cos(state.angle) * 40, 'rgba(56, 189, 248, 0.9)');
      }

      if (showForce.checked) {
        const grad = ctx.createLinearGradient(x, y, center.x, center.y);
        grad.addColorStop(0, 'rgba(167, 139, 250, 0.9)');
        grad.addColorStop(1, 'rgba(56, 189, 248, 0.4)');
        drawArrow(x, y, center.x, center.y, grad);
      }
    }

    function drawArrow(x1, y1, x2, y2, color) {
      const angle = Math.atan2(y2 - y1, x2 - x1);
      const head = 6;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - head * Math.cos(angle - Math.PI / 6), y2 - head * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(x2 - head * Math.cos(angle + Math.PI / 6), y2 - head * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function drawSatellite(x, y, heading) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(heading);

      // solar panels
      ctx.fillStyle = '#4f46e5';
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.fillRect(-24, -6, 14, 12);
      ctx.fillRect(10, -6, 14, 12);
      ctx.strokeRect(-24, -6, 14, 12);
      ctx.strokeRect(10, -6, 14, 12);

      // body
      const bodyGrad = ctx.createLinearGradient(-6, -6, 6, 6);
      bodyGrad.addColorStop(0, '#e2e8f0');
      bodyGrad.addColorStop(1, '#64748b');
      ctx.fillStyle = bodyGrad;
      ctx.fillRect(-6, -6, 12, 12);

      // antenna
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.moveTo(0, -6);
      ctx.lineTo(0, -14);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, -16, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#f59e0b';
      ctx.fill();

      ctx.restore();
    }

    function drawPlanet(cx, cy, r, name) {
      const key = `${name}-${r}`;
      let tex = planetCache.get(key);
      if (!tex) {
        tex = createPlanetTexture(r, planetStyles[name] || planetStyles.earth, name);
        planetCache.set(key, tex);
      }
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.clip();
      ctx.drawImage(tex, cx - r, cy - r);

      // terminator shadow for depth
      const shade = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.2, cx, cy, r);
      shade.addColorStop(0, 'rgba(0,0,0,0)');
      shade.addColorStop(1, 'rgba(0,0,0,0.35)');
      ctx.fillStyle = shade;
      ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
      ctx.restore();
    }

    function createPlanetTexture(r, colors, name) {
      const size = r * 2;
      const c = document.createElement('canvas');
      c.width = size;
      c.height = size;
      const t = c.getContext('2d');

      const baseGrad = t.createRadialGradient(r * 0.4, r * 0.4, r * 0.2, r, r, r);
      baseGrad.addColorStop(0, colors.base);
      baseGrad.addColorStop(1, '#0f172a');
      t.fillStyle = baseGrad;
      t.fillRect(0, 0, size, size);

      // subtle noise texture
      const imgData = t.getImageData(0, 0, size, size);
      for (let i = 0; i < imgData.data.length; i += 4) {
        const n = Math.random() * 18;
        imgData.data[i] = Math.min(255, imgData.data[i] + n);
        imgData.data[i + 1] = Math.min(255, imgData.data[i + 1] + n);
        imgData.data[i + 2] = Math.min(255, imgData.data[i + 2] + n);
      }
      t.putImageData(imgData, 0, 0);

      if (name === 'jupiter') {
        t.globalAlpha = 0.6;
        for (let y = 6; y < size; y += 8) {
          t.fillStyle = y % 16 === 0 ? colors.base : colors.land;
          t.fillRect(0, y, size, 6);
        }
        t.globalAlpha = 1;
      } else {
        // land blotches
        t.fillStyle = colors.land;
        for (let i = 0; i < 30; i++) {
          const x = Math.random() * size;
          const y = Math.random() * size;
          const rr = Math.random() * (r * 0.25) + 2;
          t.beginPath();
          t.arc(x, y, rr, 0, Math.PI * 2);
          t.fill();
        }
      }

      if (colors.cloud && colors.cloud !== 'rgba(255,255,255,0.0)') {
        t.fillStyle = colors.cloud;
        for (let i = 0; i < 12; i++) {
          const x = Math.random() * size;
          const y = Math.random() * size;
          const rr = Math.random() * (r * 0.35) + 4;
          t.beginPath();
          t.arc(x, y, rr, 0, Math.PI * 2);
          t.fill();
        }
      }

      // highlight
      const highlight = t.createRadialGradient(r * 0.6, r * 0.5, r * 0.1, r * 0.5, r * 0.5, r);
      highlight.addColorStop(0, 'rgba(255,255,255,0.35)');
      highlight.addColorStop(1, 'rgba(255,255,255,0)');
      t.fillStyle = highlight;
      t.fillRect(0, 0, size, size);

      return c;
    }

    function updateDataPanel() {
      const a = state.radius;
      const e = state.ecc;
      const r = (a * (1 - e * e)) / (1 + e * Math.cos(state.angle));
      const v = state.velocity;
      const T = 2 * Math.PI * Math.sqrt(Math.pow(a, 3) / state.mu);
      const ke = 0.5 * v * v;
      const pe = -state.mu / r;
      const total = ke + pe;
      const energyCards = showEnergy.checked ? `
          <div class="data-card"><span class="data-label">KE</span><span class="data-value orange">${ke.toExponential(2)} J/kg</span></div>
          <div class="data-card"><span class="data-label">PE</span><span class="data-value orange">${pe.toExponential(2)} J/kg</span></div>
          <div class="data-card"><span class="data-label">Total E</span><span class="data-value orange">${total.toExponential(2)} J/kg</span></div>
      ` : '';
      dataPanel.innerHTML = `
        <div class="data-grid">
          <div class="data-card"><span class="data-label">Radius</span><span class="data-value blue">${(r / 1000).toFixed(0)} km</span></div>
          <div class="data-card"><span class="data-label">Speed</span><span class="data-value blue">${(v / 1000).toFixed(2)} km/s</span></div>
          <div class="data-card"><span class="data-label">Period</span><span class="data-value purple">${(T / 3600).toFixed(2)} h</span></div>
          <div class="data-card"><span class="data-label">Eccentricity</span><span class="data-value purple">${e.toFixed(2)}</span></div>
          ${energyCards}
        </div>
      `;
    }

    function drawStarfield() {
      const bg = ctx.createRadialGradient(
        canvas.width * 0.2,
        canvas.height * 0.2,
        20,
        canvas.width * 0.5,
        canvas.height * 0.5,
        canvas.width
      );
      bg.addColorStop(0, 'rgba(18, 24, 50, 0.95)');
      bg.addColorStop(0.5, 'rgba(9, 12, 24, 0.98)');
      bg.addColorStop(1, 'rgba(4, 6, 12, 1)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // faint nebula glow
      const nebula = ctx.createRadialGradient(
        canvas.width * 0.75,
        canvas.height * 0.3,
        30,
        canvas.width * 0.7,
        canvas.height * 0.35,
        canvas.width * 0.5
      );
      nebula.addColorStop(0, 'rgba(56, 189, 248, 0.08)');
      nebula.addColorStop(1, 'rgba(56, 189, 248, 0)');
      ctx.fillStyle = nebula;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ensureStars();
      state.stars.forEach((s) => {
        const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(state.angle * 0.5 + s.phase));
        ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha * twinkle})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function ensureStars() {
      if (state.stars.length) return;
      const count = 200;
      for (let i = 0; i < count; i++) {
        state.stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.6 + 0.4,
          alpha: Math.random() * 0.6 + 0.2,
          phase: Math.random() * Math.PI * 2
        });
      }
    }

    function loop() {
      if (state.playing) updatePhysics(1 / 60);
      draw();
      updateDataPanel();
      requestAnimationFrame(loop);
    }

    radiusInput.addEventListener('input', (e) => {
      state.radius = parseFloat(e.target.value) * 1000;
      updateLabels();
    });

    velocityInput.addEventListener('input', (e) => {
      state.velocity = parseFloat(e.target.value) * 1000;
      updateLabels();
    });

    eccInput.addEventListener('input', (e) => {
      state.ecc = parseFloat(e.target.value);
      updateLabels();
    });

    planetSelect.addEventListener('change', (e) => {
      state.mu = planets[e.target.value];
    });

    speedInput.addEventListener('input', (e) => {
      state.speed = parseFloat(e.target.value);
      updateLabels();
    });

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => {
        tabs.forEach((t) => t.classList.remove('active'));
        tab.classList.add('active');
        state.mode = tab.dataset.mode;
        if (state.mode === 'circular') {
          state.ecc = 0;
          eccInput.value = 0;
        } else if (state.mode === 'elliptical') {
          state.ecc = 0.4;
          eccInput.value = 0.4;
        } else if (state.mode === 'escape') {
          state.ecc = 0.8;
          eccInput.value = 0.8;
          state.velocity = Math.sqrt(2 * state.mu / state.radius);
          velocityInput.value = (state.velocity / 1000).toFixed(2);
        } else if (state.mode === 'geo') {
          state.radius = 42164e3;
          radiusInput.value = 42164;
          state.velocity = Math.sqrt(state.mu / state.radius);
          velocityInput.value = (state.velocity / 1000).toFixed(2);
          state.ecc = 0;
          eccInput.value = 0;
        }
        updateLabels();
      });
    });

    playPauseBtn.addEventListener('click', () => {
      state.playing = !state.playing;
      playPauseBtn.textContent = state.playing ? 'Pause' : 'Play';
    });

    resetBtn.addEventListener('click', () => {
      state.angle = 0;
      state.playing = false;
      playPauseBtn.textContent = 'Play';
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('light');
    });

    updateLabels();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
