<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Light Dispersion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --card: #111820;
      --border: rgba(255,255,255,0.08);
      --text: #e8edf4;
      --muted: #6b7a8f;
      --accent: #6ad7ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .lab {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 20px;
      max-width: 1100px;
    }

    canvas {
      background: #050608;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: 100%;
      display: block;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .card-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .control {
      margin-bottom: 14px;
    }

    .control:last-child { margin-bottom: 0; }

    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    .control-label span:last-child {
      color: var(--accent);
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .color-preview {
      width: 100%;
      height: 40px;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid var(--border);
    }

    .info {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .info strong { color: var(--text); }

    @media (max-width: 768px) {
      .lab { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>Light Dispersion</h1>
  <p class="subtitle">Separate light into its spectral colors</p>

  <div class="lab">
    <canvas id="canvas" width="800" height="400"></canvas>

    <div class="controls">
      <div class="card">
        <div class="card-title">Light Source</div>
        <div class="control">
          <div class="control-label">
            <span>Wavelength</span>
            <span id="val-lambda">550 nm</span>
          </div>
          <input type="range" id="lambda" min="380" max="750" value="550" step="5">
          <div id="color-preview" class="color-preview"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Prism</div>
        <div class="control">
          <div class="control-label">
            <span>Dispersion</span>
            <span id="val-disp">1.5</span>
          </div>
          <input type="range" id="disp" min="1.2" max="2.4" value="1.5" step="0.1">
        </div>
      </div>

      <div class="card">
        <div class="card-title">Results</div>
        <div class="info">
          <p>Wavelength: <strong id="res-lambda">550 nm</strong></p>
          <p>Color: <strong id="res-color">Green</strong></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const params = {
      lambda: 550,
      dispersion: 1.5
    };

    function wavelengthToColor(lambda) {
      let r, g, b, alpha = 1;
      
      if (lambda < 380) {
        return { r: 0, g: 0, b: 0, alpha: 0 };
      } else if (lambda < 440) {
        r = -(lambda - 440) / (440 - 380);
        g = 0;
        b = 1;
      } else if (lambda < 490) {
        r = 0;
        g = (lambda - 440) / (490 - 440);
        b = 1;
      } else if (lambda < 510) {
        r = 0;
        g = 1;
        b = -(lambda - 510) / (510 - 490);
      } else if (lambda < 580) {
        r = (lambda - 510) / (580 - 510);
        g = 1;
        b = 0;
      } else if (lambda < 645) {
        r = 1;
        g = -(lambda - 645) / (645 - 580);
        b = 0;
      } else if (lambda <= 750) {
        r = 1;
        g = 0;
        b = 0;
      } else {
        return { r: 0, g: 0, b: 0, alpha: 0 };
      }

      let factor;
      if (lambda < 380 || lambda > 750) {
        factor = 0;
      } else if (lambda < 420) {
        factor = 0.3 + 0.7 * (lambda - 380) / (420 - 380);
      } else if (lambda > 700) {
        factor = 0.3 + 0.7 * (750 - lambda) / (750 - 700);
      } else {
        factor = 1;
      }

      return {
        r: Math.round(r * factor * 255),
        g: Math.round(g * factor * 255),
        b: Math.round(b * factor * 255),
        alpha: 1
      };
    }

    function getColorName(lambda) {
      if (lambda < 380) return 'Ultraviolet';
      if (lambda < 450) return 'Violet';
      if (lambda < 495) return 'Blue';
      if (lambda < 520) return 'Cyan';
      if (lambda < 565) return 'Green';
      if (lambda < 590) return 'Yellow';
      if (lambda < 625) return 'Orange';
      if (lambda < 750) return 'Red';
      return 'Infrared';
    }

    function updateResults() {
      document.getElementById('val-lambda').textContent = params.lambda + ' nm';
      document.getElementById('val-disp').textContent = params.dispersion.toFixed(1);
      document.getElementById('res-lambda').textContent = params.lambda + ' nm';
      document.getElementById('res-color').textContent = getColorName(params.lambda);

      const color = wavelengthToColor(params.lambda);
      const preview = document.getElementById('color-preview');
      preview.style.background = `rgba(${color.r}, ${color.g}, ${color.b}, ${color.alpha})`;
    }

    function draw() {
      const w = canvas.width;
      const h = canvas.height;

      ctx.fillStyle = '#050608';
      ctx.fillRect(0, 0, w, h);

      const color = wavelengthToColor(params.lambda);
      const dispersion = params.dispersion;

      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 1;
      for (let i = 0; i < w; i++) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, h);
        ctx.stroke();
      }

      const sourceX = 100;
      const sourceY = h / 2;
      
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(sourceX, sourceY, 15, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, 0.9)`;
      ctx.beginPath();
      ctx.arc(sourceX, sourceY, 8, 0, Math.PI * 2);
      ctx.fill();

      const beamStartX = sourceX + 20;
      const beamEndX = 300;

      const gradient = ctx.createLinearGradient(beamStartX, sourceY - 30, beamStartX, sourceY + 30);
      gradient.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
      gradient.addColorStop(0.5, `rgba(${color.r}, ${color.g}, ${color.b}, 0.8)`);
      gradient.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
      
      ctx.fillStyle = gradient;
      ctx.fillRect(beamStartX, sourceY - 30, beamEndX - beamStartX, 60);

      const prismX = 320;
      const prismY = h / 2;
      const prismSize = 100;

      ctx.fillStyle = '#1e293b';
      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(prismX, prismY - prismSize);
      ctx.lineTo(prismX + prismSize * 0.866, prismY + prismSize * 0.5);
      ctx.lineTo(prismX - prismSize * 0.866, prismY + prismSize * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      const refractIndex = dispersion - (params.lambda - 550) * 0.001;
      const beamHeight = 25 + (dispersion - 1.2) * 10;

      const wavelengths = [];
      const numRays = 15;
      for (let i = 0; i < numRays; i++) {
        wavelengths.push(380 + (750 - 380) * i / (numRays - 1));
      }

      ctx.lineWidth = 2;
      
      wavelengths.forEach((wl, idx) => {
        const rayColor = wavelengthToColor(wl);
        const alpha = idx === Math.floor(numRays / 2) ? 1 : 0.6;
        
        ctx.strokeStyle = `rgba(${rayColor.r}, ${rayColor.g}, ${rayColor.b}, ${alpha})`;
        
        const angle = (idx - (numRays - 1) / 2) * 0.04 * (dispersion - 1);
        const rayLength = 350;
        
        ctx.beginPath();
        ctx.moveTo(prismX + 30, prismY + (idx - (numRays - 1) / 2) * 3);
        ctx.lineTo(prismX + 30 + rayLength * Math.cos(angle), prismY + (idx - (numRays - 1) / 2) * 3 + rayLength * Math.sin(angle));
        ctx.stroke();
      });

      const rainbowY = 80;
      const rainbowH = h - 160;
      const rainbowX = 400;
      const rainbowW = 300;

      const rainbowGradient = ctx.createLinearGradient(rainbowX, 0, rainbowX + rainbowW, 0);
      rainbowGradient.addColorStop(0, '#8b00ff');
      rainbowGradient.addColorStop(0.17, '#0000ff');
      rainbowGradient.addColorStop(0.33, '#00ff00');
      rainbowGradient.addColorStop(0.5, '#ffff00');
      rainbowGradient.addColorStop(0.67, '#ff7f00');
      rainbowGradient.addColorStop(0.83, '#ff0000');
      rainbowGradient.addColorStop(1, '#ff0000');

      ctx.fillStyle = rainbowGradient;
      ctx.fillRect(rainbowX, rainbowY, rainbowW, rainbowH);

      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(rainbowX, rainbowY);
      ctx.lineTo(rainbowX, rainbowY + rainbowH);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '11px IBM Plex Sans';
      ctx.textAlign = 'center';

      const labels = ['Violet', 'Blue', 'Green', 'Yellow', 'Orange', 'Red'];
      const positions = [0.08, 0.25, 0.42, 0.58, 0.75, 0.92];
      positions.forEach((pos, i) => {
        ctx.fillText(labels[i], rainbowX + rainbowW * pos, rainbowY - 8);
      });

      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '10px IBM Plex Sans';
      ctx.textAlign = 'left';
      ctx.fillText('380 nm', rainbowX + 5, rainbowY + rainbowH + 15);
      ctx.textAlign = 'right';
      ctx.fillText('750 nm', rainbowX + rainbowW - 5, rainbowY + rainbowH + 15);

      ctx.fillStyle = '#6ad7ff';
      ctx.font = '12px IBM Plex Sans';
      ctx.textAlign = 'center';
      ctx.fillText('Spectral colors from dispersion', rainbowX + rainbowW / 2, h - 20);
    }

    document.getElementById('lambda').addEventListener('input', (e) => {
      params.lambda = parseFloat(e.target.value);
      updateResults();
      draw();
    });

    document.getElementById('disp').addEventListener('input', (e) => {
      params.dispersion = parseFloat(e.target.value);
      document.getElementById('val-disp').textContent = params.dispersion.toFixed(1);
      draw();
    });

    updateResults();
    draw();

    window.addEventListener('resize', draw);
  </script>
</body>
</html>
