<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Double-Slit Experiment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e14;
      --card: #111820;
      --border: rgba(255,255,255,0.08);
      --text: #e8edf4;
      --muted: #6b7a8f;
      --accent: #6ad7ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    .lab {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 20px;
      max-width: 1100px;
    }

    canvas {
      background: #050608;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: 100%;
      display: block;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .card-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .control {
      margin-bottom: 14px;
    }

    .control:last-child { margin-bottom: 0; }

    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    .control-label span:last-child {
      color: var(--accent);
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .color-preview {
      width: 100%;
      height: 30px;
      border-radius: 6px;
      margin-top: 8px;
      border: 1px solid var(--border);
    }

    .info {
      font-size: 0.85rem;
      line-height: 1.6;
      color: var(--muted);
    }

    .info strong { color: var(--text); }

    @media (max-width: 768px) {
      .lab { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <h1>Double-Slit Experiment</h1>
  <p class="subtitle">Light interference creates bright and dark fringes</p>

  <div class="lab">
    <canvas id="canvas" width="800" height="400"></canvas>

    <div class="controls">
      <div class="card">
        <div class="card-title">Light</div>
        <div class="control">
          <div class="control-label">
            <span>Wavelength</span>
            <span id="val-lambda">650 nm</span>
          </div>
          <input type="range" id="lambda" min="400" max="750" value="650" step="10">
          <div id="color-preview" class="color-preview"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Slits</div>
        <div class="control">
          <div class="control-label">
            <span>Slit Separation</span>
            <span id="val-sep">0.3 mm</span>
          </div>
          <input type="range" id="sep" min="0.1" max="1" value="0.3" step="0.05">
        </div>
        <div class="control">
          <div class="control-label">
            <span>Slit Width</span>
            <span id="val-width">0.1 mm</span>
          </div>
          <input type="range" id="width" min="0.05" max="0.5" value="0.1" step="0.05">
        </div>
      </div>

      <div class="card">
        <div class="card-title">Results</div>
        <div class="info">
          <p>Fringe spacing: <strong id="res-spacing">4.3 mm</strong></p>
          <p>Color: <strong id="res-color">Red</strong></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const params = {
      lambda: 650,
      sep: 0.3,
      width: 0.1,
      L: 1
    };

    function wavelengthToColor(lambda) {
      let r, g, b, factor;
      
      if (lambda < 380) {
        return { r: 0, g: 0, b: 0 };
      } else if (lambda < 440) {
        r = -(lambda - 440) / 60;
        g = 0;
        b = 1;
        factor = 0.3 + 0.7 * (lambda - 380) / 40;
      } else if (lambda < 490) {
        r = 0;
        g = (lambda - 440) / 50;
        b = 1;
        factor = 1;
      } else if (lambda < 510) {
        r = 0;
        g = 1;
        b = -(lambda - 510) / 20;
        factor = 1;
      } else if (lambda < 580) {
        r = (lambda - 510) / 70;
        g = 1;
        b = 0;
        factor = 1;
      } else if (lambda < 645) {
        r = 1;
        g = -(lambda - 645) / 65;
        b = 0;
        factor = 1;
      } else if (lambda <= 750) {
        r = 1;
        g = 0;
        b = 0;
        factor = 0.3 + 0.7 * (750 - lambda) / 105;
      } else {
        return { r: 0, g: 0, b: 0 };
      }

      return {
        r: Math.round(r * factor * 255),
        g: Math.round(g * factor * 255),
        b: Math.round(b * factor * 255)
      };
    }

    function getColorName(lambda) {
      if (lambda < 450) return 'Violet';
      if (lambda < 495) return 'Blue';
      if (lambda < 520) return 'Cyan';
      if (lambda < 565) return 'Green';
      if (lambda < 590) return 'Yellow';
      if (lambda < 625) return 'Orange';
      return 'Red';
    }

    function updateResults() {
      document.getElementById('val-lambda').textContent = params.lambda + ' nm';
      document.getElementById('val-sep').textContent = params.sep.toFixed(2) + ' mm';
      document.getElementById('val-width').textContent = params.width.toFixed(2) + ' mm';
      
      const d = params.sep * 1e-3;
      const lambda = params.lambda * 1e-9;
      const fringeSpacing = (lambda * params.L) / d * 1000;
      
      document.getElementById('res-spacing').textContent = fringeSpacing.toFixed(2) + ' mm';
      document.getElementById('res-color').textContent = getColorName(params.lambda);

      const color = wavelengthToColor(params.lambda);
      document.getElementById('color-preview').style.background = `rgb(${color.r}, ${color.g}, ${color.b})`;
    }

    function draw() {
      const w = canvas.width;
      const h = canvas.height;

      ctx.fillStyle = '#050608';
      ctx.fillRect(0, 0, w, h);

      const midY = h / 2;
      const slitX = 80;
      const screenX = w - 100;
      const L = params.L;

      ctx.fillStyle = '#1a1d23';
      ctx.fillRect(slitX - 20, 40, 40, h - 80);

      const d = params.sep * 1e-3;
      const a = params.width * 1e-3;
      const lambda = params.lambda * 1e-9;
      const color = wavelengthToColor(params.lambda);

      const slitOffset = d / 2;
      const slitPositions = [-slitOffset, slitOffset];

      ctx.fillStyle = `rgb(${color.r}, ${color.g}, ${color.b})`;
      slitPositions.forEach(offset => {
        ctx.beginPath();
        ctx.arc(slitX, midY + offset * 200, 4, 0, Math.PI * 2);
        ctx.fill();
      });

      for (let px = 0; px < (screenX - slitX) * 2; px++) {
        const screenY = midY - (h - 100) / 2 + (px / ((screenX - slitX) * 2)) * (h - 100);
        const dy = screenY - midY;
        const theta = Math.atan2(dy * 0.001, L);

        let amplitude = 0;
        slitPositions.forEach(offset => {
          const pathDiff = offset * Math.sin(theta);
          amplitude += Math.cos(2 * Math.PI * pathDiff / lambda);
        });

        const singleSlit = a > 0 ? Math.sin(Math.PI * a * Math.sin(theta) / lambda) / (Math.PI * a * Math.sin(theta) / lambda) : 1;
        const intensity = Math.pow(amplitude / 2, 2) * Math.pow(singleSlit, 2);

        const brightness = intensity * 0.9;
        ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${brightness})`;
        ctx.fillRect(screenX + px / 2 - 1, screenY, 2, 1.5);
      }

      const fringeSpacing = (lambda * L) / d;
      const centralMaxWidth = (2 * lambda * L) / a;

      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(screenX, 50);
      ctx.lineTo(screenX, h - 50);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = '#6ad7ff';
      ctx.font = '11px IBM Plex Sans';
      ctx.fillText('Equal spacing: ' + (fringeSpacing * 1000).toFixed(2) + ' mm', 20, h - 35);
      ctx.fillStyle = '#f6c76b';
      ctx.fillText('Envelope: ' + (centralMaxWidth * 1000).toFixed(1) + ' mm wide', 20, h - 18);

      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '10px IBM Plex Sans';
      ctx.textAlign = 'center';
      ctx.fillText('Double-slit fringes within single-slit envelope', w / 2, 25);
    }

    document.getElementById('lambda').addEventListener('input', (e) => {
      params.lambda = parseFloat(e.target.value);
      updateResults();
      draw();
    });

    document.getElementById('sep').addEventListener('input', (e) => {
      params.sep = parseFloat(e.target.value);
      updateResults();
      draw();
    });

    document.getElementById('width').addEventListener('input', (e) => {
      params.width = parseFloat(e.target.value);
      updateResults();
      draw();
    });

    updateResults();
    draw();
  </script>
</body>
</html>
