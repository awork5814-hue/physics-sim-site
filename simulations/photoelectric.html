<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photoelectric Effect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(12, 18, 30, 0.82);
      --ink: #f8fafc;
      --muted: #94a3b8;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --accent-3: #22c55e;
      --line: rgba(255,255,255,0.08);
      --mono: "JetBrains Mono", monospace;
    }
    body.light {
      --bg: #f5f7fa;
      --ink: #0f172a;
      --muted: #475569;
      --line: rgba(15, 23, 42, 0.12);
      --panel: rgba(255,255,255,0.9);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", sans-serif;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px); background: rgba(8, 12, 20, 0.7);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar a { color: var(--ink); text-decoration: none; font-weight: 600; }
    .toggle {
      display: inline-flex; gap: 8px; align-items: center; padding: 8px 14px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(14, 20, 32, 0.8);
      cursor: pointer; color: var(--ink);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .toggle:hover { transform: translateY(-1px); border-color: rgba(106,215,255,0.5); box-shadow: 0 0 12px rgba(106,215,255,0.25); }

    header { padding: 24px 20px 8px; display: flex; gap: 12px; align-items: center; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
    header .subtitle { color: var(--muted); font-size: 13px; }

    .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; padding: 16px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
    }
    .canvas-wrap { position: relative; }
    canvas { width: 100%; height: clamp(360px, 56vh, 560px); background: #0b0f14; border-radius: 14px; border: 1px solid var(--line); }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .control {
      background: #0f151c;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .control label { display: block; margin-bottom: 6px; color: var(--ink); }
    .control input[type="range"] { width: 100%; }
    .control .row { display: flex; justify-content: space-between; }
    .control .value { font-weight: 600; color: var(--ink); }

    .button-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line); background: rgba(14, 20, 32, 0.9); color: var(--ink);
      padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(246,199,107,0.7); box-shadow: 0 0 12px rgba(246,199,107,0.2); }

    .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }

    .data-panel { padding: 0; background: transparent; border: none; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 8px; }
    .data-card { background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
    .data-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .data-label::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .data-value { font-size: 1rem; font-weight: 700; font-family: var(--mono); }
    .data-value.blue { color: var(--accent); }
    .data-value.orange { color: var(--accent-2); }
    .data-value.green { color: var(--accent-3); }

    .formula {
      background: linear-gradient(135deg, rgba(106,215,255,0.18), rgba(106,215,255,0.05));
      border: 1px solid rgba(106,215,255,0.5);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--ink);
      line-height: 1.5;
    }

    .spectrum-bar {
      height: 14px;
      background: linear-gradient(90deg, #8b00ff, #0000ff, #00ff00, #ffff00, #ff7f00, #ff0000);
      border-radius: 6px;
      margin: 8px 0 0;
      border: 1px solid var(--line);
    }

    footer { padding: 0 16px 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/index.html">← Back to Library</a>
    <button class="toggle" id="themeToggle">Light/Dark</button>
  </div>
  <header>
    <h1>Photoelectric Effect</h1>
    <div class="subtitle">E = hf − φ — photons eject electrons from metal</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="canvas-wrap">
        <canvas id="scene" width="960" height="460"></canvas>
      </div>
      <div class="data-panel" id="readout"></div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="control">
          <label>Simulation</label>
          <div class="button-row">
            <button class="btn" id="playPause">Pause</button>
            <button class="btn" id="reset">Reset</button>
          </div>
        </div>
        <div class="control">
          <label>Animation Speed</label>
          <input id="speed" type="range" min="0.2" max="2" step="0.05" value="1" />
          <div class="row"><span>0.2x</span><span id="speedVal" class="value">1.00x</span><span>2.0x</span></div>
        </div>
        <div class="control">
          <label>Wavelength (nm)</label>
          <input id="wave" type="range" min="100" max="800" step="1" value="400" />
          <div class="row"><span>100</span><span id="waveVal" class="value">400 nm</span><span>800</span></div>
          <div class="spectrum-bar"></div>
        </div>
        <div class="control">
          <label>Light Intensity</label>
          <input id="intensity" type="range" min="1" max="100" step="1" value="50" />
          <div class="row"><span>1</span><span id="intensityVal" class="value">50%</span><span>100</span></div>
        </div>
        <div class="control">
          <label>Metal Work Function (eV)</label>
          <input id="work" type="range" min="1" max="10" step="0.1" value="4" />
          <div class="row"><span>1</span><span id="workVal" class="value">4.0 eV</span><span>10</span></div>
        </div>
        <div class="control">
          <label>Display Options</label>
          <div class="checks">
            <label><input id="showWaves" type="checkbox" checked /> Photon beam</label>
            <label><input id="showElectrons" type="checkbox" checked /> Electrons</label>
            <label><input id="showLabels" type="checkbox" checked /> Labels</label>
            <label><input id="showThreshold" type="checkbox" checked /> Threshold line</label>
          </div>
        </div>
        <div class="control">
          <div class="formula">
            <div><strong>Energy:</strong> <span style="font-family: var(--mono);">E = hc/λ</span></div>
            <div><strong>Photoelectric:</strong> <span style="font-family: var(--mono);">K<sub>max</sub> = hf − φ</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    Tip: Decreasing wavelength increases photon energy. If E &lt; φ, no electrons are emitted.
  </footer>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const h = 6.626e-34;
    const c = 3e8;
    const eV = 1.602e-19;

    const state = {
      wavelength: 400,
      intensity: 50,
      workFn: 4,
      speed: 1,
      running: true,
      showWaves: true,
      showElectrons: true,
      showLabels: true,
      showThreshold: true,
      time: 0,
      photons: [],
      electrons: [],
      eCount: 0
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function photonEnergy() {
      return (h * c / (state.wavelength * 1e-9)) / eV;
    }

    function updateReadout() {
      const E = photonEnergy();
      const ke = Math.max(0, E - state.workFn);
      const status = E > state.workFn ? 'Emitting electrons' : 'No emission';
      document.getElementById('readout').innerHTML = `
        <div class="data-grid">
          <div class="data-card"><span class="data-label">Photon Energy</span><span class="data-value blue">${E.toFixed(2)} eV</span></div>
          <div class="data-card"><span class="data-label">Kinetic Energy</span><span class="data-value green">${ke.toFixed(2)} eV</span></div>
          <div class="data-card"><span class="data-label">Work Function</span><span class="data-value orange">${state.workFn.toFixed(1)} eV</span></div>
          <div class="data-card"><span class="data-label">Electrons</span><span class="data-value blue">${state.eCount}</span></div>
          <div class="data-card"><span class="data-label">Status</span><span class="data-value ${E > state.workFn ? 'green' : 'orange'}">${status}</span></div>
        </div>
      `;
    }

    function colorForWavelength(nm) {
      if (nm < 380) return '#8b00ff';
      if (nm < 450) return '#4f46e5';
      if (nm < 500) return '#3b82f6';
      if (nm < 570) return '#22c55e';
      if (nm < 590) return '#facc15';
      if (nm < 620) return '#f97316';
      return '#ef4444';
    }

    function drawBackground() {
      const isLight = document.body.classList.contains('light');
      const grad = ctx.createLinearGradient(0, 0, canvas.clientWidth, canvas.clientHeight);
      if (isLight) {
        grad.addColorStop(0, '#f8fafc');
        grad.addColorStop(0.55, '#e2e8f0');
        grad.addColorStop(1, '#f1f5f9');
      } else {
        grad.addColorStop(0, '#05070e');
        grad.addColorStop(0.6, '#0a0f1f');
        grad.addColorStop(1, '#0b1224');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);

      ctx.strokeStyle = isLight ? 'rgba(15,23,42,0.08)' : 'rgba(148,163,184,0.08)';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.clientWidth; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.clientHeight); ctx.stroke();
      }
      for (let y = 0; y < canvas.clientHeight; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.clientWidth, y); ctx.stroke();
      }
    }

    function drawMetalPlate(x, y, w, h) {
      const grad = ctx.createLinearGradient(x, y, x + w, y);
      grad.addColorStop(0, '#475569');
      grad.addColorStop(0.4, '#cbd5f5');
      grad.addColorStop(1, '#64748b');
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = 'rgba(226,232,240,0.6)';
      ctx.strokeRect(x, y, w, h);
    }

    function spawnPhoton() {
      if (Math.random() < state.intensity / 100) {
        state.photons.push({ x: 30, y: 130 + (Math.random() - 0.5) * 160 });
      }
    }

    function updateParticles() {
      if (!state.running) return;
      spawnPhoton();
      const metalX = canvas.clientWidth * 0.7;
      state.photons.forEach((p, i) => {
        p.x += 7 * state.speed;
        if (p.x > metalX - 6) {
          state.photons.splice(i, 1);
          const E = photonEnergy();
          if (E > state.workFn) {
            const ke = (E - state.workFn) * 1.602e-19;
            const v = Math.sqrt(2 * ke / 9.109e-31);
            state.electrons.push({
              x: metalX,
              y: p.y,
              vx: (v * 0.01) * (Math.random() + 0.4),
              vy: (Math.random() - 0.5) * v * 0.015
            });
            state.eCount += 1;
          }
        }
      });
      state.electrons.forEach((e, i) => {
        e.x += e.vx;
        e.y += e.vy;
        if (e.x > canvas.clientWidth + 20 || e.y < 0 || e.y > canvas.clientHeight) state.electrons.splice(i, 1);
      });
    }

    function draw() {
      drawBackground();
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const metalX = w * 0.7;
      const beamColor = colorForWavelength(state.wavelength);

      drawMetalPlate(metalX, h / 2 - 110, w - metalX - 30, 220);

      if (state.showThreshold) {
        const E = photonEnergy();
        ctx.strokeStyle = E > state.workFn ? 'rgba(34,197,94,0.7)' : 'rgba(248,113,113,0.7)';
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.moveTo(metalX - 10, h / 2 - 120);
        ctx.lineTo(metalX - 10, h / 2 + 120);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      if (state.showWaves) {
        ctx.strokeStyle = beamColor;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(40, h / 2);
        ctx.lineTo(metalX - 10, h / 2);
        ctx.stroke();
      }

      if (state.showElectrons) {
        ctx.fillStyle = '#6ad7ff';
        state.electrons.forEach(e => {
          ctx.beginPath(); ctx.arc(e.x, e.y, 3.5, 0, Math.PI * 2); ctx.fill();
        });
      }

      state.photons.forEach(p => {
        ctx.strokeStyle = beamColor;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(p.x - 10, p.y); ctx.lineTo(p.x, p.y); ctx.stroke();
      });

      if (state.showLabels) {
        ctx.fillStyle = 'rgba(248,250,252,0.85)';
        ctx.font = '12px Inter, sans-serif';
        ctx.fillText('Incoming photons', 36, 30);
        ctx.fillText(`λ = ${state.wavelength} nm`, 36, h - 20);
      }
    }

    function tick() {
      updateParticles();
      draw();
      updateReadout();
      requestAnimationFrame(tick);
    }

    document.getElementById('wave').addEventListener('input', e => {
      state.wavelength = parseFloat(e.target.value);
      document.getElementById('waveVal').textContent = `${state.wavelength.toFixed(0)} nm`;
    });
    document.getElementById('intensity').addEventListener('input', e => {
      state.intensity = parseFloat(e.target.value);
      document.getElementById('intensityVal').textContent = `${state.intensity.toFixed(0)}%`;
    });
    document.getElementById('work').addEventListener('input', e => {
      state.workFn = parseFloat(e.target.value);
      document.getElementById('workVal').textContent = `${state.workFn.toFixed(1)} eV`;
    });

    document.getElementById('showWaves').addEventListener('change', e => state.showWaves = e.target.checked);
    document.getElementById('showElectrons').addEventListener('change', e => state.showElectrons = e.target.checked);
    document.getElementById('showLabels').addEventListener('change', e => state.showLabels = e.target.checked);
    document.getElementById('showThreshold').addEventListener('change', e => state.showThreshold = e.target.checked);

    document.getElementById('speed').addEventListener('input', e => {
      state.speed = parseFloat(e.target.value);
      document.getElementById('speedVal').textContent = `${state.speed.toFixed(2)}x`;
    });

    document.getElementById('playPause').addEventListener('click', e => {
      state.running = !state.running;
      e.target.textContent = state.running ? 'Pause' : 'Play';
    });

    document.getElementById('reset').addEventListener('click', () => {
      state.wavelength = 400;
      state.intensity = 50;
      state.workFn = 4;
      state.eCount = 0;
      state.photons = [];
      state.electrons = [];
      document.getElementById('wave').value = 400;
      document.getElementById('intensity').value = 50;
      document.getElementById('work').value = 4;
      document.getElementById('waveVal').textContent = '400 nm';
      document.getElementById('intensityVal').textContent = '50%';
      document.getElementById('workVal').textContent = '4.0 eV';
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('light');
    });

    window.addEventListener('resize', resize);
    resize();
    tick();
  </script>
</body>
</html>
