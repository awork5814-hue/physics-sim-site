<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transistor Amplifier</title>
  <style>
    :root {
      --bg: #0c131d;
      --panel: #142131;
      --ink: #f5f8fd;
      --muted: #a9b6c6;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --line: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(900px 600px at 10% -10%, #1a2433 0%, var(--bg) 60%);
      color: var(--ink);
      font-family: "Trebuchet MS", Verdana, sans-serif;
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
    header .subtitle { color: var(--muted); font-size: 13px; }

    .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; padding: 16px; }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    canvas { width: 100%; height: 420px; background: #0b0f14; border-radius: 10px; border: 1px solid var(--line); }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .control {
      background: #0f151c;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .control label { display: block; margin-bottom: 6px; color: var(--ink); }
    .control input[type="range"] { width: 100%; }
    .control .row { display: flex; justify-content: space-between; }

    .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }

    .readout {
      font-family: "Consolas", "SFMono-Regular", monospace;
      background: #0c1116;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre;
    }

    footer { padding: 0 16px 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>Transistor Amplifier</h1>
    <div class="subtitle">Common‑emitter biasing and gain</div>
  </header>

  <div class="wrap">
    <div class="card">
      <canvas id="scene" width="960" height="420"></canvas>
    </div>

    <div class="card">
      <div class="controls">
        <div class="control">
          <label>Vcc (V)</label>
          <input id="vcc" type="range" min="5" max="20" step="0.5" value="12" />
          <div class="row"><span>5</span><span id="vccVal">12</span><span>20</span></div>
        </div>
        <div class="control">
          <label>Rb (kΩ)</label>
          <input id="rb" type="range" min="10" max="1000" step="10" value="470" />
          <div class="row"><span>10</span><span id="rbVal">470</span><span>1000</span></div>
        </div>
        <div class="control">
          <label>Rc (kΩ)</label>
          <input id="rc" type="range" min="1" max="100" step="0.5" value="4.7" />
          <div class="row"><span>1</span><span id="rcVal">4.7</span><span>100</span></div>
        </div>
        <div class="control">
          <label>Input Amplitude (V)</label>
          <input id="vin" type="range" min="0.001" max="0.1" step="0.001" value="0.01" />
          <div class="row"><span>1 mV</span><span id="vinVal">0.010</span><span>100 mV</span></div>
        </div>
        <div class="control">
          <label>Input Frequency (Hz)</label>
          <input id="freq" type="range" min="10" max="10000" step="10" value="1000" />
          <div class="row"><span>10</span><span id="freqVal">1000</span><span>10k</span></div>
        </div>
        <div class="control">
          <label>β (Current Gain)</label>
          <input id="beta" type="range" min="50" max="300" step="5" value="100" />
          <div class="row"><span>50</span><span id="betaVal">100</span><span>300</span></div>
        </div>
      </div>

      <div style="margin-top: 12px;" class="readout" id="readout"></div>
    </div>
  </div>

  <footer>
    Ic = βIb. Vc = Vcc − IcRc. Small‑signal gain ≈ −Rc/re.
  </footer>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const state = {
      Vcc: 12,
      Rb: 470000,
      Rc: 4700,
      beta: 100,
      Vin: 0.01,
      freq: 1000,
      t: 0
    };

    function bias() {
      const Vbe = 0.7;
      const Ib = (state.Vcc - Vbe) / state.Rb;
      const Ic = state.beta * Ib;
      const Vc = state.Vcc - Ic * state.Rc;
      return { Ib, Ic, Vc };
    }

    function gain() {
      const { Ic } = bias();
      const re = 0.026 / Ic;
      return -state.Rc / re;
    }

    function draw() {
      ctx.fillStyle = '#0b0f14';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      // Simple waveform
      const x = 80, y = 80, w = 360, h = 150;
      ctx.strokeStyle = '#fff';
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = '#fff';
      ctx.fillText('Waveforms', x + 10, y + 15);

      const g = gain();
      ctx.strokeStyle = '#f6c76b';
      ctx.beginPath();
      for (let i = 0; i < w; i++) {
        const t = (i / w) * 2 * Math.PI;
        const vin = Math.sin(t) * state.Vin;
        const yv = y + h/2 - vin * 1000;
        if (i === 0) ctx.moveTo(x + i, yv); else ctx.lineTo(x + i, yv);
      }
      ctx.stroke();

      ctx.strokeStyle = '#6ad7ff';
      ctx.beginPath();
      for (let i = 0; i < w; i++) {
        const t = (i / w) * 2 * Math.PI;
        const vout = Math.sin(t + Math.PI) * state.Vin * g;
        const yv = y + h/2 - vout * 0.01;
        if (i === 0) ctx.moveTo(x + i, yv); else ctx.lineTo(x + i, yv);
      }
      ctx.stroke();
    }

    function updateReadout() {
      const { Ib, Ic, Vc } = bias();
      const Av = gain();
      const text = `TRANSISTOR AMP\n` +
        `--------------\n` +
        `Ib = ${(Ib*1e6).toFixed(2)} μA\n` +
        `Ic = ${(Ic*1000).toFixed(2)} mA\n` +
        `Vc = ${Vc.toFixed(2)} V\n` +
        `Gain Av ≈ ${Av.toFixed(1)}\n`;
      document.getElementById('readout').textContent = text;
    }

    function tick() {
      state.t += 0.01;
      draw();
      updateReadout();
      requestAnimationFrame(tick);
    }

    document.getElementById('vcc').addEventListener('input', e => { state.Vcc = parseFloat(e.target.value); document.getElementById('vccVal').textContent = state.Vcc.toFixed(1); });
    document.getElementById('rb').addEventListener('input', e => { state.Rb = parseFloat(e.target.value) * 1000; document.getElementById('rbVal').textContent = e.target.value; });
    document.getElementById('rc').addEventListener('input', e => { state.Rc = parseFloat(e.target.value) * 1000; document.getElementById('rcVal').textContent = e.target.value; });
    document.getElementById('vin').addEventListener('input', e => { state.Vin = parseFloat(e.target.value); document.getElementById('vinVal').textContent = state.Vin.toFixed(3); });
    document.getElementById('freq').addEventListener('input', e => { state.freq = parseFloat(e.target.value); document.getElementById('freqVal').textContent = state.freq.toFixed(0); });
    document.getElementById('beta').addEventListener('input', e => { state.beta = parseFloat(e.target.value); document.getElementById('betaVal').textContent = state.beta.toFixed(0); });

    tick();
  </script>
</body>
</html>
