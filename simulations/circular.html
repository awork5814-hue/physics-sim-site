<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Uniform Circular Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(12, 18, 30, 0.82);
      --ink: #f8fafc;
      --muted: #94a3b8;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --accent-3: #22c55e;
      --line: rgba(255,255,255,0.08);
      --mono: "JetBrains Mono", monospace;
    }
    body.light {
      --bg: #f5f7fa;
      --ink: #0f172a;
      --muted: #475569;
      --line: rgba(15, 23, 42, 0.12);
      --panel: rgba(255,255,255,0.9);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", sans-serif;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px); background: rgba(8, 12, 20, 0.7);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar a { color: var(--ink); text-decoration: none; font-weight: 600; }
    .toggle {
      display: inline-flex; gap: 8px; align-items: center; padding: 8px 14px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(14, 20, 32, 0.8);
      cursor: pointer; color: var(--ink);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .toggle:hover { transform: translateY(-1px); border-color: rgba(106,215,255,0.5); box-shadow: 0 0 12px rgba(106,215,255,0.25); }

    header { padding: 24px 20px 8px; display: flex; gap: 12px; align-items: center; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
    header .subtitle { color: var(--muted); font-size: 13px; }

    .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; padding: 16px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
    }
    .canvas-wrap { position: relative; }
    canvas { width: 100%; height: clamp(360px, 56vh, 560px); background: #0b0f14; border-radius: 14px; border: 1px solid var(--line); }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .control {
      background: #0f151c;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .control label { display: block; margin-bottom: 6px; color: var(--ink); }
    .control input[type="range"] { width: 100%; }
    .control .row { display: flex; justify-content: space-between; }
    .control .value { font-weight: 600; color: var(--ink); }

    .button-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line); background: rgba(14, 20, 32, 0.9); color: var(--ink);
      padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(246,199,107,0.7); box-shadow: 0 0 12px rgba(246,199,107,0.2); }

    .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }

    .data-panel { padding: 0; background: transparent; border: none; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 8px; }
    .data-card { background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
    .data-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .data-label::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .data-value { font-size: 1rem; font-weight: 700; font-family: var(--mono); }
    .data-value.blue { color: var(--accent); }
    .data-value.orange { color: var(--accent-2); }
    .data-value.green { color: var(--accent-3); }

    .formula {
      background: linear-gradient(135deg, rgba(106,215,255,0.18), rgba(106,215,255,0.05));
      border: 1px solid rgba(106,215,255,0.5);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--ink);
      line-height: 1.5;
    }

    footer { padding: 0 16px 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/index.html">← Back to Library</a>
    <button class="toggle" id="themeToggle">Light/Dark</button>
  </div>
  <header>
    <h1>Uniform Circular Motion</h1>
    <div class="subtitle">Centripetal acceleration and constant speed</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="canvas-wrap">
        <canvas id="scene" width="960" height="460"></canvas>
      </div>
      <div class="data-panel" id="readout"></div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="control">
          <label>Simulation</label>
          <div class="button-row">
            <button class="btn" id="playPause">Pause</button>
            <button class="btn" id="reset">Reset</button>
          </div>
        </div>
        <div class="control">
          <label>Animation Speed</label>
          <input id="speed" type="range" min="0.2" max="2" step="0.05" value="1" />
          <div class="row"><span>0.2x</span><span id="speedVal" class="value">1.00x</span><span>2.0x</span></div>
        </div>
        <div class="control">
          <label>Radius (m)</label>
          <input id="radius" type="range" min="20" max="150" step="1" value="80" />
          <div class="row"><span>20</span><span id="radiusVal" class="value">80 m</span><span>150</span></div>
        </div>
        <div class="control">
          <label>Angular Velocity (rad/s)</label>
          <input id="omega" type="range" min="1" max="20" step="0.5" value="5" />
          <div class="row"><span>1</span><span id="omegaVal" class="value">5.0</span><span>20</span></div>
        </div>
        <div class="control">
          <label>Mass (kg)</label>
          <input id="mass" type="range" min="1" max="10" step="0.5" value="3" />
          <div class="row"><span>1</span><span id="massVal" class="value">3.0 kg</span><span>10</span></div>
        </div>
        <div class="control">
          <label>Display Options</label>
          <div class="checks">
            <label><input id="showGrid" type="checkbox" checked /> Grid</label>
            <label><input id="showTrail" type="checkbox" checked /> Trail</label>
            <label><input id="showRadius" type="checkbox" checked /> Radius line</label>
            <label><input id="showVectors" type="checkbox" checked /> Vectors</label>
          </div>
        </div>
        <div class="control">
          <div class="formula">
            <div><strong>Speed:</strong> <span style="font-family: var(--mono);">v = ωr</span></div>
            <div><strong>Accel:</strong> <span style="font-family: var(--mono);">a = v²/r = ω²r</span></div>
            <div><strong>Force:</strong> <span style="font-family: var(--mono);">F = mω²r</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    Uniform circular motion has constant speed but changing velocity direction.
  </footer>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const state = {
      radius: 80,
      omega: 5,
      mass: 3,
      speed: 1,
      running: true,
      showGrid: true,
      showTrail: true,
      showRadius: true,
      showVectors: true,
      angle: 0,
      trail: []
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function drawBackground() {
      const isLight = document.body.classList.contains('light');
      const grad = ctx.createLinearGradient(0, 0, canvas.clientWidth, canvas.clientHeight);
      if (isLight) {
        grad.addColorStop(0, '#f8fafc');
        grad.addColorStop(0.55, '#e2e8f0');
        grad.addColorStop(1, '#f1f5f9');
      } else {
        grad.addColorStop(0, '#05070e');
        grad.addColorStop(0.6, '#0a0f1f');
        grad.addColorStop(1, '#0b1224');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);

      if (!state.showGrid) return;
      ctx.strokeStyle = isLight ? 'rgba(15,23,42,0.08)' : 'rgba(148,163,184,0.08)';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.clientWidth; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.clientHeight); ctx.stroke();
      }
      for (let y = 0; y < canvas.clientHeight; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.clientWidth, y); ctx.stroke();
      }
    }

    function drawArrow(x1, y1, x2, y2, color) {
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      const angle = Math.atan2(y2 - y1, x2 - x1);
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - 8 * Math.cos(angle - Math.PI/6), y2 - 8 * Math.sin(angle - Math.PI/6));
      ctx.lineTo(x2 - 8 * Math.cos(angle + Math.PI/6), y2 - 8 * Math.sin(angle + Math.PI/6));
      ctx.closePath();
      ctx.fill();
    }

    function draw() {
      drawBackground();
      const w = canvas.clientWidth;
      const h = canvas.clientHeight;
      const cx = w / 2;
      const cy = h / 2;
      const r = state.radius;

      ctx.strokeStyle = 'rgba(106,215,255,0.6)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 6]);
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);

      const x = cx + Math.cos(state.angle) * r;
      const y = cy + Math.sin(state.angle) * r;

      if (state.showTrail) {
        state.trail.push({ x, y });
        if (state.trail.length > 120) state.trail.shift();
        ctx.strokeStyle = 'rgba(106,215,255,0.2)';
        ctx.beginPath();
        state.trail.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
        ctx.stroke();
      }

      if (state.showRadius) {
        ctx.strokeStyle = 'rgba(248,113,113,0.8)';
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x, y); ctx.stroke();
      }

      const grad = ctx.createRadialGradient(x - 6, y - 6, 2, x, y, 18);
      grad.addColorStop(0, '#fef3c7');
      grad.addColorStop(1, '#f59e0b');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x, y, 12 + state.mass * 0.8, 0, Math.PI * 2); ctx.fill();

      if (state.showVectors) {
        const vDir = state.angle + Math.PI / 2;
        drawArrow(x, y, x + 40 * Math.cos(vDir), y + 40 * Math.sin(vDir), '#22c55e');
        drawArrow(x, y, x - 40 * Math.cos(state.angle), y - 40 * Math.sin(state.angle), '#f87171');
      }
    }

    function updateReadout() {
      const v = state.omega * state.radius;
      const a = state.omega * state.omega * state.radius;
      const F = state.mass * a;
      document.getElementById('readout').innerHTML = `
        <div class="data-grid">
          <div class="data-card"><span class="data-label">Speed</span><span class="data-value green">${v.toFixed(1)} m/s</span></div>
          <div class="data-card"><span class="data-label">Accel</span><span class="data-value orange">${a.toFixed(1)} m/s²</span></div>
          <div class="data-card"><span class="data-label">Force</span><span class="data-value blue">${F.toFixed(1)} N</span></div>
          <div class="data-card"><span class="data-label">Radius</span><span class="data-value blue">${state.radius.toFixed(0)} m</span></div>
          <div class="data-card"><span class="data-label">ω</span><span class="data-value green">${state.omega.toFixed(2)} rad/s</span></div>
        </div>
      `;
    }

    function tick() {
      if (state.running) {
        state.angle += state.omega * 0.02 * state.speed;
      }
      draw();
      updateReadout();
      requestAnimationFrame(tick);
    }

    document.getElementById('radius').addEventListener('input', e => {
      state.radius = parseFloat(e.target.value);
      document.getElementById('radiusVal').textContent = `${state.radius.toFixed(0)} m`;
    });
    document.getElementById('omega').addEventListener('input', e => {
      state.omega = parseFloat(e.target.value);
      document.getElementById('omegaVal').textContent = state.omega.toFixed(1);
    });
    document.getElementById('mass').addEventListener('input', e => {
      state.mass = parseFloat(e.target.value);
      document.getElementById('massVal').textContent = `${state.mass.toFixed(1)} kg`;
    });

    document.getElementById('showGrid').addEventListener('change', e => state.showGrid = e.target.checked);
    document.getElementById('showTrail').addEventListener('change', e => state.showTrail = e.target.checked);
    document.getElementById('showRadius').addEventListener('change', e => state.showRadius = e.target.checked);
    document.getElementById('showVectors').addEventListener('change', e => state.showVectors = e.target.checked);

    document.getElementById('speed').addEventListener('input', e => {
      state.speed = parseFloat(e.target.value);
      document.getElementById('speedVal').textContent = `${state.speed.toFixed(2)}x`;
    });

    document.getElementById('playPause').addEventListener('click', e => {
      state.running = !state.running;
      e.target.textContent = state.running ? 'Pause' : 'Play';
    });

    document.getElementById('reset').addEventListener('click', () => {
      state.radius = 80;
      state.omega = 5;
      state.mass = 3;
      state.angle = 0;
      state.trail = [];
      state.running = true;
      document.getElementById('radius').value = 80;
      document.getElementById('omega').value = 5;
      document.getElementById('mass').value = 3;
      document.getElementById('radiusVal').textContent = '80 m';
      document.getElementById('omegaVal').textContent = '5.0';
      document.getElementById('massVal').textContent = '3.0 kg';
      document.getElementById('playPause').textContent = 'Pause';
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('light');
    });

    window.addEventListener('resize', resize);
    resize();
    tick();
  </script>
</body>
</html>
