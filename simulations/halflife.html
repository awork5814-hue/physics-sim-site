<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Half-Life</title>
  <link rel="stylesheet" href="/styles.css"/><link rel="stylesheet" href="/simulation-theme.css"/>
  <style>
    :root{--accent:#6ad7ff;--accent-2:#f6c76b;--panel:rgba(15,22,35,0.92);--sim-border:rgba(120,150,190,0.18);--sim-text:#e9f2ff;--sim-muted:#9fb0c5;}
    body{margin:0;background:#0a111c;color:var(--sim-text);font-family:"Space Grotesk",sans-serif;}
    .page{min-height:100vh;display:flex;flex-direction:column}
    .topbar{display:flex;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--sim-border);background:rgba(8,12,20,0.7)}
    .topbar a{color:var(--sim-text);text-decoration:none;font-weight:600}
    header{text-align:center;padding:30px 20px}
    header h1{font-size:clamp(1.6rem,2.4vw,2.5rem);margin:0 0 10px;letter-spacing:0.08em;text-transform:uppercase}
    header p{color:var(--sim-muted);margin:0}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:12px 28px 18px}
    .panel{background:var(--panel);border:1px solid var(--sim-border);border-radius:18px;padding:18px}
    canvas{width:100%;height:320px;background:rgba(6,10,18,0.7);border-radius:16px;border:1px solid var(--sim-border)}
    .controls{display:grid;gap:16px}
    label{font-size:0.9rem;color:var(--sim-muted);display:flex;justify-content:space-between}
    input[type="range"],select{width:100%}
    button{background:rgba(12,18,28,0.8);color:var(--sim-text);border:1px solid var(--sim-border);padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
    button:hover{border-color:var(--accent)}
    .data-panel{font-size:0.9rem;color:var(--sim-muted)}
    .data-panel strong{color:var(--accent);font-weight:600}
    .results-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .atom{display:inline-block;width:12px;height:12px;border-radius:50%;margin:2px}
    .atom.undecayed{background:#6ad7ff}
    .atom.decayed{background:#333}
    @media(max-width:980px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><a href="/index.html">← Back to Library</a></div>
    <header><h1>Half-Life</h1><p>Exponential decay of radioactive nuclei</p></header>
    <div class="layout">
      <div><canvas id="halflifeCanvas"></canvas>
        <div class="panel" style="margin-top:16px"><div class="results-grid"><div class="data-panel"><div>Time: <strong id="timeText">0</strong></div><div>Half-lives: <strong id="hlText">0</strong></div><div>Rate: <strong id="rateText">100%</strong></div></div></div></div>
      <div class="controls">
        <div class="panel"><div class="control-group"><label>Half-Life <span id="hlVal">10s</span></label><input type="range" id="halflife" min="1" max="60" value="10"/></div></div>
        <div class="panel"><div class="control-group"><label>Atoms <span id="atomVal">100</span></label><input type="range" id="numAtoms" min="10" max="500" value="100"/></div></div>
        <div class="panel"><button id="btnStart">Start</button><button id="btnReset" style="margin-left:8px">Reset</button></div>
        <div class="panel"><div class="data-panel"><strong>Equation:</strong> N = N₀ × (1/2)^(t/t½)</div><div style="margin-top:8px">N = remaining atoms<br/>N₀ = initial atoms<br/>t = elapsed time<br/>t½ = half-life</div></div>
      </div>
    </div>
  </div>
  <script>
    const canvas=document.getElementById('halflifeCanvas'),ctx=canvas.getContext('2d');
    let atoms=[],time=0,halflife=10,running=false,totalAtoms=100;
    function init(){atoms=[];for(let i=0;i<totalAtoms;i++){atoms.push({x:Math.random()*canvas.width/devicePixelRatio,y:Math.random()*canvas.height/devicePixelRatio,decayed:false});}}
    function resize(){const r=canvas.getBoundingClientRect();canvas.width=r.width*devicePixelRatio;canvas.height=r.height*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);}
    function draw(){
      const w=canvas.width/devicePixelRatio,h=canvas.height/devicePixelRatio;
      ctx.fillStyle='rgba(6,10,18,0.95)';ctx.fillRect(0,0,w,h);
      const decayed=atoms.filter(a=>a.decayed).length;
      const remaining=totalAtoms-decayed;
      const halfLives=time/halflife;
      document.getElementById('timeText').textContent=time.toFixed(1)+'s';
      document.getElementById('hlText').textContent=halfLives.toFixed(2);
      document.getElementById('rateText').textContent=(remaining/totalAtoms*100).toFixed(1)+'%';
      atoms.forEach(a=>{ctx.fillStyle=a.decayed?'#333':'#6ad7ff';ctx.beginPath();ctx.arc(a.x,a.y,4,0,Math.PI*2);ctx.fill();});
      if(running){time+=0.1;if(Math.random()<remaining/totalAtoms*0.1){const undecayed=atoms.filter(a=>!a.decayed);if(undecayed.length>0){undecayed[Math.floor(Math.random()*undecayed.length)].decayed=true;}}
      if(remaining===0)running=false;}
    }
    document.getElementById('halflife').oninput=e=>{halflife=parseInt(e.target.value);document.getElementById('hlVal').textContent=halflife+'s';};
    document.getElementById('numAtoms').oninput=e=>{totalAtoms=parseInt(e.target.value);document.getElementById('atomVal').textContent=totalAtoms;init();};
    document.getElementById('btnStart').onclick=()=>{running=!running;document.getElementById('btnStart').textContent=running?'Pause':'Start';};
    document.getElementById('btnReset').onclick=()=>{time=0;running=false;document.getElementById('btnStart').textContent='Start';init();};
    function loop(){draw();requestAnimationFrame(loop);}
    window.onresize=resize;resize();init();loop();
  </script>
</body>
</html>
