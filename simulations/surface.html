<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Surface Tension</title>
  <link rel="stylesheet" href="/styles.css"/><link rel="stylesheet" href="/simulation-theme.css"/>
  <style>
    :root{--accent:#6ad7ff;--accent-2:#f6c76b;--panel:rgba(15,22,35,0.92);--sim-border:rgba(120,150,190,0.18);--sim-text:#e9f2ff;--sim-muted:#9fb0c5;}
    body{margin:0;background:#0a111c;color:var(--sim-text);font-family:"Space Grotesk",sans-serif;}
    .page{min-height:100vh;display:flex;flex-direction:column}
    .topbar{display:flex;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--sim-border);background:rgba(8,12,20,0.7)}
    .topbar a{color:var(--sim-text);text-decoration:none;font-weight:600}
    header{text-align:center;padding:30px 20px}
    header h1{font-size:clamp(1.6rem,2.4vw,2.5rem);margin:0 0 10px;letter-spacing:0.08em;text-transform:uppercase}
    header p{color:var(--sim-muted);margin:0}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:12px 28px 18px}
    .panel{background:var(--panel);border:1px solid var(--sim-border);border-radius:18px;padding:18px}
    canvas{width:100%;height:350px;background:rgba(6,10,18,0.7);border-radius:16px;border:1px solid var(--sim-border)}
    .controls{display:grid;gap:16px}
    label{font-size:0.9rem;color:var(--sim-muted);display:flex;justify-content:space-between}
    input[type="range"],select{width:100%}
    .data-panel{font-size:0.9rem;color:var(--sim-muted)}
    .data-panel strong{color:var(--accent);font-weight:600}
    .results-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:980px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar"><a href="/index.html">← Back to Library</a></div>
    <header><h1>Surface Tension</h1><p>Water molecules at interfaces</p></header>
    <div class="layout">
      <div><canvas id="tensionCanvas"></canvas>
        <div class="panel" style="margin-top:16px">
          <div class="results-grid">
            <div class="data-panel"><div>γ (water): <strong id="gammaText">0.072 N/m</strong></div><div>Contact: <strong id="contactText">~0°</strong></div></div>
            <div class="data-panel"><div>Force needed: <strong id="forceText">0 N</strong></div><div>Droplet: <strong id="dropText">Sphere</strong></div></div>
          </div>
        </div>
      </div>
      <div class="controls">
        <div class="panel"><div class="control-group"><label>Fluid</label><select id="fluid"><option value="water">Water (γ=0.072)</option><option value="mercury">Mercury (γ=0.485)</option><option value="ethanol">Ethanol (γ=0.022)</option><option value="soap">Soapy water (γ=0.025)</option></select></div></div>
        <div class="panel"><div class="control-group"><label>Needle Length <span id="lenVal">5</span> cm</label><input type="range" id="length" min="1" max="10" value="5"/></div></div>
        <div class="panel"><div class="data-panel"><strong>Surface Tension:</strong></div><div style="margin-top:8px">γ = Force / Length</div><div>F = 2γL (needle)</div><div style="margin-top:8px">Creates droplets & meniscus</div></div>
      </div>
    </div>
  </div>
  <script>
    const canvas=document.getElementById('tensionCanvas'),ctx=canvas.getContext('2d');
    const fluids={water:{g:0.072,name:'Water'},mercury:{g:0.485,name:'Mercury'},ethanol:{g:0.022,name:'Ethanol'},soap:{g:0.025,name:'Soapy water'}};
    let fluid='water',needleLen=5;
    function resize(){const r=canvas.getBoundingClientRect();canvas.width=r.width*devicePixelRatio;canvas.height=r.height*devicePixelRatio;ctx.scale(devicePixelRatio,devicePixelRatio);}
    function draw(){
      const w=canvas.width/devicePixelRatio,h=canvas.height/devicePixelRatio;
      ctx.fillStyle='rgba(6,10,18,0.95)';ctx.fillRect(0,0,w,h);
      const cx=w/2;const f=fluids[fluid];
      const waterY=150;
      ctx.fillStyle='rgba(106,215,255,0.3)';ctx.fillRect(0,waterY,w,h-waterY-50);
      ctx.strokeStyle='#6ad7ff';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,waterY);ctx.quadraticCurveTo(cx,waterY-30,w,waterY);ctx.stroke();
      ctx.beginPath();ctx.arc(cx,waterY+50,40,0,Math.PI*2);ctx.fillStyle='#a5d8ff';ctx.fill();
      const needleW=needleLen*15;
      ctx.fillStyle='#888';ctx.fillRect(cx-needleW/2,waterY+30,needleW,8);
      const F=2*f.g*(needleLen/100);
      document.getElementById('gammaText').textContent=f.g.toFixed(3)+' N/m';
      document.getElementById('forceText').textContent=F.toExponential(2)+' N';
      document.getElementById('dropText').textContent=fluid==='mercury'?'Nearly sphere':'Dome';
    }
    document.getElementById('fluid').onchange=e=>{fluid=e.target.value;};
    document.getElementById('length').oninput=e=>{needleLen=parseInt(e.target.value);document.getElementById('lenVal').textContent=needleLen;};
    function loop(){draw();requestAnimationFrame(loop);}
    window.onresize=resize;resize();loop();
  </script>
</body>
</html>
