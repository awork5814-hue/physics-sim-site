<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sound Frequency</title>
  <style>
    :root {
      --bg1: #0a0e17;
      --bg2: #131c2b;
      --panel: #111c2b;
      --panel-2: #0f1a27;
      --text: #f5f8fd;
      --muted: #a9b6c6;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --red: #ff6b6b;
      --purple: #b892ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "Trebuchet MS", "Segoe UI", sans-serif; color: var(--text);
      background: radial-gradient(1100px 600px at 20% 10%, #1b2c42 0%, var(--bg1) 45%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
    }
    .app { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      padding: 8px 4px 18px; border-bottom: 1px solid #20324a;
    }
    header h1 { margin: 0; font-size: 28px; letter-spacing: 0.4px; }
    header p { margin: 4px 0 0; color: var(--muted); }
    .pill {
      display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-radius: 999px; background: #0b1420; border: 1px solid #223753;
      color: var(--muted); font-size: 12px;
    }
    .grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; margin-top: 18px; }
    .panel {
      background: linear-gradient(160deg, var(--panel), var(--panel-2));
      border: 1px solid #20324a; border-radius: 14px; padding: 16px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
    }
    .panel h2 { margin: 0 0 12px; font-size: 18px; color: var(--accent-2); }
    canvas {
      width: 100%; height: 280px; background: #0b1420;
      border: 1px solid #20324a; border-radius: 10px;
    }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; }
    .control {
      background: #0f1a27; border: 1px solid #20324a; border-radius: 10px; padding: 10px;
    }
    .control label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    input[type="range"] { width: 100%; }
    button {
      width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #2a3f59;
      background: #0b1420; color: var(--text); font-family: inherit; cursor: pointer;
    }
    .toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); margin-top: 6px; }
    .readouts { display: grid; gap: 10px; margin-top: 12px; }
    .readout {
      background: #0f1a27; border: 1px solid #20324a; border-radius: 10px;
      padding: 10px 12px; display: grid; gap: 6px; font-size: 13px;
    }
    .readout .title { color: var(--accent-2); font-weight: 700; font-size: 12px; letter-spacing: 0.4px; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 4px 0; }
    .value { color: var(--accent); font-weight: 600; }
    .piano { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-top: 10px; }
    .key { padding: 10px 0; background: #101826; border: 1px solid #223753; border-radius: 6px; cursor: pointer; text-align: center; }
    .footer { margin-top: 16px; color: var(--muted); font-size: 12px; }
    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } .controls { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>Sound Frequency</h1>
        <p>Frequency, wavelength, and pitch relationship</p>
      </div>
      <div class="pill">v = f × λ · Audible range</div>
    </header>

    <div class="grid">
      <div class="panel">
        <h2>Wave & Oscilloscope</h2>
        <canvas id="waveCanvas" width="600" height="280"></canvas>
      </div>

      <div class="panel">
        <h2>Controls & Readouts</h2>
        <div class="controls">
          <div class="control">
            <label>Frequency (Hz)</label>
            <input type="range" id="freq" min="20" max="20000" step="1" value="440" />
            <div class="row"><span class="muted">f</span><span class="value" id="freqValue">440 Hz</span></div>
          </div>
          <div class="control">
            <label>Amplitude (%)</label>
            <input type="range" id="amp" min="0" max="100" step="1" value="50" />
            <div class="row"><span class="muted">A</span><span class="value" id="ampValue">50%</span></div>
          </div>
          <div class="control">
            <label>View Mode</label>
            <label class="toggle"><input type="checkbox" id="viewMode"> Side view</label>
            <label class="toggle"><input type="checkbox" id="showWavelength" checked> Show wavelength</label>
          </div>
          <div class="control">
            <label>Play/Pause</label>
            <button id="play">Play</button>
          </div>
          <div class="control">
            <label>Presets</label>
            <button data-f="440" class="preset">440 Hz (A4)</button>
            <button data-f="1000" class="preset" style="margin-top:6px;">1 kHz</button>
          </div>
        </div>

        <div class="readouts">
          <div class="readout">
            <div class="title">Measurements</div>
            <div class="row"><span>Wavelength</span><span class="value" id="lambdaValue">0.78 m</span></div>
            <div class="row"><span>Period</span><span class="value" id="periodValue">2.27 ms</span></div>
          </div>
          <div class="readout">
            <div class="title">Piano Notes</div>
            <div class="piano" id="piano"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">Sound speed assumed 343 m/s.</div>
  </div>

  <script>
    const speed = 343;
    const state = {
      freq: 440,
      amp: 0.5,
      playing: false,
      showWavelength: true,
      sideView: false,
      time: 0
    };

    const dom = {
      freq: document.getElementById('freq'),
      amp: document.getElementById('amp'),
      viewMode: document.getElementById('viewMode'),
      showWavelength: document.getElementById('showWavelength'),
      play: document.getElementById('play'),
      freqValue: document.getElementById('freqValue'),
      ampValue: document.getElementById('ampValue'),
      lambdaValue: document.getElementById('lambdaValue'),
      periodValue: document.getElementById('periodValue'),
      piano: document.getElementById('piano')
    };

    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    let audioCtx, osc, gain;

    const notes = [
      { label: 'C', f: 261.6 },
      { label: 'D', f: 293.7 },
      { label: 'E', f: 329.6 },
      { label: 'F', f: 349.2 },
      { label: 'G', f: 392.0 },
      { label: 'A', f: 440.0 },
      { label: 'B', f: 493.9 },
      { label: 'C', f: 523.3 }
    ];

    function setupPiano() {
      dom.piano.innerHTML = '';
      notes.forEach(n => {
        const btn = document.createElement('div');
        btn.className = 'key';
        btn.textContent = n.label;
        btn.addEventListener('click', () => {
          state.freq = n.f;
          dom.freq.value = n.f;
          update();
          startAudio();
        });
        dom.piano.appendChild(btn);
      });
    }

    function startAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        osc = audioCtx.createOscillator();
        gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
      }
      osc.frequency.value = state.freq;
      gain.gain.value = state.playing ? 0.05 * state.amp : 0;
    }

    function drawWave() {
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#0b1420';
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = '#1c2c43';
      for (let x = 0; x <= w; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }

      const mid = h / 2;
      const A = state.amp * h * 0.35;
      ctx.strokeStyle = '#f6c76b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let x = 0; x <= w; x++) {
        const t = (x / w) * 0.02;
        const y = mid - A * Math.sin(2 * Math.PI * state.freq * t + state.time);
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      if (state.showWavelength) {
        const lambda = speed / state.freq;
        const pixels = (lambda / (speed * 0.02)) * w;
        ctx.strokeStyle = '#6ad7ff';
        ctx.beginPath();
        ctx.moveTo(50, mid + 80);
        ctx.lineTo(50 + pixels, mid + 80);
        ctx.stroke();
        ctx.fillStyle = '#6ad7ff';
        ctx.fillText(`λ`, 50 + pixels / 2, mid + 70);
      }
    }

    function updateReadouts() {
      const lambda = speed / state.freq;
      const period = 1 / state.freq;
      dom.freqValue.textContent = `${state.freq.toFixed(0)} Hz`;
      dom.ampValue.textContent = `${Math.round(state.amp * 100)}%`;
      dom.lambdaValue.textContent = `${lambda.toFixed(2)} m`;
      dom.periodValue.textContent = `${(period * 1000).toFixed(2)} ms`;
    }

    function update() {
      updateReadouts();
      drawWave();
      startAudio();
    }

    function tick() {
      state.time += 0.02;
      drawWave();
      requestAnimationFrame(tick);
    }

    function bind() {
      dom.freq.addEventListener('input', () => { state.freq = Number(dom.freq.value); update(); });
      dom.amp.addEventListener('input', () => { state.amp = Number(dom.amp.value) / 100; update(); });
      dom.showWavelength.addEventListener('change', () => { state.showWavelength = dom.showWavelength.checked; update(); });
      dom.viewMode.addEventListener('change', () => { state.sideView = dom.viewMode.checked; });
      dom.play.addEventListener('click', () => {
        state.playing = !state.playing;
        dom.play.textContent = state.playing ? 'Pause' : 'Play';
        update();
      });
      document.querySelectorAll('.preset').forEach(btn => {
        btn.addEventListener('click', () => {
          state.freq = Number(btn.dataset.f);
          dom.freq.value = state.freq;
          update();
        });
      });
    }

    setupPiano();
    bind();
    update();
    tick();
  </script>
</body>
</html>
