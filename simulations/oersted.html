<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Oersted's Experiment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(12, 18, 30, 0.82);
      --ink: #f8fafc;
      --muted: #94a3b8;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --accent-3: #22c55e;
      --line: rgba(255,255,255,0.08);
      --mono: "JetBrains Mono", monospace;
    }
    body.light {
      --bg: #f5f7fa;
      --ink: #0f172a;
      --muted: #475569;
      --line: rgba(15, 23, 42, 0.12);
      --panel: rgba(255,255,255,0.9);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", sans-serif;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px); background: rgba(8, 12, 20, 0.7);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar a { color: var(--ink); text-decoration: none; font-weight: 600; }
    .toggle {
      display: inline-flex; gap: 8px; align-items: center; padding: 8px 14px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(14, 20, 32, 0.8);
      cursor: pointer; color: var(--ink);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .toggle:hover { transform: translateY(-1px); border-color: rgba(106,215,255,0.5); box-shadow: 0 0 12px rgba(106,215,255,0.25); }

    header { padding: 24px 20px 8px; display: flex; gap: 12px; align-items: center; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
    header .subtitle { color: var(--muted); font-size: 13px; }

    .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; padding: 16px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
    }
    .canvas-wrap { position: relative; }
    canvas { width: 100%; height: clamp(360px, 56vh, 560px); background: #0b0f14; border-radius: 14px; border: 1px solid var(--line); }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .control {
      background: #0f151c;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .control label { display: block; margin-bottom: 6px; color: var(--ink); }
    .control input[type="range"] { width: 100%; }
    .control select { width: 100%; background: #0c1116; border: 1px solid var(--line); color: var(--ink); padding: 6px; border-radius: 6px; }
    .control .row { display: flex; justify-content: space-between; }
    .control .value { font-weight: 600; color: var(--ink); }

    .button-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line); background: rgba(14, 20, 32, 0.9); color: var(--ink);
      padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(246,199,107,0.7); box-shadow: 0 0 12px rgba(246,199,107,0.2); }

    .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }

    .data-panel { padding: 0; background: transparent; border: none; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 8px; }
    .data-card { background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
    .data-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .data-label::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .data-value { font-size: 1rem; font-weight: 700; font-family: var(--mono); }
    .data-value.blue { color: var(--accent); }
    .data-value.orange { color: var(--accent-2); }
    .data-value.green { color: var(--accent-3); }

    .formula {
      background: linear-gradient(135deg, rgba(106,215,255,0.18), rgba(106,215,255,0.05));
      border: 1px solid rgba(106,215,255,0.5);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--ink);
      line-height: 1.5;
    }

    footer { padding: 0 16px 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/index.html">← Back to Library</a>
    <button class="toggle" id="themeToggle">Light/Dark</button>
  </div>
  <header>
    <h1>Oersted's Experiment</h1>
    <div class="subtitle">Current‑carrying wires create circular magnetic fields</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="canvas-wrap">
        <canvas id="scene" width="960" height="460"></canvas>
      </div>
      <div class="data-panel" id="readout"></div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="control">
          <label>Current (A)</label>
          <input id="current" type="range" min="-10" max="10" step="0.1" value="5" />
          <div class="row"><span>-10</span><span id="currentVal" class="value">5.0</span><span>10</span></div>
        </div>
        <div class="control">
          <label>Direction</label>
          <select id="direction">
            <option value="up">Up (out of page)</option>
            <option value="down">Down (into page)</option>
          </select>
        </div>
        <div class="control">
          <label>Multiple Wires</label>
          <input id="wireCount" type="range" min="1" max="3" step="1" value="1" />
          <div class="row"><span>1</span><span id="wireCountVal" class="value">1</span><span>3</span></div>
        </div>
        <div class="control">
          <label>Wire Separation (cm)</label>
          <input id="wireSep" type="range" min="1" max="10" step="0.5" value="3" />
          <div class="row"><span>1</span><span id="wireSepVal" class="value">3.0</span><span>10</span></div>
        </div>
        <div class="control">
          <label>Display Options</label>
          <div class="checks">
            <label><input id="showField" type="checkbox" checked /> Field lines</label>
            <label><input id="showCompasses" type="checkbox" checked /> Compasses</label>
            <label><input id="showFilings" type="checkbox" /> Iron filings</label>
          </div>
        </div>
        <div class="control">
          <div class="formula">
            <div><strong>Field:</strong> <span style="font-family: var(--mono);">B = μ₀I/(2πr)</span></div>
            <div><strong>Rule:</strong> <span style="font-family: var(--mono);">Right‑hand rule</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    Magnetic field around a wire: B = μ₀I/(2πr). Direction by right‑hand rule.
  </footer>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const mu0 = 4 * Math.PI * 1e-7;

    const state = {
      current: 5,
      direction: 'up',
      wireCount: 1,
      wireSep: 3,
      showField: true,
      showCompasses: true,
      showFilings: false,
      wirePos: { x: 480, y: 220 },
      dragging: false
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (!state.dragging) {
        state.wirePos.x = canvas.clientWidth / 2;
        state.wirePos.y = canvas.clientHeight / 2;
      }
    }

    function getWires() {
      const wires = [];
      const sep = state.wireSep * 8;
      const count = state.wireCount;
      for (let i = 0; i < count; i++) {
        const offset = (i - (count - 1) / 2) * sep;
        wires.push({ x: state.wirePos.x + offset, y: state.wirePos.y });
      }
      return wires;
    }

    function fieldAt(x, y) {
      const wires = getWires();
      let bx = 0, by = 0;
      for (const w of wires) {
        const dx = x - w.x;
        const dy = y - w.y;
        const r2 = dx * dx + dy * dy + 1e-6;
        const r = Math.sqrt(r2);
        const Bmag = (mu0 * state.current) / (2 * Math.PI * (r * 0.002));
        const dir = state.direction === 'up' ? 1 : -1;
        const tx = -dy / r * dir;
        const ty = dx / r * dir;
        bx += tx * Bmag;
        by += ty * Bmag;
      }
      return { bx, by };
    }

    function drawBackground() {
      const isLight = document.body.classList.contains('light');
      const grad = ctx.createLinearGradient(0, 0, canvas.clientWidth, canvas.clientHeight);
      if (isLight) {
        grad.addColorStop(0, '#f8fafc');
        grad.addColorStop(0.55, '#e2e8f0');
        grad.addColorStop(1, '#f1f5f9');
      } else {
        grad.addColorStop(0, '#05070e');
        grad.addColorStop(0.6, '#0a0f1f');
        grad.addColorStop(1, '#0b1224');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);

      ctx.strokeStyle = isLight ? 'rgba(15,23,42,0.08)' : 'rgba(148,163,184,0.08)';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.clientWidth; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.clientHeight); ctx.stroke();
      }
      for (let y = 0; y < canvas.clientHeight; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.clientWidth, y); ctx.stroke();
      }
    }

    function drawWires() {
      const wires = getWires();
      for (const w of wires) {
        const grad = ctx.createRadialGradient(w.x - 4, w.y - 4, 2, w.x, w.y, 18);
        grad.addColorStop(0, '#fef3c7');
        grad.addColorStop(1, '#f59e0b');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(w.x, w.y, 16, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'rgba(15,23,42,0.6)';
        ctx.beginPath();
        if (state.direction === 'up') {
          ctx.arc(w.x, w.y, 5, 0, Math.PI * 2);
        } else {
          ctx.moveTo(w.x - 5, w.y - 5);
          ctx.lineTo(w.x + 5, w.y + 5);
          ctx.moveTo(w.x + 5, w.y - 5);
          ctx.lineTo(w.x - 5, w.y + 5);
        }
        ctx.stroke();
      }
    }

    function drawFieldLines() {
      if (!state.showField) return;
      const wires = getWires();
      ctx.strokeStyle = 'rgba(106,215,255,0.5)';
      for (const w of wires) {
        for (let r = 30; r < 180; r += 25) {
          ctx.beginPath();
          ctx.arc(w.x, w.y, r, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    function drawCompasses() {
      if (!state.showCompasses) return;
      const cols = 6;
      const rows = 6;
      const spacingX = canvas.clientWidth / (cols + 1);
      const spacingY = canvas.clientHeight / (rows + 1);
      for (let i = 1; i <= cols; i++) {
        for (let j = 1; j <= rows; j++) {
          const x = i * spacingX;
          const y = j * spacingY;
          const f = fieldAt(x, y);
          const angle = Math.atan2(f.by, f.bx);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle);
          ctx.strokeStyle = 'rgba(248,250,252,0.7)';
          ctx.beginPath();
          ctx.moveTo(-10, 0); ctx.lineTo(10, 0); ctx.stroke();
          ctx.fillStyle = '#ff6b6b';
          ctx.beginPath();
          ctx.moveTo(10, 0); ctx.lineTo(4, -4); ctx.lineTo(4, 4); ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
    }

    function drawFilings() {
      if (!state.showFilings) return;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      for (let i = 0; i < 320; i++) {
        const x = Math.random() * canvas.clientWidth;
        const y = Math.random() * canvas.clientHeight;
        const f = fieldAt(x, y);
        const ang = Math.atan2(f.by, f.bx);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(ang);
        ctx.fillRect(-2, -0.5, 4, 1);
        ctx.restore();
      }
    }

    function draw() {
      drawBackground();
      drawFieldLines();
      drawFilings();
      drawCompasses();
      drawWires();
    }

    function updateReadout() {
      const r = 0.02;
      const B = mu0 * state.current / (2 * Math.PI * r);
      const dir = state.direction === 'up' ? 'Counter‑clockwise' : 'Clockwise';
      document.getElementById('readout').innerHTML = `
        <div class="data-grid">
          <div class="data-card"><span class="data-label">Current</span><span class="data-value orange">${state.current.toFixed(2)} A</span></div>
          <div class="data-card"><span class="data-label">Wires</span><span class="data-value blue">${state.wireCount}</span></div>
          <div class="data-card"><span class="data-label">B @ 2 cm</span><span class="data-value green">${B.toExponential(2)} T</span></div>
          <div class="data-card"><span class="data-label">Field Dir</span><span class="data-value blue">${dir}</span></div>
        </div>
      `;
    }

    function tick() {
      draw();
      updateReadout();
      requestAnimationFrame(tick);
    }

    document.getElementById('current').addEventListener('input', e => {
      state.current = parseFloat(e.target.value);
      document.getElementById('currentVal').textContent = state.current.toFixed(1);
    });
    document.getElementById('direction').addEventListener('change', e => state.direction = e.target.value);
    document.getElementById('wireCount').addEventListener('input', e => {
      state.wireCount = parseInt(e.target.value, 10);
      document.getElementById('wireCountVal').textContent = state.wireCount;
    });
    document.getElementById('wireSep').addEventListener('input', e => {
      state.wireSep = parseFloat(e.target.value);
      document.getElementById('wireSepVal').textContent = state.wireSep.toFixed(1);
    });

    document.getElementById('showField').addEventListener('change', e => state.showField = e.target.checked);
    document.getElementById('showCompasses').addEventListener('change', e => state.showCompasses = e.target.checked);
    document.getElementById('showFilings').addEventListener('change', e => state.showFilings = e.target.checked);

    canvas.addEventListener('mousedown', e => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (Math.hypot(x - state.wirePos.x, y - state.wirePos.y) < 20) state.dragging = true;
    });
    canvas.addEventListener('mousemove', e => {
      if (!state.dragging) return;
      const rect = canvas.getBoundingClientRect();
      state.wirePos.x = e.clientX - rect.left;
      state.wirePos.y = e.clientY - rect.top;
    });
    window.addEventListener('mouseup', () => state.dragging = false);

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('light');
    });

    window.addEventListener('resize', resize);
    resize();
    tick();
  </script>
</body>
</html>
