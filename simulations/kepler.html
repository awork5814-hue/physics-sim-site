<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kepler's Laws</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(12, 18, 30, 0.82);
      --ink: #f8fafc;
      --muted: #94a3b8;
      --accent: #6ad7ff;
      --accent-2: #f6c76b;
      --accent-3: #22c55e;
      --line: rgba(255,255,255,0.08);
      --mono: "JetBrains Mono", monospace;
    }
    body.light {
      --bg: #f5f7fa;
      --ink: #0f172a;
      --muted: #475569;
      --line: rgba(15, 23, 42, 0.12);
      --panel: rgba(255,255,255,0.9);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", sans-serif;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px); background: rgba(8, 12, 20, 0.7);
      position: sticky; top: 0; z-index: 10;
    }
    .topbar a { color: var(--ink); text-decoration: none; font-weight: 600; }
    .toggle {
      display: inline-flex; gap: 8px; align-items: center; padding: 8px 14px;
      border: 1px solid var(--line); border-radius: 999px; background: rgba(14, 20, 32, 0.8);
      cursor: pointer; color: var(--ink);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .toggle:hover { transform: translateY(-1px); border-color: rgba(106,215,255,0.5); box-shadow: 0 0 12px rgba(106,215,255,0.25); }

    header { padding: 24px 20px 8px; display: flex; gap: 12px; align-items: center; }
    header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
    header .subtitle { color: var(--muted); font-size: 13px; }

    .wrap { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; padding: 16px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
    }
    .canvas-wrap { position: relative; }
    canvas { width: 100%; height: clamp(360px, 56vh, 560px); background: #0b0f14; border-radius: 14px; border: 1px solid var(--line); }

    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .control {
      background: #0f151c;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .control label { display: block; margin-bottom: 6px; color: var(--ink); }
    .control input[type="range"] { width: 100%; }
    .control select { width: 100%; background: #0c1116; border: 1px solid var(--line); color: var(--ink); padding: 6px; border-radius: 6px; }
    .control .row { display: flex; justify-content: space-between; }
    .control .value { font-weight: 600; color: var(--ink); }

    .button-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line); background: rgba(14, 20, 32, 0.9); color: var(--ink);
      padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); border-color: rgba(246,199,107,0.7); box-shadow: 0 0 12px rgba(246,199,107,0.2); }

    .checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }

    .data-panel { padding: 0; background: transparent; border: none; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 8px; }
    .data-card { background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
    .data-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .data-label::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .data-value { font-size: 1rem; font-weight: 700; font-family: var(--mono); }
    .data-value.blue { color: var(--accent); }
    .data-value.orange { color: var(--accent-2); }
    .data-value.green { color: var(--accent-3); }

    .formula {
      background: linear-gradient(135deg, rgba(106,215,255,0.18), rgba(106,215,255,0.05));
      border: 1px solid rgba(106,215,255,0.5);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--ink);
      line-height: 1.5;
    }

    footer { padding: 0 16px 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/index.html">← Back to Library</a>
    <button class="toggle" id="themeToggle">Light/Dark</button>
  </div>
  <header>
    <h1>Kepler's Laws</h1>
    <div class="subtitle">Elliptical orbits, equal areas, and T² ∝ a³</div>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="canvas-wrap">
        <canvas id="scene" width="960" height="460"></canvas>
      </div>
      <div class="data-panel" id="readout"></div>
    </div>

    <div class="card">
      <div class="controls">
        <div class="control">
          <label>Simulation</label>
          <div class="button-row">
            <button class="btn" id="playPause">Pause</button>
            <button class="btn" id="reset">Reset</button>
          </div>
        </div>
        <div class="control">
          <label>Animation Speed</label>
          <input id="speed" type="range" min="0.1" max="5" step="0.1" value="1" />
          <div class="row"><span>0.1x</span><span id="speedVal" class="value">1.0x</span><span>5x</span></div>
        </div>
        <div class="control">
          <label>Semi‑major Axis a (AU)</label>
          <input id="axis" type="range" min="0.3" max="10" step="0.1" value="1" />
          <div class="row"><span>0.3</span><span id="axisVal" class="value">1.0</span><span>10</span></div>
        </div>
        <div class="control">
          <label>Eccentricity e</label>
          <input id="ecc" type="range" min="0" max="0.9" step="0.01" value="0.0167" />
          <div class="row"><span>0</span><span id="eccVal" class="value">0.02</span><span>0.9</span></div>
        </div>
        <div class="control">
          <label>Planet Preset</label>
          <select id="planet">
            <option value="mercury">Mercury</option>
            <option value="earth" selected>Earth</option>
            <option value="mars">Mars</option>
            <option value="jupiter">Jupiter</option>
          </select>
        </div>
        <div class="control">
          <label>Display Options</label>
          <div class="checks">
            <label><input id="showOrbit" type="checkbox" checked /> Orbit path</label>
            <label><input id="showArea" type="checkbox" checked /> Area sweep</label>
            <label><input id="showDistance" type="checkbox" checked /> Distance line</label>
            <label><input id="showVelocity" type="checkbox" checked /> Velocity vector</label>
          </div>
        </div>
        <div class="control">
          <div class="formula">
            <div><strong>Kepler I:</strong> <span style="font-family: var(--mono);">Orbit is an ellipse</span></div>
            <div><strong>Kepler II:</strong> <span style="font-family: var(--mono);">Equal areas in equal times</span></div>
            <div><strong>Kepler III:</strong> <span style="font-family: var(--mono);">T² ∝ a³</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    Kepler's Third Law: T² = (4π²/GM) a³. For the Sun, GM ≈ 4π² AU³/year².
  </footer>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    const GM_SUN = 4 * Math.PI * Math.PI;

    const state = {
      a: 1,
      e: 0.0167,
      angle: 0,
      prevAngle: 0,
      time: 0,
      speed: 1,
      showOrbit: true,
      showArea: true,
      showDistance: true,
      showVelocity: true,
      running: true,
      trail: [],
      areaRates: [],
      stars: []
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function initStars() {
      state.stars = [];
      const count = 120;
      for (let i = 0; i < count; i++) {
        state.stars.push({
          x: Math.random(),
          y: Math.random(),
          r: Math.random() * 1.3 + 0.3,
          a: Math.random() * 0.6 + 0.2
        });
      }
    }

    function period(a) {
      return 2 * Math.PI * Math.sqrt(a * a * a / GM_SUN);
    }

    function position(theta, a, e) {
      const r = a * (1 - e * e) / (1 + e * Math.cos(theta));
      return { r, x: r * Math.cos(theta), y: r * Math.sin(theta) };
    }

    function velocity(theta, a, e) {
      const r = a * (1 - e * e) / (1 + e * Math.cos(theta));
      return Math.sqrt(GM_SUN * (2 / r - 1 / a));
    }

    function drawBackground() {
      const isLight = document.body.classList.contains('light');
      const grad = ctx.createLinearGradient(0, 0, canvas.clientWidth, canvas.clientHeight);
      if (isLight) {
        grad.addColorStop(0, '#f8fafc');
        grad.addColorStop(0.55, '#e2e8f0');
        grad.addColorStop(1, '#f1f5f9');
      } else {
        grad.addColorStop(0, '#05070e');
        grad.addColorStop(0.6, '#0a0f1f');
        grad.addColorStop(1, '#0b1224');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);

      ctx.strokeStyle = isLight ? 'rgba(15,23,42,0.08)' : 'rgba(148,163,184,0.08)';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.clientWidth; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.clientHeight); ctx.stroke();
      }
      for (let y = 0; y < canvas.clientHeight; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.clientWidth, y); ctx.stroke();
      }

      if (!isLight) {
        ctx.save();
        ctx.fillStyle = 'rgba(248,250,252,0.5)';
        state.stars.forEach(s => {
          ctx.globalAlpha = s.a;
          ctx.beginPath();
          ctx.arc(s.x * canvas.clientWidth, s.y * canvas.clientHeight, s.r, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.restore();
      }
    }

    function drawArrow(x1, y1, x2, y2, color) {
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      const angle = Math.atan2(y2 - y1, x2 - x1);
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - 9 * Math.cos(angle - Math.PI / 6), y2 - 9 * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(x2 - 9 * Math.cos(angle + Math.PI / 6), y2 - 9 * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function drawOrbit() {
      const center = { x: 280, y: 240 };
      const scale = 42;
      const focus = { x: center.x - state.e * state.a * scale, y: center.y };

      if (state.showOrbit) {
        ctx.strokeStyle = 'rgba(106,215,255,0.7)';
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        for (let t = 0; t <= Math.PI * 2 + 0.01; t += 0.02) {
          const p = position(t, state.a, state.e);
          const x = center.x + p.x * scale;
          const y = center.y + p.y * scale;
          if (t === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      // Sun at focus
      const sunGlow = ctx.createRadialGradient(focus.x, focus.y, 4, focus.x, focus.y, 26);
      sunGlow.addColorStop(0, '#f6c76b');
      sunGlow.addColorStop(1, 'rgba(246,199,107,0)');
      ctx.fillStyle = sunGlow;
      ctx.beginPath(); ctx.arc(focus.x, focus.y, 26, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#f6c76b';
      ctx.beginPath(); ctx.arc(focus.x, focus.y, 9, 0, Math.PI * 2); ctx.fill();

      // Planet
      const p = position(state.angle, state.a, state.e);
      const px = center.x + p.x * scale;
      const py = center.y + p.y * scale;
      const planetGrad = ctx.createRadialGradient(px - 3, py - 3, 2, px, py, 8);
      planetGrad.addColorStop(0, '#c7f0ff');
      planetGrad.addColorStop(1, '#3b82f6');
      ctx.fillStyle = planetGrad;
      ctx.beginPath(); ctx.arc(px, py, 6.5, 0, Math.PI * 2); ctx.fill();

      // Trail
      state.trail.push({ x: px, y: py });
      if (state.trail.length > 140) state.trail.shift();
      ctx.strokeStyle = 'rgba(106,215,255,0.2)';
      ctx.beginPath();
      state.trail.forEach((p, i) => { if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
      ctx.stroke();

      // Area sweep
      if (state.showArea) {
        ctx.fillStyle = 'rgba(246,199,107,0.2)';
        ctx.beginPath();
        ctx.moveTo(focus.x, focus.y);
        ctx.lineTo(px, py);
        const prev = position(state.angle - 0.5, state.a, state.e);
        ctx.lineTo(center.x + prev.x * scale, center.y + prev.y * scale);
        ctx.closePath();
        ctx.fill();
      }

      if (state.showDistance) {
        ctx.strokeStyle = 'rgba(148,163,184,0.6)';
        ctx.beginPath();
        ctx.moveTo(focus.x, focus.y);
        ctx.lineTo(px, py);
        ctx.stroke();
      }

      if (state.showVelocity) {
        drawArrow(px, py, px + 20 * Math.cos(state.angle + Math.PI / 2), py + 20 * Math.sin(state.angle + Math.PI / 2), '#22c55e');
      }
    }

    function draw() {
      drawBackground();
      drawOrbit();
      drawAreaRatePanel();
    }

    function drawAreaRatePanel() {
      const w = 220;
      const h = 90;
      const x = canvas.clientWidth - w - 24;
      const y = 40;
      ctx.save();
      ctx.fillStyle = 'rgba(8,12,20,0.7)';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = 'rgba(148,163,184,0.35)';
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = 'rgba(248,250,252,0.8)';
      ctx.font = '11px Inter, sans-serif';
      ctx.fillText('Area Sweep Rate', x + 10, y + 14);

      if (state.areaRates.length > 2) {
        const maxVal = Math.max(...state.areaRates);
        const minVal = Math.min(...state.areaRates);
        ctx.strokeStyle = 'rgba(106,215,255,0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        state.areaRates.forEach((val, i) => {
          const px = x + 10 + (i / (state.areaRates.length - 1)) * (w - 20);
          const norm = (val - minVal) / (maxVal - minVal || 1);
          const py = y + h - 10 - norm * (h - 26);
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.stroke();
      }
      ctx.restore();
    }

    function updateReadout() {
      const p = position(state.angle, state.a, state.e);
      const v = velocity(state.angle, state.a, state.e);
      const T = period(state.a);
      const peri = state.a * (1 - state.e);
      const ap = state.a * (1 + state.e);
      const areaRate = state.areaRates[state.areaRates.length - 1] || 0;
      document.getElementById('readout').innerHTML = `
        <div class="data-grid">
          <div class="data-card"><span class="data-label">a</span><span class="data-value blue">${state.a.toFixed(2)} AU</span></div>
          <div class="data-card"><span class="data-label">e</span><span class="data-value blue">${state.e.toFixed(2)}</span></div>
          <div class="data-card"><span class="data-label">Perihelion</span><span class="data-value orange">${peri.toFixed(2)} AU</span></div>
          <div class="data-card"><span class="data-label">Aphelion</span><span class="data-value orange">${ap.toFixed(2)} AU</span></div>
          <div class="data-card"><span class="data-label">r</span><span class="data-value green">${p.r.toFixed(2)} AU</span></div>
          <div class="data-card"><span class="data-label">Velocity</span><span class="data-value green">${v.toFixed(2)} AU/yr</span></div>
          <div class="data-card"><span class="data-label">Period</span><span class="data-value blue">${T.toFixed(2)} yr</span></div>
          <div class="data-card"><span class="data-label">ΔA/Δt</span><span class="data-value orange">${areaRate.toFixed(3)} AU²/yr</span></div>
        </div>
      `;
    }

    function tick() {
      if (state.running) {
        const dtheta = (state.speed * 0.01) / (state.a * state.a);
        const prev = state.angle;
        state.angle += dtheta;
        state.time += 0.016 * state.speed;
        const p1 = position(prev, state.a, state.e);
        const p2 = position(state.angle, state.a, state.e);
        const area = 0.5 * Math.abs(p1.x * p2.y - p1.y * p2.x);
        const areaRate = area / (0.016 * state.speed);
        state.areaRates.push(areaRate);
        if (state.areaRates.length > 120) state.areaRates.shift();
        state.prevAngle = prev;
      }
      draw();
      updateReadout();
      requestAnimationFrame(tick);
    }

    document.getElementById('axis').addEventListener('input', e => {
      state.a = parseFloat(e.target.value);
      document.getElementById('axisVal').textContent = state.a.toFixed(1);
    });
    document.getElementById('ecc').addEventListener('input', e => {
      state.e = parseFloat(e.target.value);
      document.getElementById('eccVal').textContent = state.e.toFixed(2);
    });
    document.getElementById('speed').addEventListener('input', e => {
      state.speed = parseFloat(e.target.value);
      document.getElementById('speedVal').textContent = `${state.speed.toFixed(1)}x`;
    });
    document.getElementById('planet').addEventListener('change', e => {
      const p = e.target.value;
      if (p === 'mercury') { state.a = 0.39; state.e = 0.206; }
      if (p === 'earth') { state.a = 1; state.e = 0.0167; }
      if (p === 'mars') { state.a = 1.52; state.e = 0.093; }
      if (p === 'jupiter') { state.a = 5.2; state.e = 0.048; }
      document.getElementById('axis').value = state.a;
      document.getElementById('ecc').value = state.e;
      document.getElementById('axisVal').textContent = state.a.toFixed(2);
      document.getElementById('eccVal').textContent = state.e.toFixed(2);
    });

    document.getElementById('showOrbit').addEventListener('change', e => state.showOrbit = e.target.checked);
    document.getElementById('showArea').addEventListener('change', e => state.showArea = e.target.checked);
    document.getElementById('showDistance').addEventListener('change', e => state.showDistance = e.target.checked);
    document.getElementById('showVelocity').addEventListener('change', e => state.showVelocity = e.target.checked);

    document.getElementById('playPause').addEventListener('click', e => {
      state.running = !state.running;
      e.target.textContent = state.running ? 'Pause' : 'Play';
    });
    document.getElementById('reset').addEventListener('click', () => {
      state.angle = 0;
      state.trail = [];
      state.time = 0;
      state.areaRates = [];
    });

    document.getElementById('themeToggle').addEventListener('click', () => {
      document.body.classList.toggle('light');
    });

    window.addEventListener('resize', resize);
    resize();
    initStars();
    tick();
  </script>
</body>
</html>
