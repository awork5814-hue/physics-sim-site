<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ad7ff"/>
      <stop offset="100%" style="stop-color:#f6c76b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="#0c131d"/>
  <text x="256" y="340" font-family="Space Grotesk, Arial, sans-serif" font-size="280" font-weight="700" fill="url(#grad)" text-anchor="middle" filter="url(#glow)">λ</text>
</svg>
