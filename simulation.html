<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simulation · Physics Experiments Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.min.css" />
  <link rel="stylesheet" href="simulation-theme.css" />
</head>
<body data-single-sim="true">
  <div class="background">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="grid"></div>
  </div>

  <header class="site-header">
    <div class="brand">
      <span class="brand-mark">λ</span>
      <div>
        <div class="brand-title">Physics Experiments Lab</div>
        <div class="brand-subtitle" id="singleSubtitle">Single Simulation View</div>
      </div>
    </div>
    <nav class="nav">
      <a href="index.html#experiments">Simulation Library</a>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main id="singleContainer" style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
    <div class="lab">
      <div class="lab-header">
        <div>
          <h2>Loading…</h2>
          <p>Preparing your simulation.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="auth.js"></script>
  <script src="achievements.js"></script>
  <script src="app.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    let id = params.get('id');
    if (!id && window.location.hash) {
      id = window.location.hash.replace('#', '');
    }
    const list = window.EXPERIMENTS || [];
    const exp = list.find(e => e.id === id);
    const container = document.getElementById('singleContainer');
    const subtitle = document.getElementById('singleSubtitle');

    if (!exp || !exp.href) {
      container.innerHTML = '<div class="lab"><div class="lab-header"><div><h2>Simulation not found</h2><p>Please return to the library.</p><a class="text-link" href="index.html#experiments">Go to Simulation Library</a></div></div></div>';
    } else {
      subtitle.textContent = exp.name;
      const [page, hash] = exp.href.split('#');
      const targetUrl = new URL(page, window.location.origin);
      targetUrl.searchParams.set('solo', id);
      const theme = params.get('theme');
      if (theme) {
        targetUrl.searchParams.set('theme', theme);
      }
      if (hash || id) {
        targetUrl.hash = hash || id;
      }
      window.location.replace(targetUrl.toString());
    }
  </script>
</body>
</html>
